 h += '<div class="form-row">';
 h += '<div class="form-group"><label>Type</label><select id="fb_type"><option value="bug">Bug Report</option><option value="suggestion">Suggestion</option><option value="question">Question</option></select></div>';
 h += '<div class="form-group"><label>Priority</label><select id="fb_priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>';
 h += '<div class="form-group"><label>Affected Area</label><select id="fb_area">';
 FEEDBACK_AREAS.forEach(function(a){ h += '<option>' + a + '</option>'; });
 h += '</select></div>';
 h += '</div>';
 h += '<div class="form-group" style="margin-bottom:12px"><label>Title</label><input id="fb_title" placeholder="Short summary of the issue or idea"></div>';
 h += '<div class="form-group" style="margin-bottom:12px"><label>Description</label><textarea id="fb_desc" rows="3" placeholder="Details, steps to reproduce, or explanation of your suggestion..." style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical"></textarea></div>';
 h += '<div class="form-group" style="margin-bottom:12px"><label>Screenshot Notes (optional)</label><input id="fb_screenshot" placeholder="Describe what you saw on screen"></div>';
 h += '<button class="btn btn-pri" onclick="submitFeedback()">Submit Feedback</button>';
 h += '</div>';

 // Filters
 h += '<div class="fb-filters">';
 h += '<select onchange="fbFilterType=this.value;renderFeedback()"><option value="">All Types</option><option value="bug"' + (fbFilterType==='bug'?' selected':'') + '>Bugs</option><option value="suggestion"' + (fbFilterType==='suggestion'?' selected':'') + '>Suggestions</option><option value="question"' + (fbFilterType==='question'?' selected':'') + '>Questions</option></select>';
 h += '<select onchange="fbFilterStatus=this.value;renderFeedback()"><option value="">All Status</option><option value="new"' + (fbFilterStatus==='new'?' selected':'') + '>New</option><option value="reviewing"' + (fbFilterStatus==='reviewing'?' selected':'') + '>Reviewing</option><option value="resolved"' + (fbFilterStatus==='resolved'?' selected':'') + '>Resolved</option><option value="wontfix"' + (fbFilterStatus==='wontfix'?' selected':'') + '>Won\'t Fix</option></select>';
 h += '<select onchange="fbFilterPriority=this.value;renderFeedback()"><option value="">All Priority</option><option value="high"' + (fbFilterPriority==='high'?' selected':'') + '>High</option><option value="medium"' + (fbFilterPriority==='medium'?' selected':'') + '>Medium</option><option value="low"' + (fbFilterPriority==='low'?' selected':'') + '>Low</option></select>';
 h += '<input placeholder="Search..." value="' + (fbSearchQuery||'') + '" oninput="fbSearchQuery=this.value;renderFeedback()" style="flex:1;min-width:140px">';
 h += '<span style="font-size:11px;color:var(--muted);margin-left:auto">Showing ' + items.length + ' of ' + allForStats.length + '</span>';
 h += '</div>';

 // Items list
 if(items.length === 0){
  h += '<div class="card" style="text-align:center;color:var(--muted);padding:40px">No feedback items yet</div>';
 }
 items.forEach(function(f){
  var typeClass = f.type === 'bug' ? 'fb-bug' : f.type === 'suggestion' ? 'fb-suggestion' : 'fb-question';
  var typeLabel = f.type === 'bug' ? 'Bug' : f.type === 'suggestion' ? 'Suggestion' : 'Question';
  var typeBadge = f.type === 'bug' ? 'badge-red' : f.type === 'suggestion' ? 'badge-pri' : 'badge-amb';
  var statusClass = 'fb-status-' + f.status;
  var priColor = f.priority === 'high' ? 'var(--red)' : f.priority === 'medium' ? 'var(--amb)' : 'var(--muted)';
  var date = f.timestamp ? new Date(f.timestamp).toLocaleDateString() : '';

  h += '<div class="fb-item ' + typeClass + '" onclick="openFeedbackReview(\'' + f.id + '\')">';
  h += '<div class="fb-item-head">';
  h += '<div><span class="fb-item-title">' + (f.title||'Untitled') + '</span></div>';
  h += '<span class="badge ' + statusClass + '">' + (f.status||'new') + '</span>';
  h += '</div>';
  h += '<div class="fb-item-meta">';
  h += '<span class="badge ' + typeBadge + '">' + typeLabel + '</span>';
  h += '<span style="color:' + priColor + ';font-weight:600">' + (f.priority||'medium') + '</span>';
  h += '<span>' + (f.area||'') + '</span>';
  if(admin) h += '<span>by ' + (f.agentName||'Unknown') + '</span>';
  h += '<span>' + date + '</span>';
  h += '</div>';
  if(f.description) h += '<div class="fb-item-desc">' + f.description.substring(0,120) + (f.description.length>120?'...':'') + '</div>';
  h += '</div>';
 });

 $1('#p6').innerHTML = h;
}

function submitFeedback(){
 var title = ($1('#fb_title').value||'').trim();
 var desc = ($1('#fb_desc').value||'').trim();
 if(!title){ showToast('Please enter a title', 2000); return; }

 var item = {
  id: 'fb_' + nextFbId++,
  type: $1('#fb_type').value,
  priority: $1('#fb_priority').value,
  area: $1('#fb_area').value,
  title: title,
  description: desc,
  screenshotNote: ($1('#fb_screenshot').value||'').trim(),
  agentId: currentAgent.id,
  agentName: currentAgent.name,
  status: 'new',
  timestamp: new Date().toISOString(),
  comments: [],
  impactChecklist: {},
  aiAnalysis: '',
  adminNotes: '',
  notifyAgent: false
 };

 feedbackItems.push(item);
 fbSaveFeedback(item);
 showToast('Feedback submitted: ' + title, 3000);
 renderFeedback();
}

function openFeedbackReview(id){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 var admin = isAdmin();

 var h = '';
 var typeLabel = item.type === 'bug' ? 'Bug Report' : item.type === 'suggestion' ? 'Suggestion' : 'Question';
 var typeBadge = item.type === 'bug' ? 'badge-red' : item.type === 'suggestion' ? 'badge-pri' : 'badge-amb';

 h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">';
 h += '<div><span class="badge ' + typeBadge + '">' + typeLabel + '</span> <span style="font-weight:600;font-size:11px;color:' + (item.priority==='high'?'var(--red)':item.priority==='medium'?'var(--amb)':'var(--muted)') + '">' + item.priority.toUpperCase() + '</span></div>';
 h += '<button class="btn btn-outline btn-sm" onclick="closeFbReview()">&times; Close</button>';
 h += '</div>';

 h += '<h2 style="margin-bottom:4px">' + (item.title||'Untitled') + '</h2>';
 h += '<div style="font-size:11px;color:var(--muted);margin-bottom:16px">by ' + (item.agentName||'Unknown') + ' | ' + (item.area||'') + ' | ' + new Date(item.timestamp).toLocaleString() + '</div>';

 if(item.description){
  h += '<div class="card" style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">DESCRIPTION</label><div style="font-size:13px;white-space:pre-wrap">' + item.description + '</div></div>';
 }
 if(item.screenshotNote){
  h += '<div class="card" style="margin-bottom:12px;background:var(--atint)"><label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">SCREENSHOT NOTES</label><div style="font-size:13px">' + item.screenshotNote + '</div></div>';
 }

 // Admin-only: Impact Checklist
 if(admin){
  h += '<div class="card" style="margin-bottom:12px">';
  h += '<h3>Impact Checklist</h3>';
  h += '<p style="font-size:11px;color:var(--muted);margin-bottom:8px">Check each system area that would be affected by this change:</p>';
  h += '<div class="fb-checklist">';
  IMPACT_AREAS.forEach(function(area){
   var checked = item.impactChecklist && item.impactChecklist[area.key] ? ' checked' : '';
   h += '<div class="fb-check-row"><input type="checkbox" id="fb_chk_' + area.key + '" ' + checked + ' onchange="toggleImpactCheck(\'' + id + '\',\'' + area.key + '\',this.checked)"><label for="fb_chk_' + area.key + '">' + area.label + '</label></div>';
  });
  h += '</div></div>';

  // AI Analysis section
  h += '<div class="card" style="margin-bottom:12px">';
  h += '<h3>AI Impact Analysis</h3>';
  var apiKey = getApiKey();
  if(!apiKey){
   h += '<p style="font-size:12px;color:var(--muted)">Add your Anthropic API key in Settings to enable AI analysis.</p>';
  } else {
   h += '<button class="btn btn-pri" onclick="runAiAnalysis(\'' + id + '\')" id="fbAiBtn">Run AI Analysis</button>';
  }
  h += '<div id="fbAiResult">';
  if(item.aiAnalysis){
   h += '<div class="fb-ai-result"><h4>Analysis Results</h4>' + item.aiAnalysis + '</div>';
  }
  h += '</div>';
  h += '</div>';

  // Status + Admin Notes
  h += '<div class="card" style="margin-bottom:12px">';
  h += '<h3>Resolution</h3>';
  h += '<div class="form-row">';
  h += '<div class="form-group"><label>Status</label><select id="fb_review_status">';
  ['new','reviewing','resolved','wontfix'].forEach(function(s){
   h += '<option value="' + s + '"' + (item.status===s?' selected':'') + '>' + (s==='wontfix'?"Won't Fix":s.charAt(0).toUpperCase()+s.slice(1)) + '</option>';
  });
  h += '</select></div>';
  h += '</div>';
  h += '<div class="form-group" style="margin-bottom:12px"><label>Admin Notes</label><textarea id="fb_admin_notes" rows="3" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical">' + (item.adminNotes||'') + '</textarea></div>';
  h += '<button class="btn btn-grn" onclick="saveFbReview(\'' + id + '\')">Save & Update Status</button>';
  h += ' <button class="btn btn-red btn-sm" onclick="deleteFeedback(\'' + id + '\')" style="margin-left:8px">Delete</button>';
  h += '</div>';
 }

 // Comments (visible to all)
 h += '<div class="card">';
 h += '<h3>Comments (' + (item.comments||[]).length + ')</h3>';
 if(item.adminNotes && !admin){
  h += '<div class="fb-comment" style="border-left-color:var(--pri)"><div class="fb-comment-meta">Admin Response</div>' + item.adminNotes + '</div>';
 }
 (item.comments||[]).forEach(function(c){
  h += '<div class="fb-comment"><div class="fb-comment-meta">' + (c.agentName||'Unknown') + ' &middot; ' + new Date(c.timestamp).toLocaleString() + '</div>' + c.text + '</div>';
 });
 h += '<div style="margin-top:12px;display:flex;gap:8px">';
 h += '<input id="fb_comment_text" placeholder="Add a comment..." style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">';
 h += '<button class="btn btn-pri btn-sm" onclick="addFbComment(\'' + id + '\')">Post</button>';
 h += '</div></div>';

 $1('#fbReviewContent').innerHTML = h;
 $1('#fbReviewModal').className = 'modal-overlay show';
}

function closeFbReview(){
 $1('#fbReviewModal').className = 'modal-overlay';
}

function toggleImpactCheck(id, key, checked){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 if(!item.impactChecklist) item.impactChecklist = {};
 item.impactChecklist[key] = checked;
 fbSaveFeedback(item);
}

function saveFbReview(id){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 var newStatus = $1('#fb_review_status').value;
 var oldStatus = item.status;
 item.status = newStatus;
 item.adminNotes = ($1('#fb_admin_notes').value||'').trim();
 // Notify agent if status changed to resolved or wontfix
 if(oldStatus !== newStatus && (newStatus === 'resolved' || newStatus === 'wontfix')){
  item.notifyAgent = true;
 }
 fbSaveFeedback(item);
 showToast('Feedback updated: ' + item.title, 2000);
 closeFbReview();
 renderFeedback();
}

function deleteFeedback(id){
 if(!confirm('Delete this feedback item permanently?')) return;
 feedbackItems = feedbackItems.filter(function(f){ return f.id !== id; });
 // Remove from Firebase
 fetch(fbFeedbackPath(id), {method:'DELETE'}).catch(function(){});
 showToast('Feedback deleted', 2000);
 closeFbReview();
 renderFeedback();
}

function addFbComment(id){
 var text = ($1('#fb_comment_text').value||'').trim();
 if(!text) return;
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 if(!item.comments) item.comments = [];
 item.comments.push({
  agentId: currentAgent.id,
  agentName: currentAgent.name,
  text: text,
  timestamp: new Date().toISOString()
 });
 fbSaveFeedback(item);
 openFeedbackReview(id); // re-render modal
}

// ════════════════════════════════════════════
// AI IMPACT ANALYSIS
// ════════════════════════════════════════════

async function runAiAnalysis(id){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 var apiKey = getApiKey();
 if(!apiKey){ showToast('API key required — add it in Settings', 3000); return; }

 var btn = $1('#fbAiBtn');
 var resultDiv = $1('#fbAiResult');
 if(btn) btn.innerHTML = '<span class="upload-processing"><span class="spinner"></span> Analyzing impact...</span>';
 if(btn) btn.disabled = true;

 var checkedAreas = [];
 IMPACT_AREAS.forEach(function(a){
  if(item.impactChecklist && item.impactChecklist[a.key]) checkedAreas.push(a.label);
 });

 var prompt = 'You are reviewing a ' + item.type + ' report for a compensation tracking app called DuetBooks used by AAA Life Insurance specialists.\n\n';
 prompt += 'SUBMISSION:\nTitle: ' + item.title + '\n';
 prompt += 'Description: ' + (item.description||'No description') + '\n';
 prompt += 'Affected Area: ' + (item.area||'Not specified') + '\n';
 prompt += 'Priority: ' + (item.priority||'medium') + '\n';
 if(checkedAreas.length > 0) prompt += 'Admin-flagged impact areas: ' + checkedAreas.join(', ') + '\n';
 prompt += '\nThe app has these interconnected systems:\n';
 prompt += '1. Commission calculator (26 products with rates, split agents, tiers T2/T3/T4 based on 3-month MMA)\n';
 prompt += '2. Pipeline (cases flow: pending > submitted > approved > issued > paid)\n';
 prompt += '3. Pay period tracking (Varicent/Workday statement matching, MMA calculation)\n';
 prompt += '4. Cash flow projections (30/60/90 day buckets, tier targets, tax summaries)\n';
 prompt += '5. Firebase REST API sync + localStorage dual persistence, per-agent data scoping\n';
 prompt += '6. Login/auth (SHA-256 PIN hashing, agent ID derived from name)\n';
 prompt += '7. Settings (commission split %, yearly goal, backup/restore JSON)\n';
 prompt += '8. Document AI upload (Varicent/Workday PDF parsing via Anthropic API)\n\n';
 prompt += 'Analyze this submission and provide:\n';
 prompt += '1. AFFECTED SYSTEMS: Which of the 8 systems above would be affected?\n';
 prompt += '2. RISK ASSESSMENT: What could break if implemented incorrectly?\n';
 prompt += '3. TESTING PLAN: What should be tested after the change?\n';
 prompt += '4. IMPLEMENTATION APPROACH: High-level steps to implement this safely\n';
 prompt += '5. RISK LEVEL: Low / Medium / High — with brief justification\n';
 prompt += '\nBe concise and specific. Format with clear numbered sections.';

 try {
  var resp = await fetch('https://api.anthropic.com/v1/messages', {
   method: 'POST',
   headers: {
    'Content-Type': 'application/json',
    'x-api-key': apiKey,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true'
   },
   body: JSON.stringify({
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1024,
    messages: [{role:'user', content: prompt}]
   })
  });
  var data = await resp.json();
  if(data.error){
   throw new Error(data.error.message || 'API error');
  }
  var text = data.content && data.content[0] ? data.content[0].text : 'No response';
  item.aiAnalysis = text;
  fbSaveFeedback(item);
  if(resultDiv) resultDiv.innerHTML = '<div class="fb-ai-result"><h4>Analysis Results</h4>' + text.replace(/\n/g,'<br>') + '</div>';
  if(btn){ btn.innerHTML = 'Re-run Analysis'; btn.disabled = false; }
 } catch(e){
  if(resultDiv) resultDiv.innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:8px">Error: ' + e.message + '</div>';
  if(btn){ btn.innerHTML = 'Retry Analysis'; btn.disabled = false; }
 }
}

// ════════════════════════════════════════════
// CLICK OUTSIDE MODAL
// ════════════════════════════════════════════
document.addEventListener('click', function(e){
 if(e.target.id === 'editModal') closeEditModal();
 if(e.target.id === 'fbReviewModal') closeFbReview();
});

// Enter key on login
document.addEventListener('keydown', function(e){
 if(e.key === 'Enter'){
  if($1('#loginMode').style.display !== 'none' && document.activeElement && (document.activeElement.id === 'login_name' || document.activeElement.id === 'login_pin')){
   doLogin();
  }
  if($1('#registerMode').style.display !== 'none' && document.activeElement && document.activeElement.id === 'reg_pin2'){
   doRegister();
  }
 }
});

// ════════════════════════════════════════════
// INITIALIZATION
// ════════════════════════════════════════════
(async function init(){
 // Check for existing session
 var stored = sessionStorage.getItem('db_agent');
 if(stored){
  try {
   currentAgent = JSON.parse(stored);
   await loadAgentData();
   enterApp();
  } catch(e){
   sessionStorage.removeItem('db_agent');
  }
 }

 // Pre-fill remembered agent name
 var remembered = JSON.parse(localStorage.getItem('db_remembered_agents') || '[]');
 if(remembered.length > 0){
  $1('#login_name').value = remembered[remembered.length-1].name;
 }
})();
</script>
