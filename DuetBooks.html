<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duet Books — AAA Life Specialist Compensation Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#534AB7;--grn:#1D9E75;--amb:#EF9F27;--red:#D94545;--dgrn:#0F6E56;--bg:#f5f5f3;--card:#fff;--ptint:#EEEDFE;--gtint:#F0FBF7;--atint:#FFFCF5;--rtint:#FEF2F2;--txt:#222;--muted:#666;--border:#ddd;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
html{font-size:13px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}

/* ── Login Screen ── */
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#534AB7 0%,#1D9E75 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card h1{color:var(--pri);font-size:28px;margin-bottom:4px;text-align:center}
.login-card .subtitle{color:var(--muted);font-size:13px;text-align:center;margin-bottom:30px}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;margin-top:16px;text-transform:uppercase;letter-spacing:.5px}
.login-card input,.login-card select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit}
.login-card input:focus,.login-card select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(83,74,183,.15)}
.login-btn{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:24px;transition:background .2s}
.login-btn:hover{background:#4339A0}
.login-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.login-toggle a{color:var(--pri);cursor:pointer;text-decoration:underline}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none}

/* ── Top Bar ── */
.topbar{background:var(--pri);color:#fff;padding:10px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar .brand{font-weight:700;font-size:16px}
.topbar .agent-info{font-size:12px;opacity:.8}
.topbar .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:6px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.topbar .logout-btn:hover{background:rgba(255,255,255,.25)}

/* ── Tabs ── */
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--muted);transition:all .2s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}

/* ── Panels ── */
.panel{display:none;padding:24px;max-width:1200px;margin:0 auto}
.panel.active{display:block}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:18px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:8px;color:var(--pri)}

/* ── Stat Cards Grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--pri)}
.stat-card.green{border-top-color:var(--grn)}
.stat-card.amber{border-top-color:var(--amb)}
.stat-card.red{border-top-color:var(--red)}
.stat-card .stat-value{font-size:28px;font-weight:700;margin:4px 0}
.stat-card .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;background:var(--card);font-size:12px}
th{background:var(--ptint);padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--pri)}
th:hover{background:#DDDAFE}
td{padding:8px 12px;border-top:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#FAFAFA}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;color:#fff;letter-spacing:.3px}
.badge-pri{background:var(--pri)}
.badge-grn{background:var(--grn)}
.badge-amb{background:var(--amb)}
.badge-red{background:var(--red)}
.badge-carrier-aaa{background:#7B2D8E}
.badge-carrier-mm{background:#005DAA}
.badge-carrier-sec{background:#2E7D32}

/* ── Status Pipeline Dots ── */
.pipe-status{display:flex;gap:3px;align-items:center}
.pipe-step{width:16px;height:4px;border-radius:2px;background:#E0E0E0}
.pipe-step.done{background:var(--grn)}
.pipe-step.current{background:var(--pri)}

/* ── Buttons ── */
.btn{padding:6px 14px;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#4339A0}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{background:var(--dgrn)}
.btn-amb{background:var(--amb);color:#fff}.btn-amb:hover{background:#D48A1F}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#B83B3B}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt)}.btn-outline:hover{background:#f5f5f5}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-next{background:var(--grn);color:#fff;padding:3px 10px;font-size:11px;border-radius:4px;border:none;cursor:pointer}
.btn-next:hover{background:var(--dgrn)}
.btn-del{background:none;color:var(--red);border:none;font-size:11px;cursor:pointer;text-decoration:underline}

/* ── Forms ── */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--pri)}

/* ── New Case Form ── */
.add-case-form{background:var(--atint);border:1px solid #F0E0C0;border-radius:var(--radius);padding:20px;margin-bottom:20px}
.add-case-form h3{color:var(--amb);margin-bottom:12px}
.commission-preview{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:12px;font-size:12px}
.commission-preview .big{font-size:22px;font-weight:700;color:var(--grn)}

/* ── Filter Bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
.filter-bar .count{font-size:11px;color:var(--muted);margin-left:auto}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-size:18px;margin-bottom:16px;color:var(--pri)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── Tier Card ── */
.tier-card{display:flex;align-items:center;gap:20px;background:var(--ptint);border-radius:var(--radius);padding:16px 24px;margin-bottom:24px}
.tier-badge{font-size:36px;font-weight:800;color:var(--pri)}
.tier-badge.t4{color:var(--grn)}
.tier-badge.t3{color:var(--amb)}
.tier-badge.t2{color:var(--red)}
.tier-info .tier-label{font-size:12px;color:var(--muted)}
.tier-info .tier-value{font-size:18px;font-weight:600}
.tier-progress{flex:1}
.tier-bar{height:8px;background:#E0E0E0;border-radius:4px;overflow:hidden;margin-top:6px}
.tier-bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── Monthly Table ── */
.monthly-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:12px}
.month-cell{text-align:center;padding:8px 4px;border-radius:6px;font-size:11px}
.month-cell .month-label{font-size:9px;color:var(--muted);text-transform:uppercase}
.month-cell .month-value{font-weight:700;font-size:13px}

/* ── Image Upload ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;position:relative}
.upload-zone:hover{border-color:var(--pri);background:var(--ptint)}
.upload-zone.dragover{border-color:var(--grn);background:var(--gtint)}
.upload-zone .upload-icon{font-size:28px;margin-bottom:4px}
.upload-zone .upload-text{font-size:12px;color:var(--muted)}
.upload-zone .upload-hint{font-size:10px;color:var(--muted);margin-top:4px}
.upload-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid var(--border)}
.upload-processing{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:var(--ptint);border-radius:20px;font-size:12px;color:var(--pri);font-weight:600}
.upload-processing .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#333;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Pay Period ── */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.pay-panel{border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.pay-panel-v{background:var(--ptint);border-color:#C5C0F0}
.pay-panel-w{background:var(--gtint);border-color:#B8E6D4}
.pay-panel h4{margin-bottom:12px;font-size:14px}
.preview-box{background:var(--card);border:2px solid var(--pri);border-radius:var(--radius);padding:16px;margin:16px 0}
.preview-box h4{color:var(--pri);margin-bottom:8px}
.match-box{background:var(--gtint);border:1px solid #B8E6D4;border-radius:var(--radius);padding:16px}
.match-box h4{color:var(--grn);margin-bottom:8px}
.strong{color:var(--grn);font-weight:600}
.possible{color:var(--amb);font-weight:600}
.pay-history-card{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--pri)}
.pay-history-card .ph-label{font-weight:600;font-size:14px}
.pay-history-card .ph-meta{font-size:11px;color:var(--muted)}
.pay-history-card .ph-amount{font-size:18px;font-weight:700;color:var(--grn)}

/* ── Cash Flow ── */
.cf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.cf-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center}
.cf-card .cf-period{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cf-card .cf-amount{font-size:28px;font-weight:700;margin:6px 0}
.cf-card .cf-sub{font-size:11px;color:var(--muted)}
.cf-vs{display:flex;gap:24px;margin-bottom:24px}
.cf-vs-card{flex:1;background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-top:3px solid var(--pri)}
.cf-vs-card h4{font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.cf-vs-card .big{font-size:24px;font-weight:700}
.needs-card{background:var(--atint);border:1px solid #F0E0C0;border-radius:var(--radius);padding:20px;margin-bottom:24px}
.needs-card h3{color:var(--amb);margin-bottom:12px}
.needs-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0e0c0;font-size:13px}
.needs-row:last-child{border-bottom:none}

/* ── Feedback System ── */
.fb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.fb-stats{display:flex;gap:12px}
.fb-stat{background:var(--card);border-radius:var(--radius);padding:8px 16px;box-shadow:var(--shadow);text-align:center;min-width:80px}
.fb-stat .fb-num{font-size:20px;font-weight:700}
.fb-stat .fb-lbl{font-size:10px;color:var(--muted);text-transform:uppercase}
.fb-filters{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.fb-filters select,.fb-filters input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
.fb-item{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--border);cursor:pointer;transition:all .2s}
.fb-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.fb-item.fb-bug{border-left-color:var(--red)}
.fb-item.fb-suggestion{border-left-color:var(--pri)}
.fb-item.fb-question{border-left-color:var(--amb)}
.fb-item-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.fb-item-title{font-weight:600;font-size:14px}
.fb-item-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fb-item-desc{font-size:12px;color:var(--muted);margin-top:4px;white-space:pre-wrap}
.fb-status-new{background:var(--amb);color:#fff}
.fb-status-reviewing{background:var(--pri);color:#fff}
.fb-status-resolved{background:var(--grn);color:#fff}
.fb-status-wontfix{background:#999;color:#fff}
.fb-review-modal{max-width:700px;max-height:85vh;overflow-y:auto;padding:24px}
.fb-checklist{margin:16px 0}
.fb-check-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px;transition:background .15s}
.fb-check-row:hover{background:#f5f5f5}
.fb-check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--pri)}
.fb-ai-result{background:var(--ptint);border:1px solid #C5C0F0;border-radius:var(--radius);padding:16px;margin-top:12px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.fb-ai-result h4{color:var(--pri);margin-bottom:8px}
.fb-comment{background:#f9f9f7;border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;border-left:3px solid var(--border)}
.fb-comment .fb-comment-meta{font-size:10px;color:var(--muted);margin-bottom:4px}

/* ── Version ── */
.version{text-align:center;font-size:10px;color:var(--muted);padding:20px;opacity:.5}

/* ── Responsive ── */
@media(max-width:768px){
 .stat-grid{grid-template-columns:repeat(2,1fr)}
 .tabs{padding:0 8px}
 .tab{padding:10px 14px;font-size:12px}
 .panel{padding:16px}
 .topbar{padding:10px 16px}
 .form-row{grid-template-columns:1fr}
 .tier-card{flex-direction:column;text-align:center}
 .monthly-grid{grid-template-columns:repeat(6,1fr)}
 .filter-bar{flex-direction:column}
 .filter-bar .count{margin-left:0}
 .pay-grid{grid-template-columns:1fr}
 .cf-grid{grid-template-columns:1fr}
 .cf-vs{flex-direction:column}
}
@media(max-width:480px){
 .stat-grid{grid-template-columns:1fr}
 .monthly-grid{grid-template-columns:repeat(4,1fr)}
 .tab{padding:8px 10px;font-size:11px}
 .stat-card .stat-value{font-size:22px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen" class="login-screen">
 <div class="login-card">
  <h1>Duet Books</h1>
  <div class="subtitle">Your Book of Business. One Place. Total Clarity.</div>

  <!-- Sign In Mode -->
  <div id="loginMode">
   <label>Your Name</label>
   <input id="login_name" type="text" placeholder="First Last" autocomplete="name">
   <label>PIN</label>
   <input id="login_pin" type="password" placeholder="4-6 digit PIN" maxlength="6" inputmode="numeric">
   <button class="login-btn" onclick="doLogin()">Sign In</button>
   <div class="login-toggle">New here? <a onclick="toggleLoginMode()">Create Account</a></div>
   <div id="loginError" class="login-error"></div>
  </div>

  <!-- Register Mode -->
  <div id="registerMode" style="display:none">
   <label>Your Full Name</label>
   <input id="reg_name" type="text" placeholder="First Last" autocomplete="name">
   <label>Branch</label>
   <input id="reg_branch" type="text" placeholder="e.g. Z012, Palm Harbor, etc.">
   <label>Create a PIN (4-6 digits)</label>
   <input id="reg_pin" type="password" placeholder="PIN" maxlength="6" inputmode="numeric">
   <label>Confirm PIN</label>
   <input id="reg_pin2" type="password" placeholder="Confirm PIN" maxlength="6" inputmode="numeric">
   <button class="login-btn" onclick="doRegister()">Create Account</button>
   <div class="login-toggle">Already have an account? <a onclick="toggleLoginMode()">Sign In</a></div>
   <div id="regError" class="login-error"></div>
  </div>
 </div>
</div>

<!-- ═══ MAIN APP (hidden until login) ═══ -->
<div id="appShell" style="display:none">

 <!-- Top Bar -->
 <div class="topbar">
  <div>
   <div class="brand">Duet Books</div>
   <div class="agent-info" id="topAgentInfo"></div>
  </div>
  <div class="topbar-right">
   <span style="font-size:11px;opacity:.7"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Synced</span></span>
   <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
 </div>

 <!-- Tab Navigation -->
 <div class="tabs" id="tabBar">
  <div class="tab active" onclick="showTab(0)">Dashboard</div>
  <div class="tab" onclick="showTab(1)">Book of Business</div>
  <div class="tab" onclick="showTab(2)">Pay Periods</div>
  <div class="tab" onclick="showTab(3)">Cash Flow</div>
  <div class="tab" onclick="showTab(4)">Rate Table</div>
  <div class="tab" onclick="showTab(5)">Settings</div>
  <div class="tab" onclick="showTab(6)">Feedback</div>
 </div>

 <!-- ═══ TAB 0: DASHBOARD ═══ -->
 <div class="panel active" id="p0"></div>

 <!-- ═══ TAB 1: BOOK OF BUSINESS ═══ -->
 <div class="panel" id="p1"></div>

 <!-- ═══ TAB 2: PAY PERIODS ═══ -->
 <div class="panel" id="p2"></div>

 <!-- ═══ TAB 3: CASH FLOW ═══ -->
 <div class="panel" id="p3"></div>

 <!-- ═══ TAB 4: RATE TABLE ═══ -->
 <div class="panel" id="p4"></div>

 <!-- ═══ TAB 5: SETTINGS ═══ -->
 <div class="panel" id="p5"></div>

 <!-- ═══ TAB 6: FEEDBACK ═══ -->
 <div class="panel" id="p6"></div>

</div>

<!-- Edit Case Modal -->
<div class="modal-overlay" id="editModal">
 <div class="modal" id="editModalContent"></div>
</div>

<!-- Feedback Review Modal -->
<div class="modal-overlay" id="fbReviewModal">
 <div class="modal fb-review-modal" id="fbReviewContent"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Version -->
<div class="version" id="versionLine"></div>

<script>
// ════════════════════════════════════════════
// DUET BOOKS — Standalone Compensation Tracker
// ════════════════════════════════════════════

var APP_VERSION = 'v1.1.0';
var APP_BUILD_DATE = '2026-04-03';
var FIREBASE_URL = 'https://duet-crm-default-rtdb.firebaseio.com/duetbooks';

// ── State ──
var currentAgent = null; // {id, name, branch, pin}
var cases = [];
var payPeriods = [];
var settings = {};
var nextCaseId = 1;
var nextPeId = 1;
var activeTab = 0;
var sortCol = 'submitted';
var sortAsc = false;
var filterStatus = '';
var filterCarrier = '';
var filterCat = '';
var searchQuery = '';
var editingCaseId = null;
var showAddForm = false;

var defaultSettings = {
 yourShare: 80,
 partnerShare: 20,
 yearlyGoal: 100000
};

// ── Product Catalog ──
var products = [

// ── SHA-256 Hash (for PIN) ──
async function sha256(str){
 var buf = new TextEncoder().encode(str);
 var hash = await crypto.subtle.digest('SHA-256', buf);
 return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// COMMISSION & TIER CALCULATIONS
// ════════════════════════════════════════════
function calcCase(c){
 var p = findProd(c.product);
 var origGross, agentShare, partnerGets, fullComm;

 // If case has a Varicent-imported commission, use it directly — don't recalculate
 if(c.actualCommission){
  agentShare = c.actualCommission;
  fullComm = agentShare;
  origGross = agentShare;
  partnerGets = 0; // Varicent already handled the split
  return {origGross:origGross, agentShare:agentShare, partnerGets:partnerGets, fullComm:fullComm};
 }

 // Manual entry — calculate from amount × rate, then split
 if(p.flat){
  fullComm = c.amount;
  if(c.split === 'split'){
   agentShare = fullComm * (settings.yourShare/100);
   partnerGets = fullComm * (settings.partnerShare/100);
  } else {
   agentShare = fullComm;
   partnerGets = 0;
  }
  origGross = fullComm;
 } else {
  fullComm = c.amount * (c.rate / 100);
  origGross = fullComm;
  if(c.split === 'split'){
   agentShare = fullComm * (settings.yourShare/100);
   partnerGets = fullComm * (settings.partnerShare/100);
  } else {
   agentShare = fullComm;
   partnerGets = 0;
  }
 }
 return {origGross:origGross, agentShare:agentShare, partnerGets:partnerGets, fullComm:fullComm};
}

 return h + '</div>';

function tierText(mma){ return mma >= 6667 ? 'T4' : mma >= 5000 ? 'T3' : 'T2'; }
function tierClass(mma){ return mma >= 6667 ? 't4' : mma >= 5000 ? 't3' : 't2'; }

function calc3MMA(){
 var now = new Date();
 var months = [];
 for(var i=0;i<3;i++){
  var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
  months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
 }
 var total = 0;
 cases.forEach(function(c){
  if(c.status !== 'paid') return;
  var paidMonth = (c.paidDate||c.submitted||'').substring(0,7);
  if(months.indexOf(paidMonth) !== -1){
   total += calcCase(c).agentShare;
  }
 });
 return total / 3;
}

function renderDashboard(){
 var year = new Date().getFullYear();
 var yearCases = cases.filter(function(c){ return (c.year||year) === year; });
 var totalCases = yearCases.length;
 var totalProduction = 0;
 var totalPaid = 0;
 var totalPending = 0;

 var nonCommProducts = ['Banking Incentive','Bonus','Other Income'];
 yearCases.forEach(function(c){
  if(nonCommProducts.indexOf(c.product) >= 0) return;
  var calc = calcCase(c);
  totalProduction += calc.agentShare;
  if(c.status === 'paid') totalPaid += calc.agentShare;
  else totalPending += calc.agentShare;
 });

 var mma = calc3MMA();
 var tier = tierText(mma);
 var tClass = tierClass(mma);
 var nextTierAmt = mma >= 6667 ? 0 : mma >= 5000 ? (6667 - mma) * 3 : (5000 - mma) * 3;
 var nextTierName = mma >= 6667 ? '' : mma >= 5000 ? 'T4' : 'T3';
 var tierPct = mma >= 6667 ? 100 : mma >= 5000 ? ((mma-5000)/1667*100) : (mma/5000*100);

 // Status counts
 var statusCounts = {};
 statusOrder.forEach(function(s){ statusCounts[s] = 0; });
 yearCases.forEach(function(c){ statusCounts[c.status] = (statusCounts[c.status]||0) + 1; });

 // Monthly production
 var monthlyProd = {};
 var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 for(var m=0;m<12;m++) monthlyProd[m] = 0;
 yearCases.forEach(function(c){
  if(nonCommProducts.indexOf(c.product) >= 0) return;
  var d = c.submitted || c.created || '';
  if(d){
   var month = parseInt(d.substring(5,7)) - 1;
   monthlyProd[month] += calcCase(c).agentShare;
  }
 });
 var maxMonth = Math.max.apply(null, Object.values(monthlyProd).concat([1]));

 var h = '';

 // Latest month with production data
 var latestMonth = new Date().getMonth();
 for(var lm = new Date().getMonth(); lm >= 0; lm--){
  if(monthlyProd[lm] > 0){ latestMonth = lm; break; }
 }
 var curMonthProd = monthlyProd[latestMonth] || 0;

 // Stat cards
 h += '<div class="stat-grid">';
 h += '<div class="stat-card"><div class="stat-label">Total Cases ('+year+')</div><div class="stat-value">'+totalCases+'</div></div>';
 h += '<div class="stat-card"><div class="stat-label">Monthly Production</div><div class="stat-value">'+fmt(curMonthProd)+'</div></div>';
 h += '<div class="stat-card green"><div class="stat-label">YTD Paid</div><div class="stat-value" style="color:var(--grn)">'+fmt(totalPaid)+'</div></div>';
 h += '<div class="stat-card amber"><div class="stat-label">Pipeline Pending</div><div class="stat-value" style="color:var(--amb)">'+fmt(totalPending)+'</div></div>';
 h += '</div>';

 // Tier card
 h += '<div class="tier-card">';
 h += '<div class="tier-badge '+tClass+'">'+tier+'</div>';
 h += '<div class="tier-info">';
 h += '<div class="tier-label">3-Month Moving Average</div>';
 h += '<div class="tier-value">'+fmt(mma)+' / month</div>';
 if(nextTierAmt > 0){
  h += '<div style="font-size:11px;color:var(--muted);margin-top:4px">'+fmt(nextTierAmt)+' more in paid commission to reach '+nextTierName+'</div>';
 } else {
  h += '<div style="font-size:11px;color:var(--grn);margin-top:4px">You\'re at the highest tier!</div>';
 }
 h += '</div>';
 h += '<div class="tier-progress" style="flex:1">';
 h += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>T2</span><span>T3 ($5,000)</span><span>T4 ($6,667)</span></div>';
 h += '<div class="tier-bar"><div class="tier-bar-fill" style="width:'+Math.min(tierPct,100)+'%;background:var(--'+(tClass==='t4'?'grn':tClass==='t3'?'amb':'red')+')"></div></div>';
 h += '</div>';
 h += '</div>';

 // Status breakdown
 h += '<div class="card">';
 h += '<h3>Pipeline Status Breakdown</h3>';
 h += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">';
 statusOrder.forEach(function(s){
  h += '<div style="text-align:center;min-width:80px">';
  h += '<div style="font-size:24px;font-weight:700">'+statusCounts[s]+'</div>';
  h += statusBadge(s);
  h += '</div>';
 });
 h += '</div></div>';

 // Monthly production
 h += '<div class="card">';
 h += '<h3>Monthly Production ('+year+')</h3>';
 h += '<div class="monthly-grid">';
 for(var m=0;m<12;m++){
  var val = monthlyProd[m];
  var pct = maxMonth > 0 ? (val/maxMonth*100) : 0;
  var bg = val > 0 ? 'var(--gtint)' : '#f5f5f5';
  var color = val > 0 ? 'var(--grn)' : 'var(--muted)';
  h += '<div class="month-cell" style="background:'+bg+'">';
  h += '<div class="month-label">'+monthNames[m]+'</div>';
  h += '<div class="month-value" style="color:'+color+'">'+fmt(val).replace('$','').split('.')[0]+'</div>';
  h += '</div>';
 }
 h += '</div></div>';

 $1('#p0').innerHTML = h;
}

function renderBookOfBusiness(){
 var year = new Date().getFullYear();
 var h = '';

 h += '<h2 style="margin-bottom:16px;color:var(--amb)">Book of Business</h2>';

 // Add Case toggle
 h += '<button class="btn btn-grn" onclick="toggleAddForm()" style="margin-bottom:16px">'+(showAddForm?'Cancel':'+ Add New Case')+'</button>';

 // Add Case form
 if(showAddForm){
  h += '<div class="add-case-form" id="addCaseForm">';
  h += '<h3>Add New Case</h3>';
  h += '<div class="form-row">';
  h += '<div class="form-group"><label>Client Name</label><input id="nc_client" type="text" placeholder="e.g. Jane Smith"></div>';
  h += '<div class="form-group"><label>Client Phone</label><input id="nc_phone" type="tel" placeholder="e.g. 4075551234"></div>';
  h += '<div class="form-group"><label>Product</label><select id="nc_product" onchange="ncProductChange()"><option value="">— Select product —</option>';
  // Group by carrier then category
  var carriers = ['AAA','MassMutual','Securian'];
  carriers.forEach(function(carrier){
   var carrierProds = products.filter(function(p){return p.carrier===carrier});
   if(carrierProds.length){
    h += '<optgroup label="── '+carrier+' ──">';
    carrierProds.forEach(function(p){
     h += '<option value="'+p.name+'">'+p.name+'</option>';
    });
    h += '</optgroup>';
   }
  });
  h += '</select></div>';
  h += '<div class="form-group"><label>Amount ($)</label><input id="nc_amount" type="number" placeholder="Premium / deposit / flat fee" oninput="ncCalcPreview()"></div>';
  h += '<div class="form-group"><label>Rate (%)</label><input id="nc_rate" type="number" step="0.01" oninput="ncCalcPreview()"></div>';
  h += '</div>';

  h += '<div class="form-row">';
  h += '<div class="form-group"><label>Split Type</label><select id="nc_split" onchange="ncCalcPreview()"><option value="full">Full (no split)</option><option value="split">Split (partner gets their %)</option></select></div>';
  h += '<div class="form-group"><label>Split Agent Name</label><input id="nc_splitname" type="text" placeholder="Partner name"></div>';
  h += '<div class="form-group"><label>Split Agent Email</label><input id="nc_splitemail" type="text" placeholder="partner@acg.aaa.com"></div>';
  h += '<div class="form-group"><label>Submitted Date</label><input id="nc_submitted" type="date" value="'+toYMD(new Date())+'"></div>';
  h += '</div>';

  h += '<div class="form-row">';
  h += '<div class="form-group"><label>Est. Pay Date</label><input id="nc_estpay" type="date"></div>';
  h += '<div class="form-group"><label>Notes</label><input id="nc_notes" type="text" placeholder="Optional notes"></div>';
  h += '</div>';

  // Commission preview
  h += '<div class="commission-preview" id="ncPreview">';
  h += '<div style="color:var(--muted);font-size:11px">Select a product and enter an amount to see commission preview</div>';
  h += '</div>';

  h += '<button class="btn btn-grn" onclick="addCase()" style="margin-top:12px">Add Case to Pipeline</button>';
  h += '</div>';
 }

 // Filters
 h += '<div class="filter-bar">';
 h += '<select onchange="filterStatus=this.value;renderBookOfBusiness()"><option value="">All Statuses</option>';
 statusOrder.forEach(function(s){ h += '<option value="'+s+'"'+(filterStatus===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'; });
 h += '</select>';
 h += '<select onchange="filterCarrier=this.value;renderBookOfBusiness()"><option value="">All Carriers</option><option value="AAA"'+(filterCarrier==='AAA'?' selected':'')+'>AAA</option><option value="MassMutual"'+(filterCarrier==='MassMutual'?' selected':'')+'>MassMutual</option><option value="Securian"'+(filterCarrier==='Securian'?' selected':'')+'>Securian</option></select>';
 h += '<select onchange="filterCat=this.value;renderBookOfBusiness()"><option value="">All Categories</option>';
 var cats = ['IUL / Universal Life','Annuities','Life (Whole / Term)','Banking / CD / Other'];
 cats.forEach(function(c){ h += '<option value="'+c+'"'+(filterCat===c?' selected':'')+'>'+c+'</option>'; });
 h += '</select>';
 h += '<input type="text" placeholder="Search client..." value="'+searchQuery+'" oninput="searchQuery=this.value;renderBookOfBusiness()" style="min-width:160px">';

 // Count
 var filtered = getFilteredCases();
 h += '<span class="count">Showing '+filtered.length+' of '+cases.length+' cases</span>';
 h += '</div>';

 // Table
 h += '<div class="tbl-wrap"><table>';
 h += '<thead><tr>';
 var cols = [
  {key:'client',label:'Client'},
  {key:'carrier',label:'Carrier'},
  {key:'product',label:'Product'},
  {key:'amount',label:'Amount'},
  {key:'commission',label:'Your Commission'},
  {key:'split',label:'Split'},
  {key:'status',label:'Status'},
  {key:'submitted',label:'Submitted'},
  {key:'estPay',label:'Est. Pay'},
  {key:'notes',label:'Notes'},
  {key:'actions',label:''}
 ];
 cols.forEach(function(col){
  var arrow = sortCol === col.key ? (sortAsc ? ' ↑' : ' ↓') : '';
  if(col.key === 'actions'){
   h += '<th></th>';
  } else {
   h += '<th onclick="setSort(\''+col.key+'\')">'+col.label+arrow+'</th>';
  }
 });
 h += '</tr></thead><tbody>';

 if(filtered.length === 0){
  h += '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--muted)">No cases yet. Click "+ Add New Case" to get started.</td></tr>';
 }

 filtered.forEach(function(c){
  var calc = calcCase(c);
  var prod = findProd(c.product);
  h += '<tr>';
  h += '<td><b>'+c.client+'</b>'+(c.phone?'<br><a href="tel:'+c.phone+'" style="font-size:11px;color:var(--pri)">'+c.phone+'</a>':'')+'</td>';
  h += '<td>'+carrierBadge(prod.carrier || 'AAA')+'</td>';
  h += '<td style="font-size:11px">'+c.product+'</td>';
  h += '<td>'+fmt(c.amount)+'</td>';
  h += '<td><b>'+fmt(calc.agentShare)+'</b></td>';
  h += '<td>'+(c.split==='split'?'<span style="font-size:10px;color:var(--muted)">'+c.splitName+'</span>':'—')+'</td>';
  h += '<td>'+statusBadge(c.status)+statusBar(c.status)+'</td>';
  h += '<td style="font-size:11px">'+c.submitted+'</td>';
  h += '<td style="font-size:11px">'+(c.estPay||'—')+'</td>';
  h += '<td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(c.notes||'—')+'</td>';
  h += '<td>';
  if(statusIdx(c.status) < 4){
   h += '<button class="btn-next" onclick="advanceStatus('+c.id+')">Next</button>';
  }
  h += '<br><button class="btn-del" onclick="editCase('+c.id+')" style="color:var(--pri);margin-top:4px">edit</button>';
  h += '<br><button class="btn-del" onclick="deleteCase('+c.id+')">del</button>';
  h += '</td>';
  h += '</tr>';
 });

 h += '</tbody></table></div>';

 $1('#p1').innerHTML = h;
}

function getFilteredCases(){
 var year = new Date().getFullYear();
 var filtered = cases.filter(function(c){
  if(filterStatus && c.status !== filterStatus) return false;
  if(filterCarrier){
   var p = findProd(c.product);
   if(p.carrier !== filterCarrier) return false;
  }
  if(filterCat){
   var p = findProd(c.product);
   if(p.cat !== filterCat) return false;
  }
  if(searchQuery){
   var q = searchQuery.toLowerCase();
   if((c.client||'').toLowerCase().indexOf(q)===-1 && (c.phone||'').indexOf(q)===-1) return false;
  }
  return true;
 });

 // Sort
 filtered.sort(function(a,b){
  var va, vb;
  if(sortCol === 'client'){ va = (a.client||'').toLowerCase(); vb = (b.client||'').toLowerCase(); }
  else if(sortCol === 'carrier'){ va = findProd(a.product).carrier; vb = findProd(b.product).carrier; }
  else if(sortCol === 'product'){ va = a.product; vb = b.product; }
  else if(sortCol === 'amount'){ va = a.amount||0; vb = b.amount||0; }
  else if(sortCol === 'commission'){ va = calcCase(a).agentShare; vb = calcCase(b).agentShare; }
  else if(sortCol === 'status'){ va = statusIdx(a.status); vb = statusIdx(b.status); }
  else if(sortCol === 'submitted'){ va = a.submitted||''; vb = b.submitted||''; }
  else if(sortCol === 'estPay'){ va = a.estPay||''; vb = b.estPay||''; }
  else { va = a.submitted||''; vb = b.submitted||''; }
  if(va < vb) return sortAsc ? -1 : 1;
  if(va > vb) return sortAsc ? 1 : -1;
  return 0;
 });

 return filtered;
}

function setSort(col){
 if(sortCol === col) sortAsc = !sortAsc;
 else { sortCol = col; sortAsc = true; }
 renderBookOfBusiness();
}

function toggleAddForm(){
 showAddForm = !showAddForm;
 renderBookOfBusiness();
}

function ncProductChange(){
 var prodName = $1('#nc_product').value;
 var p = findProd(prodName);
 if(p && !p.flat){
  $1('#nc_rate').value = p.rate;
 } else if(p && p.flat){
  $1('#nc_rate').value = '';
 }
 ncCalcPreview();
}

function ncCalcPreview(){
 var prodName = ($1('#nc_product')||{}).value || '';
 var amount = parseFloat(($1('#nc_amount')||{}).value) || 0;
 var rate = parseFloat(($1('#nc_rate')||{}).value) || 0;
 var split = ($1('#nc_split')||{}).value || 'full';
 var el = $1('#ncPreview');
 if(!el) return;
 if(!prodName || !amount){
  el.innerHTML = '<div style="color:var(--muted);font-size:11px">Select a product and enter an amount to see commission preview</div>';
  return;
 }
 var p = findProd(prodName);
 var fullComm = p.flat ? amount : amount * (rate/100);
 var agentShare = fullComm;
 var partnerGets = 0;
 if(split === 'split'){
  agentShare = fullComm * (settings.yourShare/100);
  partnerGets = fullComm * (settings.partnerShare/100);
 }
 el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center">'
  + (partnerGets > 0 ? '<div><div style="font-size:11px;color:var(--muted)">Total Commission</div><div style="font-size:16px;font-weight:600">'+fmt(fullComm)+'</div></div>' : '')
  + '<div><div style="font-size:11px;color:var(--muted)">Your Commission ('+(partnerGets>0?settings.yourShare+'%':'100%')+')</div><div class="big">'+fmt(agentShare)+'</div></div>'
  + (partnerGets > 0 ? '<div style="text-align:right"><div style="font-size:11px;color:var(--muted)">Partner Gets ('+settings.partnerShare+'%)</div><div style="font-size:16px;font-weight:600">'+fmt(partnerGets)+'</div></div>' : '')
  + '</div>';
}

function addCase(){
 var client = ($1('#nc_client').value||'').trim();
 var product = ($1('#nc_product').value||'');
 if(!client || !product){ showToast('Please enter client name and select product.', 3000); return; }

 var c = {
  id: nextCaseId++,
  client: client,
  phone: ($1('#nc_phone').value||'').replace(/[^\d]/g,''),
  product: product,
  amount: parseFloat($1('#nc_amount').value) || 0,
  rate: parseFloat($1('#nc_rate').value) || findProd(product).rate || 0,
  split: $1('#nc_split').value || 'full',
  splitName: ($1('#nc_splitname').value||'').trim(),
  splitEmail: ($1('#nc_splitemail').value||'').trim(),
  status: 'pending',
  submitted: $1('#nc_submitted').value || toYMD(new Date()),
  estPay: $1('#nc_estpay').value || '',
  paidDate: '',
  notes: ($1('#nc_notes').value||'').trim(),
  year: new Date().getFullYear(),
  created: new Date().toISOString()
 };

 cases.push(c);
 saveCases();
 showAddForm = false;
 showToast('Case added: ' + client + ' — ' + product, 3000);
 renderAll();
}

function advanceStatus(caseId){
 var c = cases.find(function(x){return x.id===caseId});
 if(!c) return;
 var idx = statusIdx(c.status);
 if(idx < 4){
  c.status = statusOrder[idx+1];
  if(c.status === 'paid') c.paidDate = toYMD(new Date());
  c.updated = new Date().toISOString();
  saveCases();
  showToast(c.client + ' → ' + c.status.charAt(0).toUpperCase()+c.status.slice(1), 2000);
  renderAll();
 }
}

function deleteCase(caseId){
 if(!confirm('Delete this case?')) return;
 cases = cases.filter(function(c){return c.id!==caseId});
 saveCases();
 showToast('Case deleted', 2000);
 renderAll();
}

 var c = cases.find(function(x){return x.id===caseId});
 if(!c) return;
 var h = '<h2>Edit Case</h2>';
 h += '<div class="form-row">';
 h += '<div class="form-group"><label>Client Name</label><input id="ec_client" type="text" value="'+c.client+'"></div>';
 h += '<div class="form-group"><label>Phone</label><input id="ec_phone" type="tel" value="'+(c.phone||'')+'"></div>';
 h += '</div>';
 h += '<div class="form-row">';
 h += '<div class="form-group"><label>Product</label><select id="ec_product">';
 products.forEach(function(p){
  h += '<option value="'+p.name+'"'+(c.product===p.name?' selected':'')+'>'+p.carrier+' — '+p.name+'</option>';
 });
 h += '</select></div>';
 h += '<div class="form-group"><label>Amount ($)</label><input id="ec_amount" type="number" value="'+c.amount+'"></div>';
 h += '<div class="form-group"><label>Rate (%)</label><input id="ec_rate" type="number" step="0.01" value="'+c.rate+'"></div>';
 h += '</div>';
 h += '<div class="form-row">';
 h += '<div class="form-group"><label>Split</label><select id="ec_split"><option value="full"'+(c.split==='full'?' selected':'')+'>Full</option><option value="split"'+(c.split==='split'?' selected':'')+'>Split</option></select></div>';
 h += '<div class="form-group"><label>Split Agent</label><input id="ec_splitname" type="text" value="'+(c.splitName||'')+'"></div>';
 h += '<div class="form-group"><label>Status</label><select id="ec_status">';
 statusOrder.forEach(function(s){ h += '<option value="'+s+'"'+(c.status===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'; });
 h += '</select></div>';
 h += '</div>';
 h += '<div class="form-row">';
 h += '<div class="form-group"><label>Submitted Date</label><input id="ec_submitted" type="date" value="'+c.submitted+'"></div>';
 h += '<div class="form-group"><label>Est. Pay Date</label><input id="ec_estpay" type="date" value="'+(c.estPay||'')+'"></div>';
 h += '<div class="form-group"><label>Paid Date</label><input id="ec_paiddate" type="date" value="'+(c.paidDate||'')+'"></div>';
 h += '</div>';
 h += '<div class="form-group"><label>Notes</label><textarea id="ec_notes" rows="2">'+(c.notes||'')+'</textarea></div>';

 h += '<div class="modal-actions">';
 h += '<button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>';
 h += '<button class="btn btn-pri" onclick="saveEditCase('+c.id+')">Save Changes</button>';
 h += '</div>';

 $1('#editModalContent').innerHTML = h;
 $1('#editModal').className = 'modal-overlay show';
}

function saveEditCase(caseId){
 var c = cases.find(function(x){return x.id===caseId});
 if(!c) return;
 c.client = $1('#ec_client').value.trim();
 c.phone = ($1('#ec_phone').value||'').replace(/[^\d]/g,'');
 c.product = $1('#ec_product').value;
 c.amount = parseFloat($1('#ec_amount').value) || 0;
 c.rate = parseFloat($1('#ec_rate').value) || 0;
 c.split = $1('#ec_split').value;
 c.splitName = $1('#ec_splitname').value.trim();
 c.status = $1('#ec_status').value;
 c.submitted = $1('#ec_submitted').value;
 c.estPay = $1('#ec_estpay').value;
 c.paidDate = $1('#ec_paiddate').value;
 c.notes = $1('#ec_notes').value.trim();
 c.updated = new Date().toISOString();
 saveCases();
 closeEditModal();
 showToast('Case updated: ' + c.client, 2000);
 renderAll();
}

function closeEditModal(){
 $1('#editModal').className = 'modal-overlay';
}

 h += '<div class="upload-zone" id="uploadZone" onclick="triggerUpload(\'payfiles\')" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="handleDrop(event)">';
 h += '<div class="upload-text">Click to select files, or drag & drop here</div>';
 h += '<div class="upload-hint">PNG, JPG, or PDF \u2014 up to 4 documents at once (1 month: 2 Varicent + 2 Workday)</div>';
 h += '</div>';
 h += '<input type="file" id="payfiles_input" accept="image/*,.pdf" multiple style="display:none" onchange="handleFileSelect(this)">';

 // Panel 1 — Varicent
 h += '<div class="pay-panel pay-panel-v"><h4 style="color:var(--pri)">Varicent Commission Statement</h4>';
 h += '<div class="form-row"><div class="form-group"><label>Period Label</label><input id="pp_label" placeholder="e.g. Apr P1"></div>';
 h += '<div class="form-group"><label>Month</label><select id="pp_month">';
 months.forEach(function(m,i){ var sel = i===new Date().getMonth()?' selected':''; h += '<option value="'+m+'"'+sel+'>'+m+'</option>'; });

 h += '</div>';

 h += '<div class="pay-panel pay-panel-w"><h4 style="color:var(--grn)">Workday Payslip</h4>';

var payFormOpen = false;
function togglePayForm(){
 payFormOpen = !payFormOpen;
 var el = $1('#payFormWrap');
 if(el) el.style.display = payFormOpen ? 'block' : 'none';
}

function updatePayPreview(){
 var varicent = pv('pp_varicent');
 var gross = pv('pp_gross');
 var pretax = pv('pp_pretax');
 var taxes = pv('pp_taxes');
 var posttax = pv('pp_posttax');
 var net = pv('pp_net');
 var mma = pv('pp_mma');

 var origGross = varicent > 0 ? varicent / (settings.yourShare/100) : 0;
 var partnerGot = origGross - varicent;
 var modelNet = gross - pretax - taxes - posttax;
 var diff = Math.abs(net - modelNet);
 var matchLabel = diff < 1 ? '<span class="strong">Perfect match</span>' : diff < 10 ? '<span class="possible">Close (diff: '+fmt(diff)+')</span>' : (net > 0 ? '<span style="color:var(--red);font-weight:600">Check entries (diff: '+fmt(diff)+')</span>' : '\u2014');

 var tierHtml = mma > 0 ? ('<span class="badge '+(mma>=6667?'badge-grn':mma>=5000?'badge-amb':'badge-red')+'">'+tierText(mma)+'</span> \u2014 3MMA: '+fmt(mma)) : '\u2014';

 var h = '<h4>Live Calculation Preview</h4>';
 h += '<table style="max-width:500px;font-size:13px">';
 h += '<tr><td>Your commission (entered)</td><td style="text-align:right"><b>'+fmt(varicent)+'</b></td></tr>';
 h += '<tr><td>Original gross (reverse: /'+settings.yourShare+'%)</td><td style="text-align:right">'+fmt(origGross)+'</td></tr>';
 h += '<tr><td>Partner received</td><td style="text-align:right">'+fmt(partnerGot)+'</td></tr>';
 h += '<tr><td colspan="2" style="border-top:2px solid var(--border);padding:2px"></td></tr>';
 h += '<tr><td>Model net pay</td><td style="text-align:right">'+fmt(modelNet)+'</td></tr>';
 h += '<tr><td>Actual payslip net</td><td style="text-align:right">'+fmt(net)+'</td></tr>';
 h += '<tr><td>Match</td><td style="text-align:right">'+matchLabel+'</td></tr>';
 h += '<tr><td>Tier</td><td style="text-align:right">'+tierHtml+'</td></tr>';
 h += '</table>';

 $1('#payPreview').innerHTML = h;

 // Pipeline match suggestions
 var sugEl = $1('#matchSuggestions');
 if(!sugEl) return;
 if(varicent > 0){
  var matches = [];
  cases.forEach(function(c){
   if(c.status === 'paid') return;
   var calc = calcCase(c);
   if(calc.agentShare <= 0) return;
   var pctDiff = Math.abs(calc.agentShare - varicent) / calc.agentShare;
   if(pctDiff <= 0.05){
    matches.push({c:c, calc:calc, pctDiff:pctDiff});
   }
  });
  if(matches.length){
   var mh = '<div class="match-box"><h4>Pipeline Match Suggestions</h4>';
   matches.forEach(function(m){
    var confidence = m.pctDiff < 0.005 ? '<span class="strong">Strong match</span>' : '<span class="possible">Possible match</span>';
    mh += '<div style="display:flex;align-items:center;gap:10px;margin:8px 0;padding:8px;background:#fff;border-radius:4px">';
    mh += '<div style="flex:1"><b>'+m.c.client+'</b> \u2014 '+m.c.product+'<br>Expected your share: '+fmt(m.calc.agentShare)+' (diff: '+(m.pctDiff*100).toFixed(2)+'%) '+confidence+'</div>';
    mh += '<button class="btn btn-sm btn-grn" onclick="confirmMatch('+m.c.id+')">Confirm Match</button>';
    mh += '</div>';
   });
   mh += '</div>';
   sugEl.innerHTML = mh;
  } else {
   sugEl.innerHTML = '';
  }
 } else {
  sugEl.innerHTML = '';
 }
}

function renderCashFlow(){
 var year = new Date().getFullYear();
 var now = new Date();
 var h = '<h2 style="margin-bottom:16px;color:var(--pri)">Cash Flow</h2>';

 // Calculate projections based on pipeline
 var paid = 0, pending30 = 0, pending60 = 0, pending90 = 0, pendingTotal = 0;
 var today = toYMD(now);
 var d30 = new Date(now); d30.setDate(d30.getDate()+30); var day30 = toYMD(d30);
 var d60 = new Date(now); d60.setDate(d60.getDate()+60); var day60 = toYMD(d60);
 var d90 = new Date(now); d90.setDate(d90.getDate()+90); var day90 = toYMD(d90);

 var nonCommProducts = ['Banking Incentive','Bonus','Other Income'];
 cases.forEach(function(c){
  // Skip non-commission line items for Net Pay Commissions
  if(nonCommProducts.indexOf(c.product) >= 0) return;
  var calc = calcCase(c);
  if(c.status === 'paid'){
   paid += calc.agentShare;
  } else {
   pendingTotal += calc.agentShare;
   var est = c.estPay || '';
   if(est && est <= day30) pending30 += calc.agentShare;
   else if(est && est <= day60) pending60 += calc.agentShare;
   else if(est && est <= day90) pending90 += calc.agentShare;
   else pending30 += calc.agentShare * 0.3; // no est date: spread estimate
  }
 });

 // YTD from pay periods
 var ytdNet = 0, ytdGross = 0, ytdVaricent = 0, ytdBasePay = 0;
 payPeriods.forEach(function(p){
  ytdNet += p.net || 0;
  ytdGross += p.gross || 0;
  ytdVaricent += p.varicent || 0;
  ytdBasePay += p.basePay || 0;
 });

 // Projection cards
 h += '<h3 style="margin-bottom:12px">Projected Income from Pipeline</h3>';
 h += '<div class="cf-grid">';
 h += '<div class="cf-card"><div class="cf-period">Next 30 Days</div><div class="cf-amount" style="color:var(--grn)">'+fmt(pending30)+'</div><div class="cf-sub">estimated commission</div></div>';
 h += '<div class="cf-card"><div class="cf-period">30-60 Days</div><div class="cf-amount" style="color:var(--amb)">'+fmt(pending60)+'</div><div class="cf-sub">estimated commission</div></div>';
 h += '<div class="cf-card"><div class="cf-period">60-90 Days</div><div class="cf-amount" style="color:var(--muted)">'+fmt(pending90)+'</div><div class="cf-sub">estimated commission</div></div>';
 h += '</div>';

 // Net Pay Commissions vs Actual Pay
 h += '<h3 style="margin-bottom:12px">Net Pay Commissions vs. Actual Pay</h3>';
 h += '<div class="cf-vs">';
 h += '<div class="cf-vs-card" style="border-top-color:var(--pri)"><h4>Net Pay Commissions</h4><div class="big" style="color:var(--pri)">'+fmt(paid + pendingTotal)+'</div><div style="font-size:11px;color:var(--muted)">Total commission on all cases</div></div>';
 h += '<div class="cf-vs-card" style="border-top-color:var(--grn)"><h4>Actual Pay (YTD)</h4><div class="big" style="color:var(--grn)">'+fmt(ytdNet)+'</div><div style="font-size:11px;color:var(--muted)">Commission + Banking + Bonus + Other Income</div></div>';
 h += '</div>';

 // Tax burden
 var ytdTaxes = 0, ytdDeductions = 0;
 payPeriods.forEach(function(p){
  ytdTaxes += p.taxes || 0;
  ytdDeductions += (p.preTax||0) + (p.postTax||0);
 });
 var effectiveTaxRate = ytdGross > 0 ? (ytdTaxes / ytdGross * 100).toFixed(1) : '0.0';
 var effectiveDeductionRate = ytdGross > 0 ? (ytdDeductions / ytdGross * 100).toFixed(1) : '0.0';
 var takeHomeRate = ytdGross > 0 ? (ytdNet / ytdGross * 100).toFixed(1) : '0.0';

 h += '<div class="card">';
 h += '<h3>Tax & Deduction Summary</h3>';
 h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px;text-align:center">';
 h += '<div><div style="font-size:11px;color:var(--muted)">Effective Tax Rate</div><div style="font-size:22px;font-weight:700;color:var(--red)">'+effectiveTaxRate+'%</div><div style="font-size:11px;color:var(--muted)">'+fmt(ytdTaxes)+' in taxes</div></div>';
 h += '<div><div style="font-size:11px;color:var(--muted)">Deduction Rate</div><div style="font-size:22px;font-weight:700;color:var(--amb)">'+effectiveDeductionRate+'%</div><div style="font-size:11px;color:var(--muted)">'+fmt(ytdDeductions)+' in deductions</div></div>';
 h += '<div><div style="font-size:11px;color:var(--muted)">Take-Home Rate</div><div style="font-size:22px;font-weight:700;color:var(--grn)">'+takeHomeRate+'%</div><div style="font-size:11px;color:var(--muted)">'+fmt(ytdNet)+' net deposited</div></div>';
 h += '</div></div>';

 // What You Need to Sell
 var mma = calc3MMA();
 var tier = tierText(mma);
 h += '<div class="needs-card">';
 h += '<h3>What You Need to Sell</h3>';
 h += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Based on your current '+tier+' tier (3MMA: '+fmt(mma)+')</div>';

 var targets = [
  {name:'Reach T3 ($5,000/mo)', mma:5000, show: mma < 5000},
  {name:'Reach T4 ($6,667/mo)', mma:6667, show: mma < 6667},
  {name:'$75K Annual Goal', annual:75000},
  {name:'$100K Annual Goal', annual:100000},
  {name:'$150K Annual Goal', annual:150000}
 ];

 targets.forEach(function(t){
  if(t.mma && !t.show) return;
  var needed;
  if(t.mma){
   needed = Math.max(0, (t.mma - mma) * 3);
   h += '<div class="needs-row"><span>'+t.name+'</span><span style="font-weight:600">'+fmt(needed)+' more in paid commission (next 3 months)</span></div>';
  } else {
   var remaining = Math.max(0, t.annual - paid);
   var monthsLeft = 12 - now.getMonth();
   var perMonth = monthsLeft > 0 ? remaining / monthsLeft : remaining;
   h += '<div class="needs-row"><span>'+t.name+'</span><span style="font-weight:600">'+fmt(remaining)+' remaining ('+fmt(perMonth)+'/mo)</span></div>';
  }
 });
 h += '</div>';

 // Monthly cash received
 h += '<div class="card">';
 h += '<h3>Monthly Cash Received ('+year+')</h3>';
 var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 var monthlyNet = {};
 for(var m=0;m<12;m++) monthlyNet[m] = 0;
 payPeriods.forEach(function(p){
  var mi = monthNames.indexOf(p.month);
  if(mi >= 0) monthlyNet[mi] += p.net || 0;
 });
 var maxMN = Math.max.apply(null, Object.values(monthlyNet).concat([1]));

 h += '<div class="monthly-grid">';
 for(var m=0;m<12;m++){
  var val = monthlyNet[m];
  var bg = val > 0 ? 'var(--gtint)' : '#f5f5f5';
  var color = val > 0 ? 'var(--grn)' : 'var(--muted)';
  h += '<div class="month-cell" style="background:'+bg+'">';
  h += '<div class="month-label">'+monthNames[m]+'</div>';
  h += '<div class="month-value" style="color:'+color+'">'+fmt(val).replace('$','').split('.')[0]+'</div>';
  h += '</div>';
 }
 h += '</div></div>';

 $1('#p3').innerHTML = h;
}

async function changePin(){
 var oldPin = ($1('#s_oldpin').value||'').trim();
 var newPin = ($1('#s_newpin').value||'').trim();
 var newPin2 = ($1('#s_newpin2').value||'').trim();

 if(!oldPin){ showToast('Enter current PIN', 2000); return; }
 if(!newPin || newPin.length < 4){ showToast('New PIN must be at least 4 digits', 2000); return; }
 if(newPin !== newPin2){ showToast('New PINs do not match', 2000); return; }

 var profile = await fetch(FIREBASE_URL + '/' + currentAgent.id + '/profile.json').then(function(r){return r.json();});
 var oldHash = await sha256(oldPin);
 if(oldHash !== profile.pin){ showToast('Current PIN is incorrect', 3000); return; }

 var newHash = await sha256(newPin);
 profile.pin = newHash;
 await fetch(FIREBASE_URL + '/' + currentAgent.id + '/profile.json', {method:'PUT', body: JSON.stringify(profile)});
 showToast('PIN changed successfully', 3000);
 $1('#s_oldpin').value = '';
 $1('#s_newpin').value = '';
 $1('#s_newpin2').value = '';
}

function downloadBackup(){
 var data = { agent: currentAgent, cases: cases, payPeriods: payPeriods, settings: settings, exported: new Date().toISOString(), version: APP_VERSION };
 var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
 var a = document.createElement('a');
 a.href = URL.createObjectURL(blob);
 a.download = 'DuetBooks_'+currentAgent.id+'_'+toYMD(new Date())+'.json';
 a.click();
 showToast('Backup downloaded', 2000);
}

function restoreBackup(input){
 var file = input.files[0];
 if(!file) return;
 var reader = new FileReader();
 reader.onload = function(e){
  try {
   var data = JSON.parse(e.target.result);
   if(!data.cases){ showToast('Invalid backup file', 3000); return; }
   if(!confirm('This will replace your current data with '+data.cases.length+' cases from the backup. Continue?')) return;
   cases = data.cases;
   payPeriods = data.payPeriods || [];
   if(data.settings) settings = Object.assign({}, defaultSettings, data.settings);
   nextCaseId = 1;
   cases.forEach(function(c){ if(c.id >= nextCaseId) nextCaseId = c.id + 1; });
   nextPeId = 1;
   payPeriods.forEach(function(p){ if(p.id >= nextPeId) nextPeId = p.id + 1; });
   saveCases();
   savePayPeriods();
   saveSettings();
   showToast('Restored '+cases.length+' cases and '+payPeriods.length+' pay periods from backup', 3000);
   renderAll();
  } catch(err){
   showToast('Error reading backup: ' + err.message, 4000);
  }
 };
 reader.readAsText(file);
 input.value = '';
}

var uploadedFiles = []; // [{name, base64, mediaType}]

 if(el) el.click();

 e.preventDefault();

function processFiles(fileList){
 var previewEl = $1('#upload_previews');
 var maxFiles = 4;
 if(uploadedFiles.length + fileList.length > maxFiles){
  showToast('Maximum '+maxFiles+' files at a time. Remove some first.', 3000);
  return;
 }
 for(var i=0;i<fileList.length;i++){
  (function(file){
   var reader = new FileReader();
   reader.onload = function(e){
    var base64 = e.target.result.split(',')[1];
    var mediaType = file.type || 'image/png';
    if(file.name.toLowerCase().endsWith('.pdf')) mediaType = 'application/pdf';
    uploadedFiles.push({name:file.name, base64:base64, mediaType:mediaType});
    // Show preview
    if(previewEl){
     var img = mediaType.startsWith('image/') ? '<img src="'+e.target.result+'" class="upload-preview">' : '<div style="padding:8px;background:#fff;border-radius:6px;font-size:11px">\uD83D\uDCC4 '+file.name+'</div>';
     previewEl.innerHTML += '<div style="position:relative">'+img+'<button onclick="removeUpload('+( uploadedFiles.length-1)+')" style="position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;line-height:20px">\u00D7</button></div>';
    }
   };
   reader.readAsDataURL(file);
  })(fileList[i]);
 }
 // Show process button
 setTimeout(function(){
  var statusEl = $1('#upload_status');
  if(statusEl && uploadedFiles.length > 0){
   statusEl.innerHTML = '<button class="btn btn-pri" onclick="processUploads()" style="margin-top:8px">\u2728 Read Documents with AI ('+uploadedFiles.length+' file'+(uploadedFiles.length>1?'s':'')+')</button>';
  }
 }, 300);
}

function removeUpload(idx){
 uploadedFiles.splice(idx, 1);
 // Re-render
 var previewEl = $1('#upload_previews');
 var statusEl = $1('#upload_status');
 if(previewEl) previewEl.innerHTML = '';
 if(statusEl) statusEl.innerHTML = '';
 if(uploadedFiles.length === 0) return;
 // Re-show remaining
 uploadedFiles.forEach(function(f, i){

 });
 statusEl.innerHTML = '<button class="btn btn-pri" onclick="processUploads()" style="margin-top:8px">\u2728 Read Documents with AI ('+uploadedFiles.length+' file'+(uploadedFiles.length>1?'s':'')+')</button>';
}

// Paste support
document.addEventListener('paste', function(e){
 if(!currentAgent || activeTab !== 2) return;
 var items = (e.clipboardData || e.originalEvent.clipboardData).items;
 var files = [];
 for(var i=0;i<items.length;i++){
  if(items[i].type.indexOf('image') !== -1){
   files.push(items[i].getAsFile());

 }
 if(files.length > 0){

 }
});

async function processUploads(){
 var apiKey = getApiKey();
 if(!apiKey){
  showToast('Please add your Anthropic API key in Settings first', 4000);
  showTab(5);
  return;
 }
 if(uploadedFiles.length === 0){
  showToast('No files uploaded', 2000);
  return;
 }

 var statusEl = $1('#upload_status');
 var totalFiles = uploadedFiles.length;
 statusEl.innerHTML = '<div class="upload-processing"><div class="spinner"></div>Reading '+totalFiles+' document'+(totalFiles>1?'s':'')+'... this takes a few seconds per file</div>';

 var allResults = [];
 var errors = [];

 // Process each file separately so each gets its own pay period
 for(var fi=0; fi<uploadedFiles.length; fi++){
  var f = uploadedFiles[fi];
  statusEl.innerHTML = '<div class="upload-processing"><div class="spinner"></div>Reading document '+(fi+1)+' of '+totalFiles+': '+f.name+'</div>';

  var content = [];
  if(f.mediaType === 'application/pdf'){
   content.push({type:'document', source:{type:'base64', media_type:'application/pdf', data:f.base64}});
  } else {
   content.push({type:'image', source:{type:'base64', media_type:f.mediaType, data:f.base64}});
  }
  content.push({type:'text', text:'This is a pay document from an AAA Life Insurance Specialist. It is EITHER a Varicent Commission Statement OR a Workday Payslip (identify which one it is).\n\nExtract ALL data and return as JSON with this EXACT structure:\n\n{"doc_type":"varicent or workday","period_label":"e.g. Apr P1 or Jan P2","month":"e.g. Apr","mma":0,"varicent_commission":0,"base_pay":0,"gross_pay":0,"banking_incentive":0,"bonuses":0,"pre_tax_deductions":0,"employee_taxes":0,"post_tax_deductions":0,"net_pay":0,"notes":"","cases":[]}\n\nIMPORTANT:\n- "doc_type" must be "varicent" or "workday" based on what this document is\n- If this is a VARICENT statement: fill in period_label, month, mma, varicent_commission, and the cases array\n- If this is a WORKDAY payslip: fill in base_pay (the base salary/regular earnings BEFORE commission), gross_pay, banking_incentive, bonuses, pre_tax_deductions, employee_taxes, post_tax_deductions, net_pay\n- Use the ACTUAL pay period date from the document, not today\'s date\n\nThe "cases" array (Varicent only) is CRITICAL. For EVERY individual line item in the 3MMA Transaction Details, extract the EXACT values from the document:\n{"client":"Insured Name exactly as shown","product":"Product Type exactly as shown (e.g. Ordinary Life, Platinum Annuity 5)","plan_code":"Plan Code as shown (e.g. G22AR, PL5NQ)","paid_premium":0,"production_credit":0,"mma_rate":0,"commission":0,"is_split":false}\n\n- "client" = the Insured Name column\n- "product" = the Product Type column exactly as written\n- "plan_code" = the Plan Code column\n- "paid_premium" = the Paid Premium column (what client paid)\n- "production_credit" = the Production Credit column\n- "mma_rate" = the 3MMA Incentive Commission Rate column (e.g. 50.00 for 50%, 2.85 for 2.85%)\n- "commission" = the New Incentive Commission column (the actual commission amount)\n- "is_split" = true if LPSplitCommInd column says SPLIT, false otherwise\n\nExtract EVERY line item exactly as shown. Do not calculate or modify any numbers.\n\nReturn ONLY valid JSON, no markdown or explanation.'});

  try {
   var resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
     'Content-Type': 'application/json',
     'x-api-key': apiKey,
     'anthropic-version': '2023-06-01',
     'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
     model: 'claude-sonnet-4-20250514',
     max_tokens: 2048,
     messages: [{role:'user', content:content}]
    })
   });

   if(!resp.ok){
    var errText = await resp.text();
    errors.push(f.name + ': API error ' + resp.status);
    continue;
   }

   var data = await resp.json();
   var text = data.content[0].text.trim();
   if(text.startsWith('```')) text = text.replace(/```json?\n?/,'').replace(/```$/,'').trim();
   var parsed = JSON.parse(text);
   parsed._filename = f.name;
   allResults.push(parsed);
  } catch(err){
   errors.push(f.name + ': ' + err.message);
  }
 }

 // Now process all results — group Varicent and Workday separately
 var varicents = allResults.filter(function(r){return r.doc_type === 'varicent'});
 var workdays = allResults.filter(function(r){return r.doc_type === 'workday'});

 // Helper: get correct year and submitted date for a month label
 // If month is after current month, it's from the prior year (e.g., Dec doc uploaded in Jan)
 var monthList = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 function getCaseDate(monthStr){
  var mi = monthList.indexOf(monthStr || '');
  if(mi < 0) return { submitted: toYMD(new Date()), year: new Date().getFullYear() };
  var curMonth = new Date().getMonth();
  var yr = (mi > curMonth) ? new Date().getFullYear() - 1 : new Date().getFullYear();
  return { submitted: yr + '-' + String(mi+1).padStart(2,'0') + '-15', year: yr };
 }

 var totalNewCases = 0, totalUpdatedCases = 0, periodsCreated = 0, duplicatesSkipped = 0;

 // Auto-save each pay period
 // Try to pair Varicent + Workday by period label/month, otherwise create separate entries
 var usedWorkdays = {};

 varicents.forEach(function(v){
  // DUPLICATE CHECK — skip if matching pay period already exists
  // Check by: (1) same period label, OR (2) same month + same varicent commission amount
  var periodLabel = (v.period_label || '').toLowerCase().trim();
  var vMonth = (v.month || '').toLowerCase().trim();
  var vComm = Math.round((v.varicent_commission || 0) * 100); // compare pennies to avoid float issues
  var dupPeriod = payPeriods.find(function(p){
   if(periodLabel && p.label && p.label.toLowerCase().trim() === periodLabel) return true;
   if(vMonth && p.month && p.month.toLowerCase().trim() === vMonth && Math.round((p.varicent||0)*100) === vComm && vComm > 0) return true;
   return false;
  });
  if(dupPeriod){
   duplicatesSkipped++;
   return; // skip this varicent — already imported
  }

  // Find matching workday by month
  var matchedW = null;
  workdays.forEach(function(w, wi){
   if(!usedWorkdays[wi] && w.month && v.month && w.month.toLowerCase() === v.month.toLowerCase()){
    matchedW = w; usedWorkdays[wi] = true;
   }
  });

  // Create pay period combining varicent + matched workday
  var pe = {
   id: nextPeId++,
   label: v.period_label || ('Period ' + (payPeriods.length + 1)),
   month: v.month || '',
   mma: v.mma || 0,
   varicent: v.varicent_commission || 0,
   basePay: matchedW ? (matchedW.base_pay || 0) : 0,
   gross: matchedW ? (matchedW.gross_pay || 0) : 0,
   banking: matchedW ? (matchedW.banking_incentive || 0) : 0,
   bonuses: matchedW ? (matchedW.bonuses || 0) : 0,
   preTax: matchedW ? (matchedW.pre_tax_deductions || 0) : 0,
   taxes: matchedW ? (matchedW.employee_taxes || 0) : 0,
   postTax: matchedW ? (matchedW.post_tax_deductions || 0) : 0,
   net: matchedW ? (matchedW.net_pay || 0) : 0,
   notes: 'Auto-imported from ' + v._filename + (matchedW ? ' + ' + matchedW._filename : ''),
   created: new Date().toISOString()
  };
  payPeriods.push(pe);
  periodsCreated++;

  // Process cases from this Varicent into Book of Business
  if(v.cases && v.cases.length > 0){
   v.cases.forEach(function(pc){
    if(!pc.client) return;
    var existing = cases.find(function(c){
     return c.client.toLowerCase().trim() === pc.client.toLowerCase().trim();
    });
    if(existing){
     if(existing.status !== 'paid'){
      existing.status = 'paid';
      existing.paidDate = toYMD(new Date());
      existing.paidIn = v.period_label || '';
      // Store actual Varicent commission — don't recalculate
      if(pc.commission) existing.actualCommission = pc.commission;
      if(pc.paid_premium) existing.amount = pc.paid_premium;
      if(pc.mma_rate) existing.rate = pc.mma_rate;
      if(pc.is_split) existing.split = 'split';
      totalUpdatedCases++;
     }
    } else {
     // Use actual Varicent values — store commission directly
     var prodLabel = pc.product || 'Unknown Product';
     if(pc.plan_code) prodLabel += ' (' + pc.plan_code + ')';
     cases.push({
      id: nextCaseId++,
      client: pc.client.trim(),
      phone: '',
      product: prodLabel,
      amount: pc.paid_premium || pc.production_credit || 0,
      rate: pc.mma_rate || 0,
      actualCommission: pc.commission || 0,
      split: pc.is_split ? 'split' : 'full',
      splitName: '', splitEmail: '',
      status: 'paid',
      submitted: getCaseDate(v.month).submitted,
      estPay: '',
      paidDate: toYMD(new Date()),
      paidIn: v.period_label || '',
      notes: 'Varicent | Paid Premium: $'+(pc.paid_premium||0).toFixed(2)+' | Prod Credit: $'+(pc.production_credit||0).toFixed(2)+' | 3MMA Rate: '+(pc.mma_rate||0)+'%',
      year: getCaseDate(v.month).year,
      created: new Date().toISOString()
     });
     totalNewCases++;
    }
   });
  }

  // Import Banking Incentive as a Book of Business line item
  var bankingAmt = matchedW ? (matchedW.banking_incentive || 0) : 0;
  if(bankingAmt > 0){
   var bankingBase = Math.round(bankingAmt / 0.05 * 100) / 100; // reverse 5% to get total amount
   var bankingLabel = 'Banking Incentive - ' + (v.month || 'Unknown');
   // Check if already exists
   var existingBank = cases.find(function(c){
    return c.product === 'Banking Incentive' && c.paidIn && c.paidIn.toLowerCase().trim() === (v.period_label||'').toLowerCase().trim();
   });
   if(!existingBank){
    cases.push({
     id: nextCaseId++,
     client: bankingLabel,
     phone: '',
     product: 'Banking Incentive',
     amount: bankingBase,
     rate: 5,
     actualCommission: bankingAmt,
     split: 'full',
     splitName: '', splitEmail: '',
     status: 'paid',
     submitted: getCaseDate(v.month).submitted,
     estPay: '',
     paidDate: toYMD(new Date()),
     paidIn: v.period_label || '',
     notes: 'Banking Incentive | 5% of $'+bankingBase.toFixed(2)+' = $'+bankingAmt.toFixed(2),
     year: getCaseDate(v.month).year,
     created: new Date().toISOString()
    });
    totalNewCases++;
   }
  }

  // Import Bonuses as a Book of Business line item
  var bonusAmt = matchedW ? (matchedW.bonuses || 0) : 0;
  if(bonusAmt > 0){
   var bonusLabel = 'Bonus - ' + (v.month || 'Unknown');
   var existingBonus = cases.find(function(c){
    return c.product === 'Bonus' && c.paidIn && c.paidIn.toLowerCase().trim() === (v.period_label||'').toLowerCase().trim();
   });
   if(!existingBonus){
    cases.push({
     id: nextCaseId++, client: bonusLabel, phone: '', product: 'Bonus',
     amount: bonusAmt, rate: 100, actualCommission: bonusAmt,
     split: 'full', splitName: '', splitEmail: '', status: 'paid',
     submitted: getCaseDate(v.month).submitted, estPay: '', paidDate: toYMD(new Date()),
     paidIn: v.period_label || '',
     notes: 'Bonus from Workday payslip | $'+bonusAmt.toFixed(2),
     year: getCaseDate(v.month).year, created: new Date().toISOString()
    });
    totalNewCases++;
   }
  }

  // Import Other Income (base pay minus taxes/deductions) so YTD totals match net pay
  if(matchedW){
   var wNet = matchedW.net_pay || 0;
   var wVaricent = v.varicent_commission || 0;
   var otherIncome = wNet - wVaricent - bankingAmt - bonusAmt;
   if(otherIncome > 0){
    var otherLabel = 'Other Income - ' + (v.month || 'Unknown');
    var existingOther = cases.find(function(c){
     return c.product === 'Other Income' && c.paidIn && c.paidIn.toLowerCase().trim() === (v.period_label||'').toLowerCase().trim();
    });
    if(!existingOther){
     cases.push({
      id: nextCaseId++, client: otherLabel, phone: '', product: 'Other Income',
      amount: otherIncome, rate: 100, actualCommission: otherIncome,
      split: 'full', splitName: '', splitEmail: '', status: 'paid',
      submitted: getCaseDate(v.month).submitted, estPay: '', paidDate: toYMD(new Date()),
      paidIn: v.period_label || '',
      notes: 'Other Income (base pay net of taxes/deductions) | $'+otherIncome.toFixed(2),
      year: getCaseDate(v.month).year, created: new Date().toISOString()
     });
     totalNewCases++;
    }
   }
  }
 });

 // Any unmatched workdays become their own pay periods
 workdays.forEach(function(w, wi){
  if(usedWorkdays[wi]) return;
  // DUPLICATE CHECK — skip if matching pay period already exists
  var wLabel = (w.period_label || '').toLowerCase().trim();
  var wMonth = (w.month || '').toLowerCase().trim();
  var wNet = Math.round((w.net_pay || 0) * 100);
  var dupW = payPeriods.find(function(p){
   if(wLabel && p.label && p.label.toLowerCase().trim() === wLabel) return true;
   if(wMonth && p.month && p.month.toLowerCase().trim() === wMonth && Math.round((p.net||0)*100) === wNet && wNet > 0) return true;
   return false;
  });
  if(dupW){ duplicatesSkipped++; return; }
  payPeriods.push({
   id: nextPeId++,
   label: w.period_label || ('Payslip ' + (payPeriods.length + 1)),
   month: w.month || '',
   mma: 0,
   varicent: 0,
   basePay: w.base_pay || 0,
   gross: w.gross_pay || 0,
   banking: w.banking_incentive || 0,
   bonuses: w.bonuses || 0,
   preTax: w.pre_tax_deductions || 0,
   taxes: w.employee_taxes || 0,
   postTax: w.post_tax_deductions || 0,
   net: w.net_pay || 0,
   notes: 'Auto-imported from ' + w._filename,
   created: new Date().toISOString()
  });
  periodsCreated++;

  // Import Banking Incentive from standalone Workday
  var wBanking = w.banking_incentive || 0;
  if(wBanking > 0){
   var wBankBase = Math.round(wBanking / 0.05 * 100) / 100;
   var wBankLabel = 'Banking Incentive - ' + (w.month || 'Unknown');
   var existingWBank = cases.find(function(c){
    return c.product === 'Banking Incentive' && c.paidIn && c.paidIn.toLowerCase().trim() === (w.period_label||'').toLowerCase().trim();
   });
   if(!existingWBank){
    cases.push({
     id: nextCaseId++,
     client: wBankLabel,
     phone: '',
     product: 'Banking Incentive',
     amount: wBankBase,
     rate: 5,
     actualCommission: wBanking,
     split: 'full',
     splitName: '', splitEmail: '',
     status: 'paid',
     submitted: getCaseDate(w.month).submitted,
     estPay: '',
     paidDate: toYMD(new Date()),
     paidIn: w.period_label || '',
     notes: 'Banking Incentive | 5% of $'+wBankBase.toFixed(2)+' = $'+wBanking.toFixed(2),
     year: getCaseDate(w.month).year,
     created: new Date().toISOString()
    });
    totalNewCases++;
   }
  }

  // Import Bonuses from standalone Workday
  var wBonus = w.bonuses || 0;
  if(wBonus > 0){
   var wBonusLabel = 'Bonus - ' + (w.month || 'Unknown');
   var existingWBonus = cases.find(function(c){
    return c.product === 'Bonus' && c.paidIn && c.paidIn.toLowerCase().trim() === (w.period_label||'').toLowerCase().trim();
   });
   if(!existingWBonus){
    cases.push({
     id: nextCaseId++, client: wBonusLabel, phone: '', product: 'Bonus',
     amount: wBonus, rate: 100, actualCommission: wBonus,
     split: 'full', splitName: '', splitEmail: '', status: 'paid',
     submitted: getCaseDate(w.month).submitted, estPay: '', paidDate: toYMD(new Date()),
     paidIn: w.period_label || '',
     notes: 'Bonus from Workday payslip | $'+wBonus.toFixed(2),
     year: getCaseDate(w.month).year, created: new Date().toISOString()
    });
    totalNewCases++;
   }
  }

  // Import Other Income so YTD totals match net pay
  var wNetPay = w.net_pay || 0;
  var wOtherIncome = wNetPay - wBanking - wBonus;
  if(wOtherIncome > 0){
   var wOtherLabel = 'Other Income - ' + (w.month || 'Unknown');
   var existingWOther = cases.find(function(c){
    return c.product === 'Other Income' && c.paidIn && c.paidIn.toLowerCase().trim() === (w.period_label||'').toLowerCase().trim();
   });
   if(!existingWOther){
    cases.push({
     id: nextCaseId++, client: wOtherLabel, phone: '', product: 'Other Income',
     amount: wOtherIncome, rate: 100, actualCommission: wOtherIncome,
     split: 'full', splitName: '', splitEmail: '', status: 'paid',
     submitted: getCaseDate(w.month).submitted, estPay: '', paidDate: toYMD(new Date()),
     paidIn: w.period_label || '',
     notes: 'Other Income (base pay net of taxes/deductions) | $'+wOtherIncome.toFixed(2),
     year: getCaseDate(w.month).year, created: new Date().toISOString()
    });
    totalNewCases++;
   }
  }
 });

 // Save everything
 if(periodsCreated > 0) savePayPeriods();
 if(totalNewCases > 0 || totalUpdatedCases > 0) saveCases();

 // Build summary message
 var msg = [];
 if(periodsCreated > 0) msg.push(periodsCreated + ' pay period'+(periodsCreated>1?'s':'')+' created');
 if(totalNewCases > 0) msg.push(totalNewCases + ' new case'+(totalNewCases>1?'s':'')+' added to Book of Business');
 if(totalUpdatedCases > 0) msg.push(totalUpdatedCases + ' case'+(totalUpdatedCases>1?'s':'')+' marked as Paid');
 if(duplicatesSkipped > 0) msg.push(duplicatesSkipped + ' duplicate'+(duplicatesSkipped>1?'s':'')+' skipped (already imported)');
 if(errors.length > 0) msg.push(errors.length + ' file'+(errors.length>1?'s':'')+' had errors');

 var summaryIcon = duplicatesSkipped > 0 && periodsCreated === 0 && totalNewCases === 0 ? '\u26A0\uFE0F' : '\u2705';
 var summaryBg = duplicatesSkipped > 0 && periodsCreated === 0 && totalNewCases === 0 ? 'var(--atint,#fff8e1)' : 'var(--gtint)';
 var summaryColor = duplicatesSkipped > 0 && periodsCreated === 0 && totalNewCases === 0 ? 'var(--amb)' : 'var(--grn)';
 var summaryHtml = '<div style="padding:12px;background:'+summaryBg+';border-radius:6px;color:'+summaryColor+';font-size:12px;font-weight:600">'+summaryIcon+' ' + (msg.length > 0 ? msg.join(' \u2022 ') : 'No new data to import') + '</div>';
 if(errors.length > 0){
  summaryHtml += '<div style="padding:8px;background:var(--rtint);border-radius:6px;color:var(--red);font-size:11px;margin-top:6px">Errors: ' + errors.join(', ') + '</div>';
 }
 statusEl.innerHTML = summaryHtml;
 showToast(msg.join('. '), 5000);

 // Clear uploads and re-render
 uploadedFiles = [];
 $1('#upload_previews').innerHTML = '';
 payFormOpen = false;
 renderPayPeriods();
 renderBookOfBusiness();
 renderDashboard();
 renderCashFlow();
}

 if(fbFilterStatus) items = items.filter(function(f){ return f.status === fbFilterStatus; });

 if(fbSearchQuery){
  var q = fbSearchQuery.toLowerCase();
  items = items.filter(function(f){ return (f.title||'').toLowerCase().indexOf(q)!==-1 || (f.description||'').toLowerCase().indexOf(q)!==-1 || (f.agentName||'').toLowerCase().indexOf(q)!==-1; });
 }

 // Sort newest first
 items.sort(function(a,b){ return (b.timestamp||'').localeCompare(a.timestamp||''); });

 // Stats
 var allForStats = admin ? feedbackItems : feedbackItems.filter(function(f){ return f.agentId === currentAgent.id; });
 var newCount = allForStats.filter(function(f){ return f.status==='new'; }).length;
 var reviewCount = allForStats.filter(function(f){ return f.status==='reviewing'; }).length;

 var h = '';

 h += '</div></div>';
