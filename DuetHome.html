<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1419">
<title>DuetHome — Home Project Tracker</title>
<style>
  :root {
    --bg: #0f1419;
    --bg-elev: #161c24;
    --bg-card: #1b232d;
    --border: #2a3441;
    --text: #e6edf3;
    --text-dim: #8b98a8;
    --accent: #4f9da6;
    --accent-hover: #5fb3bd;
    --accent-soft: rgba(79, 157, 166, 0.15);
    --pending: #d6a23c;
    --progress: #4f9da6;
    --complete: #4caf7d;
    --danger: #e0594f;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(15, 20, 25, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
  }
  .brand .logo {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #3a7a82);
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 800;
    font-size: 0.85rem;
  }
  .brand .suite { color: var(--text-dim); font-weight: 400; font-size: 0.78rem; }

  .btn {
    font: inherit;
    cursor: pointer;
    border: none;
    border-radius: 9px;
    padding: 10px 16px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: background .15s, transform .05s, border-color .15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
  .btn-danger:hover { border-color: var(--danger); }

  /* ---------- Layout ---------- */
  main { max-width: 960px; margin: 0 auto; padding: 20px; }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat .num { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .stat .lbl { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .stat.budget .num { font-size: 1.15rem; }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font: inherit;
    font-size: 0.9rem;
  }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  select.filter {
    padding: 10px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font: inherit;
    font-size: 0.9rem;
    cursor: pointer;
  }

  /* ---------- Project cards ---------- */
  .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .15s, transform .1s;
  }
  .card:hover { border-color: #3a4756; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card h3 { font-size: 1.05rem; letter-spacing: -0.01em; word-break: break-word; }
  .badge {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.pending { background: rgba(214,162,60,.15); color: var(--pending); }
  .badge.progress { background: rgba(79,157,166,.18); color: var(--progress); }
  .badge.complete { background: rgba(76,175,125,.15); color: var(--complete); }

  .card .cat {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.78rem; color: var(--text-dim);
  }
  .card .cat .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

  .card-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-dim); }
  .card-row svg { flex-shrink: 0; color: var(--text-dim); }
  .card-row a { color: var(--accent); text-decoration: none; }
  .card-row a:hover { text-decoration: underline; }

  .cost-bar {
    display: flex; justify-content: space-between;
    background: var(--bg-elev); border-radius: 8px; padding: 10px 12px;
    font-size: 0.82rem;
  }
  .cost-bar .col { display: flex; flex-direction: column; }
  .cost-bar .col .k { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .cost-bar .col .v { font-weight: 600; font-size: 0.95rem; }
  .cost-bar .over { color: var(--danger); }
  .cost-bar .under { color: var(--complete); }

  .notes { font-size: 0.84rem; color: var(--text-dim); white-space: pre-wrap; word-break: break-word; }

  .photos { display: flex; gap: 6px; flex-wrap: wrap; }
  .photos img { width: 54px; height: 54px; object-fit: cover; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; }

  .card-actions { display: flex; gap: 8px; margin-top: 4px; border-top: 1px solid var(--border); padding-top: 12px; }
  .card-actions .btn { padding: 7px 12px; font-size: 0.82rem; flex: 1; justify-content: center; }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
    border: 2px dashed var(--border); border-radius: var(--radius); grid-column: 1/-1;
  }
  .empty svg { opacity: 0.4; margin-bottom: 12px; }

  /* ---------- Modal ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 24px 16px; overflow-y: auto;
    backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 520px;
    box-shadow: var(--shadow);
    margin: auto;
  }
  .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-head h2 { font-size: 1.15rem; letter-spacing: -0.02em; }
  .modal-head .close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; line-height: 1; padding: 0 4px; }
  .modal-head .close:hover { color: var(--text); }
  .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 0.8rem; color: var(--text-dim); font-weight: 600; }
  .field input, .field select, .field textarea {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 13px;
    color: var(--text);
    font: inherit;
    font-size: 0.92rem;
    width: 100%;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .photo-input-wrap { display: flex; flex-direction: column; gap: 8px; }
  .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; }
  .photo-preview .thumb { position: relative; }
  .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .photo-preview .rm {
    position: absolute; top: -6px; right: -6px;
    background: var(--danger); color: #fff; border: none; border-radius: 50%;
    width: 20px; height: 20px; cursor: pointer; font-size: 0.85rem; line-height: 1; display: grid; place-items: center;
  }
  .file-label {
    display: inline-flex; align-items: center; gap: 7px;
    border: 1px dashed var(--border); border-radius: 9px; padding: 10px 14px;
    color: var(--text-dim); cursor: pointer; font-size: 0.88rem; width: fit-content;
  }
  .file-label:hover { border-color: var(--accent); color: var(--text); }
  .file-label input { display: none; }
  .modal-foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ---------- Lightbox ---------- */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: none; align-items: center; justify-content: center; z-index: 200; padding: 30px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 10px; }

  footer { text-align: center; color: var(--text-dim); font-size: 0.78rem; padding: 30px 20px 40px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .header-inner { padding: 12px 16px; }
    main { padding: 16px; }
    .brand .suite { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo">DH</div>
      <div>
        DuetHome
        <div class="suite">part of the Duet Suite</div>
      </div>
    </div>
    <button class="btn btn-primary" id="addBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New Project
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search projects, contractors, categories…">
    </div>
    <select class="filter" id="statusFilter">
      <option value="">All statuses</option>
      <option value="pending">Pending</option>
      <option value="in progress">In Progress</option>
      <option value="complete">Complete</option>
    </select>
    <select class="filter" id="categoryFilter">
      <option value="">All categories</option>
    </select>
  </div>

  <div class="projects" id="projects"></div>
</main>

<footer>DuetHome · Data stored locally in your browser · No account needed</footer>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">New Project</h2>
      <button class="close" id="closeModal">&times;</button>
    </div>
    <form id="projectForm">
      <div class="modal-body">
        <input type="hidden" id="projectId">
        <div class="field">
          <label for="name">Project Name *</label>
          <input type="text" id="name" required placeholder="e.g. Master bath remodel">
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="status">Status</label>
            <select id="status">
              <option value="pending">Pending</option>
              <option value="in progress">In Progress</option>
              <option value="complete">Complete</option>
            </select>
          </div>
          <div class="field">
            <label for="category">Category</label>
            <input type="text" id="category" list="catList" placeholder="Plumbing, Electrical…">
            <datalist id="catList">
              <option value="Plumbing"><option value="Electrical"><option value="Landscaping">
              <option value="Painting"><option value="Roofing"><option value="Flooring">
              <option value="HVAC"><option value="Carpentry"><option value="Masonry"><option value="General">
            </datalist>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="contractor">Contractor Name</label>
            <input type="text" id="contractor" placeholder="Who's doing the work">
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="(555) 123-4567">
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="estCost">Estimated Cost ($)</label>
            <input type="number" id="estCost" min="0" step="0.01" placeholder="0.00">
          </div>
          <div class="field">
            <label for="actCost">Actual Cost ($)</label>
            <input type="number" id="actCost" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
        <div class="field">
          <label for="notes">Notes & Comments</label>
          <textarea id="notes" placeholder="Quotes, schedules, reminders…"></textarea>
        </div>
        <div class="field">
          <label>Photos</label>
          <div class="photo-input-wrap">
            <label class="file-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3"/></svg>
              Add photos
              <input type="file" id="photoInput" accept="image/*" multiple>
            </label>
            <div class="photo-preview" id="photoPreview"></div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Project</button>
      </div>
    </form>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt=""></div>

<script>
(function () {
  "use strict";
  const STORAGE_KEY = "duethome.projects.v1";
  const $ = (id) => document.getElementById(id);

  let projects = load();
  let pendingPhotos = []; // base64 strings being edited in the modal

  /* ---------- Storage ---------- */
  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch (e) { return []; }
  }
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    } catch (e) {
      alert("Could not save — storage may be full (photos take space). Try removing some photos.");
    }
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  /* ---------- Helpers ---------- */
  const statusClass = { "pending": "pending", "in progress": "progress", "complete": "complete" };
  function money(n) {
    if (n === "" || n === null || n === undefined || isNaN(n)) return "—";
    return "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  /* ---------- Render ---------- */
  function render() {
    renderStats();
    renderCategoryFilter();
    renderProjects();
  }

  function renderStats() {
    const total = projects.length;
    const inProg = projects.filter(p => p.status === "in progress").length;
    const done = projects.filter(p => p.status === "complete").length;
    const spent = projects.reduce((s, p) => s + (Number(p.actCost) || 0), 0);
    $("stats").innerHTML = `
      <div class="stat"><div class="num">${total}</div><div class="lbl">Projects</div></div>
      <div class="stat"><div class="num" style="color:var(--progress)">${inProg}</div><div class="lbl">In Progress</div></div>
      <div class="stat"><div class="num" style="color:var(--complete)">${done}</div><div class="lbl">Complete</div></div>
      <div class="stat budget"><div class="num">${money(spent)}</div><div class="lbl">Total Spent</div></div>
    `;
  }

  function renderCategoryFilter() {
    const cats = [...new Set(projects.map(p => p.category).filter(Boolean))].sort();
    const sel = $("categoryFilter");
    const cur = sel.value;
    sel.innerHTML = '<option value="">All categories</option>' +
      cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
    sel.value = cats.includes(cur) ? cur : "";
  }

  function renderProjects() {
    const q = $("searchInput").value.trim().toLowerCase();
    const sf = $("statusFilter").value;
    const cf = $("categoryFilter").value;

    let list = projects.filter(p => {
      if (sf && p.status !== sf) return false;
      if (cf && p.category !== cf) return false;
      if (q) {
        const hay = [p.name, p.category, p.contractor, p.notes, p.status].join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const order = { "in progress": 0, "pending": 1, "complete": 2 };
    list.sort((a, b) => (order[a.status] - order[b.status]) || (b.created - a.created));

    const container = $("projects");
    if (!list.length) {
      container.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5 12 4l9 5.5"/><path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/><path d="M9 20v-6h6v6"/></svg>
        <div>${projects.length ? "No projects match your filters." : "No projects yet — add your first one!"}</div>
      </div>`;
      return;
    }

    container.innerHTML = list.map(p => {
      const est = Number(p.estCost) || 0, act = Number(p.actCost) || 0;
      let costCmp = "";
      if (p.estCost !== "" && p.actCost !== "" && act > 0 && est > 0) {
        const diff = act - est;
        costCmp = diff > 0
          ? `<span class="over">+${money(diff)} over</span>`
          : diff < 0 ? `<span class="under">${money(Math.abs(diff))} under</span>` : `<span class="under">on budget</span>`;
      }
      return `<div class="card">
        <div class="card-top">
          <h3>${esc(p.name)}</h3>
          <span class="badge ${statusClass[p.status]}">${esc(p.status)}</span>
        </div>
        ${p.category ? `<span class="cat"><span class="dot"></span>${esc(p.category)}</span>` : ""}
        ${p.contractor ? `<div class="card-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${esc(p.contractor)}</div>` : ""}
        ${p.phone ? `<div class="card-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
          <a href="tel:${esc(p.phone)}">${esc(p.phone)}</a></div>` : ""}
        ${(p.estCost !== "" || p.actCost !== "") ? `<div class="cost-bar">
          <div class="col"><span class="k">Estimated</span><span class="v">${money(p.estCost)}</span></div>
          <div class="col"><span class="k">Actual</span><span class="v">${money(p.actCost)}</span></div>
          ${costCmp ? `<div class="col" style="text-align:right"><span class="k">&nbsp;</span><span class="v" style="font-size:.82rem">${costCmp}</span></div>` : ""}
        </div>` : ""}
        ${p.notes ? `<div class="notes">${esc(p.notes)}</div>` : ""}
        ${(p.photos && p.photos.length) ? `<div class="photos">${p.photos.map(src => `<img src="${src}" data-full="${src}" alt="photo">`).join("")}</div>` : ""}
        <div class="card-actions">
          <button class="btn btn-ghost" data-edit="${p.id}">Edit</button>
          <button class="btn btn-danger" data-del="${p.id}">Delete</button>
        </div>
      </div>`;
    }).join("");
  }

  /* ---------- Modal ---------- */
  function openModal(project) {
    $("projectForm").reset();
    pendingPhotos = [];
    if (project) {
      $("modalTitle").textContent = "Edit Project";
      $("projectId").value = project.id;
      $("name").value = project.name || "";
      $("status").value = project.status || "pending";
      $("category").value = project.category || "";
      $("contractor").value = project.contractor || "";
      $("phone").value = project.phone || "";
      $("estCost").value = project.estCost === undefined ? "" : project.estCost;
      $("actCost").value = project.actCost === undefined ? "" : project.actCost;
      $("notes").value = project.notes || "";
      pendingPhotos = (project.photos || []).slice();
    } else {
      $("modalTitle").textContent = "New Project";
      $("projectId").value = "";
    }
    renderPhotoPreview();
    $("overlay").classList.add("open");
    setTimeout(() => $("name").focus(), 50);
  }
  function closeModal() { $("overlay").classList.remove("open"); }

  function renderPhotoPreview() {
    $("photoPreview").innerHTML = pendingPhotos.map((src, i) =>
      `<div class="thumb"><img src="${src}" alt=""><button type="button" class="rm" data-rm="${i}">&times;</button></div>`
    ).join("");
  }

  function handleFiles(files) {
    const MAX_DIM = 1280, QUALITY = 0.75;
    Array.from(files).forEach(file => {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > MAX_DIM) { height = height * MAX_DIM / width; width = MAX_DIM; }
          else if (height > MAX_DIM) { width = width * MAX_DIM / height; height = MAX_DIM; }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          pendingPhotos.push(canvas.toDataURL("image/jpeg", QUALITY));
          renderPhotoPreview();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  /* ---------- Events ---------- */
  $("addBtn").addEventListener("click", () => openModal(null));
  $("closeModal").addEventListener("click", closeModal);
  $("cancelBtn").addEventListener("click", closeModal);
  $("overlay").addEventListener("click", (e) => { if (e.target === $("overlay")) closeModal(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closeModal(); $("lightbox").classList.remove("open"); }
  });

  $("photoInput").addEventListener("change", (e) => { handleFiles(e.target.files); e.target.value = ""; });
  $("photoPreview").addEventListener("click", (e) => {
    const rm = e.target.getAttribute("data-rm");
    if (rm !== null) { pendingPhotos.splice(Number(rm), 1); renderPhotoPreview(); }
  });

  $("projectForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const id = $("projectId").value;
    const data = {
      name: $("name").value.trim(),
      status: $("status").value,
      category: $("category").value.trim(),
      contractor: $("contractor").value.trim(),
      phone: $("phone").value.trim(),
      estCost: $("estCost").value === "" ? "" : Number($("estCost").value),
      actCost: $("actCost").value === "" ? "" : Number($("actCost").value),
      notes: $("notes").value.trim(),
      photos: pendingPhotos.slice()
    };
    if (!data.name) return;
    if (id) {
      const idx = projects.findIndex(p => p.id === id);
      if (idx > -1) projects[idx] = Object.assign({}, projects[idx], data);
    } else {
      data.id = uid();
      data.created = Date.now();
      projects.push(data);
    }
    save();
    render();
    closeModal();
  });

  $("projects").addEventListener("click", (e) => {
    const edit = e.target.getAttribute("data-edit");
    const del = e.target.getAttribute("data-del");
    const full = e.target.getAttribute("data-full");
    if (edit) { const p = projects.find(x => x.id === edit); if (p) openModal(p); }
    else if (del) {
      const p = projects.find(x => x.id === del);
      if (p && confirm(`Delete "${p.name}"? This can't be undone.`)) {
        projects = projects.filter(x => x.id !== del); save(); render();
      }
    } else if (full) {
      $("lightboxImg").src = full; $("lightbox").classList.add("open");
    }
  });
  $("lightbox").addEventListener("click", () => $("lightbox").classList.remove("open"));

  $("searchInput").addEventListener("input", renderProjects);
  $("statusFilter").addEventListener("change", renderProjects);
  $("categoryFilter").addEventListener("change", renderProjects);

  /* ---------- Init ---------- */
  render();
})();
</script>
</body>
</html>
