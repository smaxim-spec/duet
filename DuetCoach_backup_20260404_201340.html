<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DuetCoach — Sales Roleplay Practice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--pri:#534AB7;--grn:#1D9E75;--amb:#EF9F27;--red:#D94545;--dgrn:#0F6E56;
--bg:#f5f5f3;--card:#fff;--txt:#222;--muted:#666;--border:#ddd;
--ptint:#EEEDFE;--gtint:#F0FBF7;--atint:#FFFCF5;--rtint:#FEF2F2;
--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-tap-highlight-color:transparent}

/* Login Screen */
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px;background:linear-gradient(135deg,#534AB7 0%,#1D9E75 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);box-sizing:border-box}
.login-card h1{color:var(--pri);font-size:28px;margin-bottom:4px;text-align:center}
.login-card .subtitle{color:var(--muted);font-size:13px;text-align:center;margin-bottom:30px}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;margin-top:16px;text-transform:uppercase;letter-spacing:.5px}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;box-sizing:border-box}
.login-card input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(83,74,183,.15)}
.login-btn{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:24px;transition:background .2s}
.login-btn:hover{background:#4339A0}
.login-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.login-toggle a{color:var(--pri);cursor:pointer;text-decoration:underline}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none}

/* Top Bar */
.topbar{background:var(--pri);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:17px;letter-spacing:-.3px}
.topbar .sub{font-size:11px;opacity:.75;margin-left:8px}
.topbar-right{font-size:11px;opacity:.8}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:42px;z-index:99;overflow-x:auto}
.tab{flex:1;text-align:center;padding:10px 6px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab.active{color:var(--pri);border-bottom-color:var(--pri)}
.tab-short{display:none}

/* Panels */
.panel{display:none;padding:16px;padding-bottom:80px;min-height:calc(100vh - 100px)}
.panel.active{display:block}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--pri)}

/* Stat Grid */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;text-align:center;border-top:3px solid var(--pri)}
.stat-card.grn{border-top-color:var(--grn)}
.stat-card.amb{border-top-color:var(--amb)}
.stat-card.red{border-top-color:var(--red)}
.stat-card .num{font-size:24px;font-weight:700;color:var(--txt)}
.stat-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-card .sub{font-size:10px;color:var(--muted);margin-top:4px}

/* Badges */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600}
.badge-pri{background:var(--ptint);color:var(--pri)}
.badge-grn{background:var(--gtint);color:var(--grn)}
.badge-amb{background:var(--atint);color:var(--amb)}
.badge-red{background:var(--rtint);color:var(--red)}

/* Buttons */
.btn{display:inline-block;padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-pri{background:var(--pri);color:#fff}
.btn-grn{background:var(--grn);color:#fff}
.btn-amb{background:var(--amb);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--pri);color:var(--pri)}
.btn-sm{padding:5px 10px;font-size:11px}

/* Pills / Filters */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:var(--card);transition:all .15s}
.pill.active{border-color:var(--pri);color:var(--pri);background:var(--ptint)}
.pill.cat-annuity.active{border-color:var(--grn);color:var(--grn);background:var(--gtint)}
.pill.cat-life.active{border-color:var(--red);color:var(--red);background:var(--rtint)}
.pill.cat-iul.active{border-color:var(--amb);color:var(--amb);background:var(--atint)}
.pill.cat-banking.active{border-color:var(--pri);color:var(--pri);background:var(--ptint)}

/* Persona Cards */
.persona-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.persona-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.persona-card:hover{border-color:var(--pri)}
.persona-card .avatar{font-size:32px;margin-bottom:6px}
.persona-card .pname{font-weight:700;font-size:14px}
.persona-card .psit{font-size:11px;color:var(--muted);margin:4px 0 8px;line-height:1.4}
.persona-card .pmeta{display:flex;gap:6px;align-items:center}

/* Chat Interface */
.chat-wrapper{display:flex;flex-direction:column;height:calc(100vh - 160px)}
.phase-tracker{display:flex;gap:4px;align-items:center;padding:10px 0;justify-content:center}
.phase-step{display:flex;flex-direction:column;align-items:center;flex:1;max-width:120px}
.phase-dot{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:background .3s}
.phase-dot.done{background:var(--grn)}
.phase-dot.current{background:var(--amb);animation:pulse 1.5s infinite}
.phase-lbl{font-size:8px;color:var(--muted);margin-top:3px;text-align:center;text-transform:uppercase;letter-spacing:.3px}
.phase-line{width:100%;height:2px;background:var(--border);flex:0 0 auto;margin:0 -2px}
.phase-line.done{background:var(--grn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.session-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:8px}
.timer{font-weight:700;font-size:13px;color:var(--pri);font-variant-numeric:tabular-nums}

.chat-container{flex:1;overflow-y:auto;padding:8px 0 70px;display:flex;flex-direction:column;gap:8px}
.chat-row{display:flex;align-items:flex-end;gap:8px}
.chat-row.client{justify-content:flex-start}
.chat-row.agent{justify-content:flex-end}
.chat-bubble{max-width:78%;padding:10px 14px;font-size:13px;line-height:1.5;border-radius:16px;word-wrap:break-word}
.chat-bubble.client-msg{background:var(--ptint);color:var(--txt);border-bottom-left-radius:4px}
.chat-bubble.agent-msg{background:var(--gtint);color:var(--txt);border-bottom-right-radius:4px}
.chat-persona-tag{font-size:9px;color:var(--muted);margin-bottom:2px;font-weight:600}
.typing-dots{display:flex;gap:4px;padding:10px 14px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

.chat-input-bar{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);align-items:flex-end;position:fixed;bottom:0;left:0;right:0;background:var(--card);z-index:50;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.chat-input-bar textarea{flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:13px;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.4}
.chat-input-bar textarea:focus{outline:none;border-color:var(--pri)}
.chat-input-bar .send-btn{background:var(--pri);color:#fff;border:none;border-radius:var(--radius);padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.chat-input-bar .send-btn:disabled{opacity:.4;cursor:default}
.end-btn{background:var(--red);color:#fff;border:none;border-radius:var(--radius);padding:10px 14px;font-weight:600;font-size:11px;cursor:pointer;white-space:nowrap}
.mic-btn{background:var(--ptint);color:var(--pri);border:1.5px solid var(--pri);border-radius:var(--radius);padding:10px 12px;font-size:16px;cursor:pointer;white-space:nowrap;transition:all .15s}
.mic-btn:active{background:var(--red);color:#fff;border-color:var(--red)}
.voice-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.voice-toggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--pri)}
.speaker-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;opacity:.5}
.speaker-btn:hover{opacity:1}

/* Score Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h2{font-size:18px;margin-bottom:16px;color:var(--pri)}
.score-row{margin-bottom:12px}
.score-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.score-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .6s ease}
.score-total{text-align:center;margin:20px 0;padding:16px;background:var(--ptint);border-radius:var(--radius)}
.score-total .big{font-size:36px;font-weight:700;color:var(--pri)}
.score-total .lbl{font-size:11px;color:var(--muted)}
.coaching-tip{background:var(--gtint);border-radius:var(--radius);padding:12px;margin-top:12px;font-size:12px;line-height:1.5}
.coaching-tip b{color:var(--grn)}

/* History */
.session-row{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.session-row:hover{background:var(--ptint)}
.session-row .sr-top{display:flex;justify-content:space-between;align-items:center}
.session-row .sr-name{font-weight:700;font-size:13px}
.session-row .sr-date{font-size:10px;color:var(--muted)}
.session-row .sr-meta{display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--muted)}
.session-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.session-detail.show{display:block}
.mini-transcript{max-height:200px;overflow-y:auto;font-size:11px;line-height:1.6;padding:8px;background:var(--bg);border-radius:var(--radius);margin-bottom:10px}
.mini-transcript .mt-client{color:var(--pri);font-weight:600}
.mini-transcript .mt-agent{color:var(--grn);font-weight:600}

/* Stats */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar-fill{width:100%;max-width:28px;border-radius:4px 4px 0 0;transition:height .3s;min-height:2px}
.bar-date{font-size:8px;color:var(--muted);margin-top:4px;transform:rotate(-45deg);white-space:nowrap}
.bar-score{font-size:8px;font-weight:700;margin-bottom:2px}

.streak-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;max-width:280px}
.streak-day{width:100%;aspect-ratio:1;border-radius:3px;background:var(--bg);max-width:32px;max-height:32px}
.streak-day.active{background:var(--grn)}
.streak-day.today{border:2px solid var(--pri)}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:2px;max-width:280px}
.day-labels span{font-size:8px;color:var(--muted);text-align:center}

/* Settings */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--pri)}
.api-status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px}
.api-status.ok{background:var(--grn)}
.api-status.err{background:var(--red)}
.api-status.unk{background:var(--border)}

/* Toast */
.toast-container{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:var(--txt);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;animation:fadeInUp .3s ease;white-space:nowrap}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Mobile Nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.mobile-nav-inner{display:flex}
.mnav{flex:1;text-align:center;padding:8px 4px 6px;font-size:9px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none}
.mnav.active{color:var(--pri)}
.mnav-icon{font-size:18px;display:block;margin-bottom:1px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:6px 8px;border-bottom:2px solid var(--border)}
td{padding:8px;border-bottom:1px solid var(--border)}

/* Team Leaderboard */
.team-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:8px}
.team-rank{font-size:16px;font-weight:800;color:var(--muted);width:24px;text-align:center}
.team-rank.gold{color:#FFD700}
.team-rank.silver{color:#C0C0C0}
.team-rank.bronze{color:#CD7F32}
.team-avatar{width:36px;height:36px;border-radius:50%;background:var(--ptint);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--pri);flex-shrink:0}
.team-info{flex:1;min-width:0}
.team-name{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.team-meta{font-size:10px;color:var(--muted);margin-top:2px}
.team-streak{text-align:right;flex-shrink:0}
.team-streak .num{font-size:18px;font-weight:700;color:var(--pri)}
.team-streak .lbl{font-size:9px;color:var(--muted);text-transform:uppercase}
.today-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.today-dot.yes{background:var(--grn)}
.today-dot.no{background:var(--border)}

/* Badges */
.badge-shelf{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.earned-badge{display:flex;flex-direction:column;align-items:center;width:72px;text-align:center}
.earned-badge .badge-icon{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--ptint);border-radius:12px;margin-bottom:4px}
.earned-badge .badge-icon.locked{filter:grayscale(1);opacity:.35}
.earned-badge .badge-name{font-size:8px;color:var(--muted);font-weight:600;line-height:1.2;text-transform:uppercase;letter-spacing:.3px}
.earned-badge .badge-name.earned{color:var(--pri)}

/* Weekly Challenge */
.challenge-card{background:linear-gradient(135deg,var(--ptint),var(--gtint));border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1.5px solid var(--pri)}
.challenge-card h4{font-size:13px;color:var(--pri);margin-bottom:6px}
.challenge-card .challenge-desc{font-size:12px;color:var(--txt);line-height:1.5}
.challenge-progress{display:flex;align-items:center;gap:8px;margin-top:10px}
.challenge-bar{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden}
.challenge-fill{height:100%;background:var(--pri);border-radius:3px;transition:width .3s}
.challenge-pct{font-size:11px;font-weight:700;color:var(--pri)}

/* Help Modal */
.help-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;z-index:1500;justify-content:center;align-items:flex-start;padding:20px}
.help-overlay.show{display:flex}
.help-modal{background:var(--card);border-radius:16px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);margin-top:40px}
.help-header{position:sticky;top:0;background:var(--card);padding:20px 20px 12px;border-bottom:1px solid var(--border);z-index:2;border-radius:16px 16px 0 0}
.help-header h2{color:var(--pri);font-size:18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.help-header .close-help{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;padding:4px 8px}
.help-search{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;box-sizing:border-box}
.help-search:focus{outline:none;border-color:var(--pri)}
.help-body{padding:8px 20px 20px}
.help-topic{border-bottom:1px solid var(--border);overflow:hidden}
.help-topic:last-child{border-bottom:none}
.help-topic-header{padding:12px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;color:var(--txt)}
.help-topic-header:hover{color:var(--pri)}
.help-topic-arrow{font-size:12px;color:var(--muted);transition:transform .2s}
.help-topic.open .help-topic-arrow{transform:rotate(90deg)}
.help-topic-content{display:none;padding:0 0 12px;font-size:12px;color:var(--muted);line-height:1.7}
.help-topic.open .help-topic-content{display:block}
.help-topic-content b{color:var(--txt)}
.help-topic-content ul{margin:6px 0 6px 18px}

/* Onboarding Overlay */
.onboarding-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:2000;padding:20px}
.onboarding-overlay.show{display:flex}
.onboarding-card{max-width:520px;width:100%;background:#fff;border-radius:16px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;max-height:90vh;overflow-y:auto}
.onboarding-card h2{color:var(--pri);font-size:22px;margin-bottom:6px}
.onboarding-card .ob-subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
.ob-progress{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.ob-dot{width:10px;height:10px;border-radius:50%;background:#E0E0E0;transition:all .3s}
.ob-dot.active{background:var(--pri);transform:scale(1.2)}
.ob-dot.done{background:var(--grn)}
.ob-step{min-height:180px;text-align:left;padding:0 4px}
.ob-step p{font-size:13px;line-height:1.6;color:var(--txt);margin-bottom:10px}
.ob-step .ob-highlight{background:var(--ptint);border-radius:var(--radius);padding:12px 16px;margin:12px 0;font-size:12px}
.ob-step input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;margin-top:6px;box-sizing:border-box}
.ob-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid #f0f0f0}
.ob-actions .btn{min-width:100px}
.ob-skip{font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline}
.ob-skip:hover{color:var(--pri)}
.ob-mode-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px;margin:8px 0;text-align:left;cursor:pointer;transition:border-color .2s}
.ob-mode-card:hover{border-color:var(--pri)}

<script>
// ── Firebase ──
var FIREBASE_URL='https://duet-crm-default-rtdb.firebaseio.com/duetcoach';
var currentAgent=null;

// ── SHA-256 Hash ──
async function sha256(str){
 var buf=new TextEncoder().encode(str);
 var hash=await crypto.subtle.digest('SHA-256',buf);
 return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}

function makeAgentId(name){
 return name.trim().toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
}

function fbCoachPath(key){
 return FIREBASE_URL+'/'+currentAgent.id+'/'+key+'.json';
}

function fbCoachSave(key,data){
 return fetch(fbCoachPath(key),{method:'PUT',body:JSON.stringify(data)}).then(function(r){return r.json()}).catch(function(){});
}

function fbCoachLoad(key){
 return fetch(fbCoachPath(key)).then(function(r){return r.json()}).catch(function(){return null});
}

// ── Authentication ──
function toggleLoginMode(){
 var lm=$1('#loginMode'),rm=$1('#registerMode');
 if(lm.style.display==='none'){lm.style.display='block';rm.style.display='none'}
 else{lm.style.display='none';rm.style.display='block'}
 $1('#loginError').style.display='none';
 $1('#regError').style.display='none';
}

async function doRegister(){
 var name=$1('#reg_name').value.trim();
 var pin=$1('#reg_pin').value.trim();
 var pin2=$1('#reg_pin2').value.trim();
 var errEl=$1('#regError');

 if(!name||name.split(' ').length<2){errEl.textContent='Please enter your full name (first and last)';errEl.style.display='block';return}
 if(!pin||pin.length<4){errEl.textContent='PIN must be at least 4 digits';errEl.style.display='block';return}
 if(pin!==pin2){errEl.textContent='PINs do not match';errEl.style.display='block';return}

 var agentId=makeAgentId(name);
 try{
  var existing=await fetch(FIREBASE_URL+'/'+agentId+'/profile.json').then(function(r){return r.json()});
  if(existing&&existing.name){errEl.textContent='An account with that name already exists. Please sign in.';errEl.style.display='block';return}
 }catch(e){}

 var pinHash=await sha256(pin);
 var profile={name:name,pin:pinHash,created:new Date().toISOString()};
 await fetch(FIREBASE_URL+'/'+agentId+'/profile.json',{method:'PUT',body:JSON.stringify(profile)});

 currentAgent={id:agentId,name:name};
 sessionStorage.setItem('dc_agent',JSON.stringify(currentAgent));

 var remembered=JSON.parse(localStorage.getItem('dc_remembered_agents')||'[]');
 if(!remembered.find(function(a){return a.id===agentId})){
  remembered.push({id:agentId,name:name});
  localStorage.setItem('dc_remembered_agents',JSON.stringify(remembered));
 }

 enterApp();
 showOnboarding();
}

async function doLogin(){
 var name=$1('#login_name').value.trim();
 var pin=$1('#login_pin').value.trim();
 var errEl=$1('#loginError');

 if(!name){errEl.textContent='Please enter your name';errEl.style.display='block';return}
 if(!pin){errEl.textContent='Please enter your PIN';errEl.style.display='block';return}

 var agentId=makeAgentId(name);
 try{
  var profile=await fetch(FIREBASE_URL+'/'+agentId+'/profile.json').then(function(r){return r.json()});
  if(!profile||!profile.name){errEl.textContent='No account found. Check your name or create a new account.';errEl.style.display='block';return}

  var pinHash=await sha256(pin);
  if(pinHash!==profile.pin){errEl.textContent='Incorrect PIN. Please try again.';errEl.style.display='block';return}

  currentAgent={id:agentId,name:profile.name};
  sessionStorage.setItem('dc_agent',JSON.stringify(currentAgent));

  var remembered=JSON.parse(localStorage.getItem('dc_remembered_agents')||'[]');
  if(!remembered.find(function(a){return a.id===agentId})){
   remembered.push({id:agentId,name:profile.name});
   localStorage.setItem('dc_remembered_agents',JSON.stringify(remembered));
  }

  // Load cloud data
  await loadCloudData();
  showToast('Welcome back, '+profile.name.split(' ')[0]+'!');
  enterApp();
 }catch(e){
  errEl.textContent='Connection error. Please try again.';
  errEl.style.display='block';
 }
}

async function loadCloudData(){
 try{
  var cloudSessions=await fbCoachLoad('sessions');
  var cloudSettings=await fbCoachLoad('settings');
  var cloudStreak=await fbCoachLoad('streak');
  if(cloudSessions) sessions=cloudSessions;
  if(cloudSettings) settings=Object.assign({},settings,cloudSettings);
  if(cloudStreak) streak=Object.assign({},streak,cloudStreak);
 }catch(e){}
}

function enterApp(){
 $1('#loginScreen').style.display='none';
 $1('#appShell').style.display='block';
 if(currentAgent&&$1('#agentName')) $1('#agentName').textContent=currentAgent.name.split(' ')[0];
 renderStreakDisplay();
 renderPractice();
}

function doLogout(){
 sessionStorage.removeItem('dc_agent');
 currentAgent=null;
 $1('#appShell').style.display='none';
 $1('#loginScreen').style.display='flex';
}

// ── Utilities ──
function $1(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function showToast(msg,ms){var t=document.createElement('div');t.className='toast';t.textContent=msg;$1('#toastContainer').appendChild(t);setTimeout(function(){t.remove()},ms||3000)}
function fmt(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function pad2(n){return n<10?'0'+n:''+n}
function fmtTime(secs){return pad2(Math.floor(secs/60))+':'+pad2(secs%60)}
function fmtDate(d){var dt=new Date(d);return (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear()}
function fmtDateShort(d){var dt=new Date(d);return (dt.getMonth()+1)+'/'+dt.getDate()}

// ── Tab System ──
var currentTab=0;
function showTab(n){
 currentTab=n;
 for(var i=0;i<=4;i++){
  var panel=$1('#p'+i);
  if(panel) panel.classList.toggle('active',i===n);
 }
 $$('.tab').forEach(function(t,i){t.classList.toggle('active',i===n)});
 $$('.mnav').forEach(function(m,i){m.classList.toggle('active',i===n)});
 if(n===0) renderPractice();
 if(n===1) renderHistory();
 if(n===2) renderStats();
 if(n===3) renderTeam();
 if(n===4) renderSettings();
}

// ── localStorage ──
function loadJSON(key,def){try{var v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}
function saveJSON(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){console.error('Storage full:',e);showToast('Storage full — clearing old recordings');try{var s=JSON.parse(localStorage.getItem(key)||'[]');s.forEach(function(x){delete x.recording});localStorage.setItem(key,JSON.stringify(s))}catch(e2){}}}
var sessions=loadJSON('db_coach_sessions',[]);
var settings=loadJSON('db_coach_settings',{difficulty:'all',dailyGoal:1,categories:['annuity','life','iul','banking'],mode:'scripted'});
var streak=loadJSON('db_coach_streak',{current:0,longest:0,lastDate:null,practiceDates:[]});

function saveSessions(){
 // Strip recordings from older sessions to save storage (keep last 10)
 var toSave=sessions.map(function(s,i){
  if(i>=10&&s.recording){var c=Object.assign({},s);delete c.recording;return c}
  return s;
 });
 saveJSON('db_coach_sessions',toSave);
 // Don't sync recordings to Firebase (too large) — save sessions without recordings
 if(currentAgent){
  var fbSessions=sessions.map(function(s){var c=Object.assign({},s);delete c.recording;return c});
  fbCoachSave('sessions',fbSessions);
 }
}

function saveStreak(){saveJSON('db_coach_streak',streak);if(currentAgent)fbCoachSave('streak',streak)}

var OBJECTIONS={
 'ties-up-money':{label:'Ties up my money',idealResponse:'Reframe: you\'ve been tied up in CDs already, rolling over. Annuity does the same but with tax-deferred growth and a guaranteed floor rate. Plus 10% annual access penalty-free.',keywords:['rolling over','already tied','10%','penalty-free','access','same thing','reframe']},
 'need-money':{label:'Need the money',idealResponse:'10% free withdrawal annually. Many annuities have nursing home/terminal illness waivers for full access. And your CD has early withdrawal penalties too.',keywords:['10%','free withdrawal','waiver','nursing','terminal','penalty','access']},
 'cd-rates-good':{label:'CD rates are good right now',idealResponse:'They are — which is why now is the time to lock in. Rates were 0.5% just 3 years ago. Annuity locks in a guaranteed minimum, so even if market rates drop, your floor is protected.',keywords:['lock in','were 0.5','three years','guaranteed minimum','floor','protected','drop']},
 'surrender':{label:'Don\'t want surrender charges',idealResponse:'CDs have early withdrawal penalties too. The annuity\'s surrender charge decreases every year and disappears after 3-5 years. During that time your money grows tax-deferred — the net benefit outweighs the surrender period.',keywords:['cd','penalty too','decreases','disappears','3-5','tax-deferred','net benefit']},
 'think-about-it':{label:'Need to think about it',idealResponse:'Absolutely. What specifically would you want to think through? That way I can get you the exact information you need. Also — when does your CD mature? I\'d hate for it to auto-renew at whatever rate the bank decides.',keywords:['specifically','what exactly','information','maturity','auto-renew','bank decides','think through']},
 'afford':{label:'Can\'t afford it',idealResponse:'What if it was less than your phone bill? A 20-year term for someone your age can be $25-40/month. That\'s the cost of protecting everything you\'re building for your family.',keywords:['phone bill','$25','$30','$40','per month','cost of','protecting','family','affordable']},
 'dont-need-it':{label:'I\'m healthy, don\'t need it',idealResponse:'That\'s actually the best time to get it — rates are lowest when you\'re healthy. If something changes, you may not qualify or it becomes much more expensive. What would happen to your business and family if you couldn\'t work for 6 months?',keywords:['best time','healthy','rates lowest','qualify','changes','business','family','couldn\'t work']},
 'have-work-coverage':{label:'Have coverage through work',idealResponse:'Group coverage is a great start. But what happens when you retire or change jobs? That coverage doesn\'t follow you. And at 55+, getting new coverage individually will be much more expensive — if you qualify at all.',keywords:['retire','change jobs','doesn\'t follow','individually','expensive','qualify','portable']},
 'fees':{label:'What are the fees?',idealResponse:'Great question. The cost of insurance is built into the policy — there\'s no separate fee statement like a brokerage account. But here\'s what matters: the net returns. After all costs, the tax-free income projections show... And unlike a 401K, you\'re not paying taxes on withdrawals.',keywords:['built in','no separate','net returns','tax-free','income','projections','after all costs']},
 'why-not-index-funds':{label:'Why not just index funds?',idealResponse:'Index funds are great for growth. IUL fills a different gap: tax-free retirement income with downside protection. If the market drops 30%, your IUL floor is 0% — you don\'t lose. It\'s not either/or — it\'s diversification across tax buckets.',keywords:['different gap','tax-free','floor','0%','don\'t lose','diversification','tax bucket','not either','both']},
 'bad-press':{label:'Read bad things about IUL',idealResponse:'There\'s a lot of noise online, and some of it is valid — poorly designed IULs with unrealistic illustrations have hurt people. That\'s why we use conservative assumptions. Let me show you the guaranteed column, not the projected one.',keywords:['valid','poorly designed','conservative','guaranteed column','realistic','honest','not projected','actual']},
 'online-rates':{label:'Online banks pay more',idealResponse:'Some do — and if rate is the only factor, that makes sense. But with $300K, you\'re over the FDIC limit at any single bank. Here we can structure across products to keep everything fully insured. Also, try getting someone on the phone at an online bank when you need something.',keywords:['fdic','limit','$250','over','structure','insured','phone','someone','service']},
 'lock-up-money':{label:'Don\'t want to lock up money',idealResponse:'I hear that. A 12-month CD means your money is only committed for one year, and the rate is significantly better than savings. If something comes up, the early withdrawal penalty is just a few months of interest — not the principal.',keywords:['12 month','one year','committed','better than savings','penalty','few months','interest','principal safe']},
 'shop-around':{label:'Let me shop around first',idealResponse:'Absolutely, you should compare. But here\'s what changes while you shop: your age. Every month you wait, rates go up because you\'re older. And if anything changes with your health, you might not qualify at all. The rate I can lock in today is based on your current age and health — that\'s the best it will ever be.',keywords:['compare','shop','but','age','health','today','locked in','changes','waiting','best','qualify','rate']},
 'just-buy-index-funds':{label:'Just buy index funds',idealResponse:'Index funds are great for long-term growth. But here\'s the difference — if the market drops 30% when your daughter is 17, her college fund drops 30%. With the IUL, the 0% floor means she doesn\'t lose a dime. AND the growth is tax-free, unlike a taxable brokerage account where you\'re paying capital gains. It\'s not replacing index funds — it\'s a different bucket with different rules.',keywords:['index','but','0%','floor','drop','30%','crash','tax-free','capital gains','taxable','bucket','different','rules','doesn\'t lose']},
 'self-insure':{label:'I\'ll just save the money myself',idealResponse:'Let\'s do the math. At $629/month, it takes you over 26 years to save $200,000. If you need care in 5 years, you\'d have about $38,000 saved. A nursing home costs $8,000-$10,000 a month. You\'d burn through your savings in 4-5 months. The policy gives you $200,000 in protection from day one.',keywords:['math','save','years','$200,000','nursing home','costs','burn','day one','compare','decades']},
 'never-need-it':{label:'I\'ll never need long-term care',idealResponse:'I hope you\'re right. But the statistics say 70% of people over 65 will need some form of long-term care. And here\'s the thing — even if you never use the LTC benefit, the $200,000 death benefit still goes to your family tax-free. Either way, the money goes somewhere useful. It\'s not wasted.',keywords:['70%','statistics','hope','but','death benefit','family','tax-free','either way','not wasted','still']},
 'cancel-everything':{label:'Just cancel it all',idealResponse:'I get the frustration with the rate hike. But think about this — you got this policy because of your family. Your mortgage, your wife, your kid. If you cancel and something happens, what does your family do tomorrow? The answer isn\'t to drop coverage — it\'s to fix the structure so you\'re not getting gouged every 5 years.',keywords:['family','mortgage','wife','kid','cancel','drop','coverage','fix','structure','gouged','something happens']},
 'higher-rate':{label:'Want the highest rate',idealResponse:'I respect that — rate matters. Let me show you our current CD rates by term. But I also want to mention: if you\'re looking 3-5 years out, a fixed annuity may actually net you more after taxes, since CD interest is taxed annually while annuity growth is deferred.',keywords:['rates','current','term','3-5 years','annuity','net more','after taxes','deferred','taxed annually']}
};

  {trigger:'okay',keywords:['what if','have you considered','there\'s a way','let me tell','better option'],nextNode:2,scoreHints:{phase:1,question:1,empathy:1}},
  {trigger:'weak',keywords:[],nextNode:2,scoreHints:{phase:0,question:0,empathy:0}}
 ]});

// ── Progressive Unlock System (Script Training only) ──
var UNLOCK_THRESHOLDS={medium:75, hard:80};

function getUnlockStatus(category){
 // Returns {easy:true, medium:true/false, hard:true/false, bestEasy:N, bestMedium:N}
 var bestEasy=0, bestMedium=0;
 sessions.forEach(function(s){
  if(s.category!==category) return;
  if(s.mode!=='script') return;
  if(s.difficulty==='easy'&&s.total>bestEasy) bestEasy=s.total;
  if(s.difficulty==='medium'&&s.total>bestMedium) bestMedium=s.total;
 });
 return {
  easy:true,
  medium:bestEasy>=UNLOCK_THRESHOLDS.medium,
  hard:bestMedium>=UNLOCK_THRESHOLDS.hard,
  bestEasy:bestEasy,
  bestMedium:bestMedium
 };
}

function checkForUnlockCelebration(record){
 if(record.mode!=='script') return;
 var cat=record.category;
 var diff=record.difficulty;
 var score=record.total;

 if(diff==='easy'&&score>=UNLOCK_THRESHOLDS.medium){
  // Check if this is the FIRST time crossing the threshold
  var previousBest=0;
  sessions.forEach(function(s){
   if(s.id===record.id) return;
   if(s.category===cat&&s.mode==='script'&&s.difficulty==='easy'&&s.total>previousBest) previousBest=s.total;
  });
  if(previousBest<UNLOCK_THRESHOLDS.medium){
   setTimeout(function(){showToast('Medium difficulty unlocked! You\'re ready for tougher clients.',5000)},1500);
  }
 }
 if(diff==='medium'&&score>=UNLOCK_THRESHOLDS.hard){
  var previousBest2=0;
  sessions.forEach(function(s){
   if(s.id===record.id) return;
   if(s.category===cat&&s.mode==='script'&&s.difficulty==='medium'&&s.total>previousBest2) previousBest2=s.total;
  });
  if(previousBest2<UNLOCK_THRESHOLDS.hard){
   setTimeout(function(){showToast('Hard difficulty unlocked! Time to face the toughest objections.',5000)},1500);
  }
 }
}

// ── Session Audio Recording ──
var audioContext=null;
var mediaRecorder=null;
var recordedChunks=[];
var mixedDest=null;
var micStream=null;
var isRecording=false;

function startSessionRecording(){
 if(!isVoiceMode()) return;
 try{
  audioContext=new (window.AudioContext||window.webkitAudioContext)();
  mixedDest=audioContext.createMediaStreamDestination();
  recordedChunks=[];

  // Get mic stream for recording (separate from speech recognition)
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
   micStream=stream;
   var micSource=audioContext.createMediaStreamSource(stream);
   micSource.connect(mixedDest);

   // Start recorder on mixed destination
   var mimeType='audio/webm;codecs=opus';
   if(!MediaRecorder.isTypeSupported(mimeType)) mimeType='audio/webm';
   if(!MediaRecorder.isTypeSupported(mimeType)) mimeType='audio/mp4';

   mediaRecorder=new MediaRecorder(mixedDest.stream,{mimeType:mimeType});
   mediaRecorder.ondataavailable=function(e){
    if(e.data.size>0) recordedChunks.push(e.data);
   };
   mediaRecorder.start(1000); // collect chunks every second
   isRecording=true;
  }).catch(function(e){
   console.error('Mic access for recording failed:',e);
  });
 }catch(e){
  console.error('Recording setup failed:',e);
 }
}

function routeAudioToRecorder(audioElement){
 // Route ElevenLabs audio through the mixer so it gets recorded
 if(!audioContext||!mixedDest||!isRecording) return;
 try{
  var source=audioContext.createMediaElementSource(audioElement);
  source.connect(mixedDest);
  source.connect(audioContext.destination); // also play through speakers
 }catch(e){
  // If element already connected, just play normally
  console.error('Audio routing error:',e);
 }
}

function stopSessionRecording(){
 isRecording=false;
 return new Promise(function(resolve){
  if(!mediaRecorder||mediaRecorder.state==='inactive'){
   if(micStream) micStream.getTracks().forEach(function(t){t.stop()});
   resolve(null);
   return;
  }

  mediaRecorder.onstop=function(){
   if(micStream) micStream.getTracks().forEach(function(t){t.stop()});
   if(recordedChunks.length===0){resolve(null);return}

   var blob=new Blob(recordedChunks,{type:mediaRecorder.mimeType||'audio/webm'});
   // Convert to base64 for storage
   var reader=new FileReader();
   reader.onloadend=function(){
    resolve({data:reader.result,type:blob.type,size:blob.size});
   };
   reader.readAsDataURL(blob);
  };

  mediaRecorder.stop();
 });
}

// Speech recognition for mic input (push-to-talk)
var voiceRec=null;
var micHeld=false;
var fullTranscript='';

function micDown(){
 var SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SpeechRec){showToast('Speech recognition not supported');return}
 if(micHeld) return;

 micHeld=true;
 fullTranscript='';
 var micBtn=$1('#micBtn');
 if(micBtn){micBtn.style.background='var(--red)';micBtn.style.color='#fff';micBtn.textContent='REC'}
 var ta=$1('#chatInput');
 if(ta){ta.placeholder='Listening... release to send';ta.value=''}

 voiceRec=new SpeechRec();
 voiceRec.lang='en-US';
 voiceRec.interimResults=true;
 voiceRec.continuous=true;
 voiceRec.maxAlternatives=1;

 voiceRec.onresult=function(e){
  var interim='';
  var final='';
  for(var i=0;i<e.results.length;i++){
   if(e.results[i].isFinal){
    final+=e.results[i][0].transcript+' ';
   } else {
    interim+=e.results[i][0].transcript;
   }
  }
  fullTranscript=final;
  if(ta) ta.value=(final+interim).trim();
 };

 voiceRec.onerror=function(e){
  if(e.error==='not-allowed') showToast('Microphone access denied');
 };

 voiceRec.onend=function(){
  // If still held, restart (browser may stop after silence)
  if(micHeld){
   try{voiceRec.start()}catch(e){}
  }
 };

 try{
  voiceRec.start();
 }catch(e){
  micHeld=false;
  if(micBtn){micBtn.style.background='';micBtn.style.color='';micBtn.textContent='\u{1F3A4}'}
  showToast('Could not start microphone');
 }
}

function micUp(){

 var micBtn=$1('#micBtn');
 if(micBtn){micBtn.style.background='';micBtn.style.color='';micBtn.innerHTML='&#x1F3A4;'}

 if(ta) ta.placeholder='Tap mic or type...';

 if(voiceRec){
  try{voiceRec.stop()}catch(e){}
  voiceRec=null;
 }

 // Send whatever was captured
 var text=(ta?ta.value:'').trim();
 if(text){
  sendMessage();
 }
}

// ── Scripted Mode Engine ──
function handleAgentMessage(text){
 if(!activeSession||!text.trim()) return;
 activeSession.transcript.push({role:'agent',text:text.trim()});

 // Detect Sales Framework phases from agent's message
 var lower=text.toLowerCase();
 PHASE_KEYWORDS.forEach(function(kws,i){
  kws.forEach(function(kw){
   if(lower.indexOf(kw)>=0) activeSession.phaseVisited[i]=true;
  });
 });

 if(activeSession.mode==='api'){
  handleAPIResponse(text.trim());
  return;
 }

 if(activeSession.mode==='script'){
  handleScriptResponse(text.trim());
  return;
 }

 // Scripted mode: evaluate against current tree node
 var node=activeSession.tree[activeSession.currentNode];
 if(!node){endSession();return}

 var bestBranch=null;
 var bestScore=-1;
 node.branches.forEach(function(b){
  var matches=0;
  b.keywords.forEach(function(kw){
   if(lower.indexOf(kw)>=0) matches++;
  });
  if(matches>bestScore){bestScore=matches;bestBranch=b}
 });

 // Fall back to weakest if no keywords matched
 if(bestScore<=0){
  bestBranch=node.branches[node.branches.length-1];
 }

 // Accumulate scores
 if(bestBranch.scoreHints){
  Object.keys(bestBranch.scoreHints).forEach(function(k){
   activeSession.scores[k]=(activeSession.scores[k]||0)+bestBranch.scoreHints[k];
  });
 }

 // Check for open-ended questions bonus
 OPEN_QUESTION_WORDS.forEach(function(w){
  if(lower.indexOf(w)>=0) activeSession.scores.question=(activeSession.scores.question||0)+0.5;
 });
 // Check empathy bonus
 EMPATHY_WORDS.forEach(function(w){
  if(lower.indexOf(w)>=0) activeSession.scores.empathy=(activeSession.scores.empathy||0)+0.5;
 });
 // Check close language
 CLOSE_WORDS.forEach(function(w){
  if(lower.indexOf(w)>=0) activeSession.scores.close=(activeSession.scores.close||0)+0.5;
 });

 // Show typing indicator then client response
 activeSession.typing=true;
 renderChat();
 var delay=800+Math.random()*1200;
 setTimeout(function(){
  activeSession.typing=false;
  if(bestBranch.nextNode==='end'){
   // Add final client message from commitment
   var commitMsg=getCommitmentResponse(activeSession.persona);
   activeSession.transcript.push({role:'client',text:commitMsg,phase:4});
   activeSession.phaseVisited[4]=true;
   renderChat();
   scrollChatBottom();
   if(isVoiceMode()) speakText(commitMsg,activeSession.persona.id);
   setTimeout(endSession,1000);
  } else {
   var nextNode=activeSession.tree[bestBranch.nextNode];
   if(nextNode){
    activeSession.currentNode=bestBranch.nextNode;
    activeSession.transcript.push({role:'client',text:nextNode.clientMsg,phase:nextNode.phase});
    if(isVoiceMode()) speakText(nextNode.clientMsg,activeSession.persona.id);
   }
   renderChat();
   scrollChatBottom();
  }
 },delay);

 renderChat();
 scrollChatBottom();
}

// ── Script Training Mode Handler ──
function handleScriptResponse(agentText){
 activeSession.apiMessages.push({role:'user',content:agentText});
 activeSession.typing=true;
 renderChat();
 scrollChatBottom();

 // Check which script checkpoints this message hits
 var lower=agentText.toLowerCase();
 var hitsThisMsg=0;
 var stages=activeSession.scriptStages||SCRIPT_STAGES;
 stages.forEach(function(stage){
  stage.checkpoints.forEach(function(cp){
   if(activeSession.scriptCheckpoints[cp.id]) return; // already hit
   var matched=cp.keywords.filter(function(kw){return lower.indexOf(kw)>=0}).length;
   if(matched>=2||(matched>=1&&cp.keywords.length<=3)){
    activeSession.scriptCheckpoints[cp.id]=true;
    hitsThisMsg++;
   }
  });
 });

 // Track recovery from curveball
 if(activeSession.inCurveball){
  activeSession.exchangesSinceLastCheckpoint++;
  if(hitsThisMsg>0){
   // Recovered — got back to script
   activeSession.curveBallsRecovered++;
   activeSession.scriptRecoveries.push(activeSession.exchangesSinceLastCheckpoint);
   activeSession.inCurveball=false;
   activeSession.exchangesSinceLastCheckpoint=0;
  }
 }

 // Also detect NEPQ phases for the phase tracker display
 PHASE_KEYWORDS.forEach(function(kws,i){
  kws.forEach(function(kw){
   if(lower.indexOf(kw)>=0) activeSession.phaseVisited[i]=true;

function scoreScriptSession(){
 var checkpointsDone=0;
 var totalCheckpoints=Object.keys(activeSession.scriptCheckpoints).length;
 Object.keys(activeSession.scriptCheckpoints).forEach(function(k){
  if(activeSession.scriptCheckpoints[k]) checkpointsDone++;
 });

 // Build stage-by-stage breakdown
 var stageResults=(activeSession.scriptStages||SCRIPT_STAGES).map(function(stage){
  var hit=0;
  stage.checkpoints.forEach(function(cp){
   if(activeSession.scriptCheckpoints[cp.id]) hit++;
  });
  return {name:stage.name,color:stage.color,hit:hit,total:stage.checkpoints.length};
 });

 var pctCheckpoints=checkpointsDone/totalCheckpoints;
 var recoveryAvg=activeSession.scriptRecoveries.length>0?
  activeSession.scriptRecoveries.reduce(function(a,b){return a+b},0)/activeSession.scriptRecoveries.length:0;
 var recoveryScore=activeSession.curveBallsThrown===0?20:
  Math.min(20,Math.round((activeSession.curveBallsRecovered/activeSession.curveBallsThrown)*20*(recoveryAvg<=3?1:recoveryAvg<=5?0.7:0.4)));

 // Score calculation
 var scores={
  checkpoints:Math.round(pctCheckpoints*30), // out of 30
  sequence:Math.round(getSequenceScore()*20), // out of 20 — did they hit them in order?
  keyPhrases:Math.round(getKeyPhraseScore()*20), // out of 20
  recovery:recoveryScore, // out of 20
  tone:Math.round(getToneScore()*10) // out of 10
 };

 var total=scores.checkpoints+scores.sequence+scores.keyPhrases+scores.recovery+scores.tone;

 // Build the score modal
 showScriptScoreModal(scores,total,stageResults,checkpointsDone,totalCheckpoints);
}

function getSequenceScore(){
 // Check if checkpoints were hit roughly in order
 var agentMsgs=activeSession.transcript.filter(function(m){return m.role==='agent'});
 var hitOrder=[];
 agentMsgs.forEach(function(msg){
  var lower=msg.text.toLowerCase();
  (activeSession.scriptStages||SCRIPT_STAGES).forEach(function(stage){
   stage.checkpoints.forEach(function(cp){
    if(hitOrder.indexOf(cp.id)===-1){
     var matched=cp.keywords.filter(function(kw){return lower.indexOf(kw)>=0}).length;
     if(matched>=1) hitOrder.push(cp.id);
    }
   });
  });
 });
 // Score: how sorted is the hitOrder array? (0-1)
 if(hitOrder.length<=1) return 0.5;
 var inversions=0;
 for(var i=0;i<hitOrder.length;i++){
  for(var j=i+1;j<hitOrder.length;j++){
   if(hitOrder[i]>hitOrder[j]) inversions++;
  }
 }
 var maxInversions=hitOrder.length*(hitOrder.length-1)/2;
 return 1-(inversions/maxInversions);
}

function getKeyPhraseScore(){
 // Check for specific high-value phrases from the script
 var allText=activeSession.transcript.filter(function(m){return m.role==='agent'}).map(function(m){return m.text.toLowerCase()}).join(' ');
 var keyPhrases=[
  'before we just set that up','hidden gaps','would it be appropriate',
  'walk me through','what caused you','how do you mean exactly',
  'has that had an impact','just so I can see the rationale',
  'what\'s prevented you','100% protected','tax-deferred','compound',
  'what happens if you don\'t','willing to settle',
  'based on what you\'ve told me','exactly what you\'re looking for',
  'does that make sense','do you see how that could help',
  'do you feel','why do you feel','would that be appropriate'
 ];
 var hits=keyPhrases.filter(function(p){return allText.indexOf(p)>=0}).length;
 return Math.min(1,hits/8); // 8 out of 21 = perfect score
}

function getToneScore(){
 // Analyze word patterns for appropriate tone
 var agentMsgs=activeSession.transcript.filter(function(m){return m.role==='agent'}).map(function(m){return m.text.toLowerCase()}).join(' ');
 var score=0.5; // start neutral
 // Good tone indicators
 ['i understand','that makes sense','i hear you','great question','fair enough','no pressure','take your time','just to make sure','would you be opposed','i should probably ask'].forEach(function(p){
  if(agentMsgs.indexOf(p)>=0) score+=0.07;
 });
 // Bad tone indicators
 ['you should','you need to','you have to','trust me','obviously','clearly','no-brainer','slam dunk','guaranteed returns'].forEach(function(p){
  if(agentMsgs.indexOf(p)>=0) score-=0.1;
 });
 return Math.max(0,Math.min(1,score));
}

function updateStreak(){
 var today=new Date().toISOString().substring(0,10);
 if(!streak.practiceDates) streak.practiceDates=[];
 if(streak.practiceDates.indexOf(today)===-1){
  streak.practiceDates.push(today);
 }
 // Calculate current streak
 var d=new Date();
 var count=0;
 for(var i=0;i<365;i++){
  var ds=d.toISOString().substring(0,10);
  if(streak.practiceDates.indexOf(ds)>=0){
   count++;
   d.setDate(d.getDate()-1);
  } else if(i===0){
   // Today hasn't been practiced yet (but we just added it, so skip)
   d.setDate(d.getDate()-1);
  } else {
   break;
  }
 }
 streak.current=count;
 if(count>streak.longest) streak.longest=count;
 streak.lastDate=today;
 saveStreak();
 renderStreakDisplay();
}

 var el=$1('#streakDisplay');
 if(el) el.innerHTML=streak.current>0?streak.current+' day'+(streak.current>1?'s':'')+' streak':'';
}

// ── Weekly Challenge System ──
function getWeeklyChallenge(){
 // Rotate challenges weekly based on week number
 var now=new Date();
 var start=new Date(now.getFullYear(),0,1);
 var weekNum=Math.floor((now-start)/(7*24*60*60*1000));
 var challenges=[
  {title:'Hard Mode Week',desc:'Complete 3 sessions with a Hard difficulty persona.',target:3,check:function(s){var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);return s.filter(function(x){return x.difficulty==='hard'&&new Date(x.date)>=weekAgo}).length}},
  {title:'Consistency Challenge',desc:'Practice every day this week (5 of 7 days).',target:5,check:function(s){var days={};var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);s.forEach(function(x){if(new Date(x.date)>=weekAgo) days[x.date.substring(0,10)]=true});return Object.keys(days).length}},
  {title:'Category Explorer',desc:'Practice at least one session in each product category.',target:4,check:function(s){var cats={};var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);s.forEach(function(x){if(new Date(x.date)>=weekAgo) cats[x.category]=true});return Object.keys(cats).length}},
  {title:'Score Crusher',desc:'Get 3 sessions scoring 75 or higher.',target:3,check:function(s){var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);return s.filter(function(x){return x.total>=75&&new Date(x.date)>=weekAgo}).length}},
  {title:'Marathon Week',desc:'Complete 7 practice sessions this week.',target:7,check:function(s){var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);return s.filter(function(x){return new Date(x.date)>=weekAgo}).length}},
  {title:'New Faces',desc:'Practice with 3 personas you haven\'t tried before.',target:3,check:function(s){var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);var before={};var thisWeekNew={};s.forEach(function(x){if(new Date(x.date)<weekAgo) before[x.persona]=true});s.forEach(function(x){if(new Date(x.date)>=weekAgo&&!before[x.persona]) thisWeekNew[x.persona]=true});return Object.keys(thisWeekNew).length}},
  {title:'Objection Master',desc:'Complete 3 CD-to-Annuity sessions (most objection-heavy).',target:3,check:function(s){var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);return s.filter(function(x){return x.category==='annuity'&&new Date(x.date)>=weekAgo}).length}}
 ];
 return challenges[weekNum%challenges.length];
}

function exportData(){
 var data=JSON.stringify({sessions:sessions,settings:settings,streak:streak},null,2);

}

function resetStreak(){
 if(!confirm('Reset your streak? This cannot be undone.')) return;
 streak.current=0;streak.longest=0;streak.practiceDates=[];
 saveStreak();
 renderStats();

 showToast('Streak reset');
}

function clearAllData(){

 saveSessions();saveStreak();

}

function renderHelpTopics(){

 var h='';
 HELP_TOPICS.forEach(function(t,i){
  // Filter by search
  if(lower&&t.title.toLowerCase().indexOf(lower)<0&&t.keywords.indexOf(lower)<0&&t.content.toLowerCase().indexOf(lower)<0) return;
  h+='<div class="help-topic" id="ht_'+i+'" onclick="toggleHelpTopic('+i+')">';
  h+='<div class="help-topic-header"><span>'+t.title+'</span><span class="help-topic-arrow">&#x25B6;</span></div>';
  h+='<div class="help-topic-content">'+t.content+'</div>';
  h+='</div>';
 });
 if(!h) h='<div style="text-align:center;color:var(--muted);padding:20px">No topics match "'+query+'"</div>';
 $1('#helpBody').innerHTML=h;
}

function showOnboarding(){
 if(localStorage.getItem('dc_onboarding_done_'+currentAgent.id)) return;
 onboardingStep=0;
 $1('#onboardingOverlay').classList.add('show');
 renderOnboardingStep();
}

function renderOnboardingStep(){
 var step=ONBOARDING_STEPS[onboardingStep];
 var total=ONBOARDING_STEPS.length;
 var isFirst=onboardingStep===0;
 var isLast=onboardingStep===total-1;

 var h='';
 h+='<div class="ob-progress">';
 for(var d=0;d<total;d++){
  var cls=d<onboardingStep?'done':d===onboardingStep?'active':'';
  h+='<div class="ob-dot '+cls+'"></div>';
 }
 h+='</div>';

 h+='<h2>'+step.title+'</h2>';
 h+='<div class="ob-subtitle">Step '+(onboardingStep+1)+' of '+total+'</div>';
 h+='<div class="ob-step">'+step.content()+'</div>';

 h+='<div class="ob-actions">';
 if(isFirst){
  h+='<span class="ob-skip" onclick="completeOnboarding()">Skip setup</span>';
 } else {
  h+='<button class="btn btn-outline" onclick="prevOnboardingStep()">Back</button>';
 }
 if(isLast){
  h+='<button class="btn btn-grn" onclick="completeOnboarding()">Start Practicing</button>';
 } else {
  h+='<button class="btn btn-pri" onclick="nextOnboardingStep()">Next</button>';
 }
 h+='</div>';

 $1('#onboardingCard').innerHTML=h;
}

function nextOnboardingStep(){
 if(onboardingStep<ONBOARDING_STEPS.length-1){onboardingStep++;renderOnboardingStep()}
}
function prevOnboardingStep(){
 if(onboardingStep>0){onboardingStep--;renderOnboardingStep()}
}
function completeOnboarding(){
 localStorage.setItem('dc_onboarding_done_'+currentAgent.id,'true');
 $1('#onboardingOverlay').classList.remove('show');
}

function obSelectMode(mode){
 settings.mode=mode;
 saveSettings();
 var s=$1('#ob_mode_scripted'),a=$1('#ob_mode_api');
 if(s){s.classList.toggle('selected',mode==='scripted')}
 if(a){a.classList.toggle('selected',mode==='api')}
}

function saveObApiKey(){
 var key=($1('#ob_apikey')||{}).value||'';
 if(key.trim()){
  setApiKey(key.trim());
  showToast('API key saved!');
  renderOnboardingStep();
 }
}

// ── Init ──
(function(){
 var saved=sessionStorage.getItem('dc_agent');
 if(saved){
  try{
   currentAgent=JSON.parse(saved);
   loadCloudData().then(function(){
    enterApp();
   });
  }catch(e){
   // bad session, show login
  }
 }
 // Update agent name display
 if(currentAgent&&$1('#agentName')){
  $1('#agentName').textContent=currentAgent.name.split(' ')[0];
 }
})();
</script>
