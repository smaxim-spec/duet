<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuetBooks — AAA Life Specialist Compensation Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#534AB7;--grn:#1D9E75;--amb:#EF9F27;--red:#D94545;--dgrn:#0F6E56;--bg:#f5f5f3;--card:#fff;--ptint:#EEEDFE;--gtint:#F0FBF7;--atint:#FFFCF5;--rtint:#FEF2F2;--txt:#222;--muted:#666;--border:#ddd;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body.dark{--bg:#1a1a2e;--card:#252540;--txt:#e0e0e0;--muted:#999;--border:#3a3a50;--shadow:0 1px 3px rgba(0,0,0,.3);--ptint:#2e2a50;--gtint:#1a3028;--atint:#302a1a;--rtint:#301a1a}
body.dark .login-card{background:#252540;color:var(--txt)}
body.dark .login-card h1{color:#8B80E0}
body.dark .login-card input,body.dark .login-card select{background:#1a1a2e;color:var(--txt);border-color:var(--border)}
body.dark input,body.dark select,body.dark textarea{background:#1a1a2e;color:var(--txt);border-color:var(--border)}
body.dark th{background:var(--ptint);color:#B0A8E8}
body.dark th:hover{background:#3a3460}
body.dark tr:hover td{background:#2a2a40}
body.dark .toast{background:#333350;color:#e0e0e0}
body.dark .modal{background:#252540;color:var(--txt)}
body.dark .fb-modal-box{background:#252540;color:var(--txt)}
body.dark .upload-zone{border-color:var(--border);background:var(--ptint)}
body.dark .needs-card{background:var(--atint);border-color:#4a4030}
html{font-size:13px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}

/* ── Login Screen ── */
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#534AB7 0%,#1D9E75 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card h1{color:var(--pri);font-size:28px;margin-bottom:4px;text-align:center}
.login-card .subtitle{color:var(--muted);font-size:13px;text-align:center;margin-bottom:30px}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;margin-top:16px;text-transform:uppercase;letter-spacing:.5px}
.login-card input,.login-card select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit}
.login-card input:focus,.login-card select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(83,74,183,.15)}
.login-btn{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:24px;transition:background .2s}
.login-btn:hover{background:#4339A0}
.login-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.login-toggle a{color:var(--pri);cursor:pointer;text-decoration:underline}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none}

/* ── Top Bar ── */
.topbar{background:var(--pri);color:#fff;padding:10px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar .brand{font-weight:700;font-size:16px}
.topbar .agent-info{font-size:12px;opacity:.8}
.topbar .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:6px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.topbar .logout-btn:hover{background:rgba(255,255,255,.25)}

/* ── Tabs ── */
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--muted);transition:all .2s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}

/* ── Panels ── */
.panel{display:none;padding:24px;max-width:1200px;margin:0 auto}
.panel.active{display:block}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:18px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:8px;color:var(--pri)}

/* ── Stat Cards Grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--pri)}
.stat-card.green{border-top-color:var(--grn)}
.stat-card.amber{border-top-color:var(--amb)}
.stat-card.red{border-top-color:var(--red)}
.stat-card .stat-value{font-size:28px;font-weight:700;margin:4px 0}
.stat-card .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;background:var(--card);font-size:12px}
th{background:var(--ptint);padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--pri)}
th:hover{background:#DDDAFE}
td{padding:8px 12px;border-top:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#FAFAFA}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;color:#fff;letter-spacing:.3px}
.badge-pri{background:var(--pri)}
.badge-grn{background:var(--grn)}
.badge-amb{background:var(--amb)}
.badge-red{background:var(--red)}
.badge-carrier-aaa{background:#7B2D8E}
.badge-carrier-mm{background:#005DAA}
.badge-carrier-sec{background:#2E7D32}

/* ── Status Pipeline Dots ── */
.pipe-status{display:flex;gap:3px;align-items:center}
.pipe-step{width:16px;height:4px;border-radius:2px;background:#E0E0E0}
.pipe-step.done{background:var(--grn)}
.pipe-step.current{background:var(--pri)}

/* ── Buttons ── */
.btn{padding:6px 14px;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#4339A0}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{background:var(--dgrn)}
.btn-amb{background:var(--amb);color:#fff}.btn-amb:hover{background:#D48A1F}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#B83B3B}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt)}.btn-outline:hover{background:#f5f5f5}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-next{background:var(--grn);color:#fff;padding:3px 10px;font-size:11px;border-radius:4px;border:none;cursor:pointer}
.btn-next:hover{background:var(--dgrn)}
.btn-del{background:none;color:var(--red);border:none;font-size:11px;cursor:pointer;text-decoration:underline}

/* ── Forms ── */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--pri)}

/* ── New Case Form ── */
.add-case-form{background:var(--atint);border:1px solid #F0E0C0;border-radius:var(--radius);padding:20px;margin-bottom:20px}
.add-case-form h3{color:var(--amb);margin-bottom:12px}
.commission-preview{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:12px;font-size:12px}
.commission-preview .big{font-size:22px;font-weight:700;color:var(--grn)}

/* ── Filter Bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
.filter-bar .count{font-size:11px;color:var(--muted);margin-left:auto}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-size:18px;margin-bottom:16px;color:var(--pri)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── Tier Card ── */
.tier-card{display:flex;align-items:center;gap:20px;background:var(--ptint);border-radius:var(--radius);padding:16px 24px;margin-bottom:24px}
.tier-badge{font-size:36px;font-weight:800;color:var(--pri)}
.tier-badge.t4{color:var(--grn)}
.tier-badge.t3{color:var(--amb)}
.tier-badge.t2{color:var(--red)}
.tier-info .tier-label{font-size:12px;color:var(--muted)}
.tier-info .tier-value{font-size:18px;font-weight:600}
.tier-progress{flex:1}
.tier-bar{height:8px;background:#E0E0E0;border-radius:4px;overflow:hidden;margin-top:6px}
.tier-bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── Monthly Table ── */
.monthly-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:12px}
.month-cell{text-align:center;padding:8px 4px;border-radius:6px;font-size:11px}
.month-cell .month-label{font-size:9px;color:var(--muted);text-transform:uppercase}
.month-cell .month-value{font-weight:700;font-size:13px}

/* ── Image Upload ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;position:relative}
.upload-zone:hover{border-color:var(--pri);background:var(--ptint)}
.upload-zone.dragover{border-color:var(--grn);background:var(--gtint)}
.upload-zone .upload-icon{font-size:28px;margin-bottom:4px}
.upload-zone .upload-text{font-size:12px;color:var(--muted)}
.upload-zone .upload-hint{font-size:10px;color:var(--muted);margin-top:4px}
.upload-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid var(--border)}
.upload-processing{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:var(--ptint);border-radius:20px;font-size:12px;color:var(--pri);font-weight:600}
.upload-processing .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#333;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Pay Period ── */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.pay-panel{border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.pay-panel-v{background:var(--ptint);border-color:#C5C0F0}
.pay-panel-w{background:var(--gtint);border-color:#B8E6D4}
.pay-panel h4{margin-bottom:12px;font-size:14px}
.preview-box{background:var(--card);border:2px solid var(--pri);border-radius:var(--radius);padding:16px;margin:16px 0}
.preview-box h4{color:var(--pri);margin-bottom:8px}
.match-box{background:var(--gtint);border:1px solid #B8E6D4;border-radius:var(--radius);padding:16px}
.match-box h4{color:var(--grn);margin-bottom:8px}
.strong{color:var(--grn);font-weight:600}
.possible{color:var(--amb);font-weight:600}
.pay-history-card{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--pri)}
.pay-history-card .ph-label{font-weight:600;font-size:14px}
.pay-history-card .ph-meta{font-size:11px;color:var(--muted)}
.pay-history-card .ph-amount{font-size:18px;font-weight:700;color:var(--grn)}

/* ── Forecasting ── */
.cf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.cf-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center}
.cf-card .cf-period{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cf-card .cf-amount{font-size:28px;font-weight:700;margin:6px 0}
.cf-card .cf-sub{font-size:11px;color:var(--muted)}
.cf-vs{display:flex;gap:24px;margin-bottom:24px}
.cf-vs-card{flex:1;background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-top:3px solid var(--pri)}
.cf-vs-card h4{font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.cf-vs-card .big{font-size:24px;font-weight:700}
.needs-card{background:var(--atint);border:1px solid #F0E0C0;border-radius:var(--radius);padding:20px;margin-bottom:24px}
.needs-card h3{color:var(--amb);margin-bottom:12px}
.needs-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0e0c0;font-size:13px}
.needs-row:last-child{border-bottom:none}

/* ── Feedback System ── */
.fb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.fb-stats{display:flex;gap:12px}
.fb-stat{background:var(--card);border-radius:var(--radius);padding:8px 16px;box-shadow:var(--shadow);text-align:center;min-width:80px}
.fb-stat .fb-num{font-size:20px;font-weight:700}
.fb-stat .fb-lbl{font-size:10px;color:var(--muted);text-transform:uppercase}
.fb-filters{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.fb-filters select,.fb-filters input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
.fb-item{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--border);cursor:pointer;transition:all .2s}
.fb-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.fb-item.fb-bug{border-left-color:var(--red)}
.fb-item.fb-suggestion{border-left-color:var(--pri)}
.fb-item.fb-question{border-left-color:var(--amb)}
.fb-item-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.fb-item-title{font-weight:600;font-size:14px}
.fb-item-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fb-item-desc{font-size:12px;color:var(--muted);margin-top:4px;white-space:pre-wrap}
.fb-status-new{background:var(--amb);color:#fff}
.fb-status-reviewing{background:var(--pri);color:#fff}
.fb-status-resolved{background:var(--grn);color:#fff}
.fb-status-wontfix{background:#999;color:#fff}
.fb-review-modal{max-width:700px;max-height:85vh;overflow-y:auto;padding:24px}
.fb-checklist{margin:16px 0}
.fb-check-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px;transition:background .15s}
.fb-check-row:hover{background:#f5f5f5}
.fb-check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--pri)}
.fb-ai-result{background:var(--ptint);border:1px solid #C5C0F0;border-radius:var(--radius);padding:16px;margin-top:12px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.fb-ai-result h4{color:var(--pri);margin-bottom:8px}
.fb-comment{background:#f9f9f7;border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;border-left:3px solid var(--border)}
.fb-comment .fb-comment-meta{font-size:10px;color:var(--muted);margin-bottom:4px}

/* ── Test Mode Banner ── */
.test-mode-banner{position:sticky;top:0;z-index:100;background:linear-gradient(90deg,#F59E0B,#EF4444);color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-weight:600}
.test-mode-banner .tm-label{display:flex;align-items:center;gap:8px;font-size:13px}
.test-mode-banner .tm-actions{display:flex;gap:8px}
.test-mode-banner button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}
.test-mode-banner button:hover{background:rgba(255,255,255,.3)}

/* ── Chat Bot Widget ── */
.chat-fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;background:var(--pri);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:9000;transition:transform .2s;padding:0;display:flex;align-items:center;justify-content:center}
.chat-fab:hover{transform:scale(1.08)}
.chat-panel{position:fixed;bottom:84px;right:24px;width:360px;height:480px;background:var(--card);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:9001;display:none;flex-direction:column;overflow:hidden;border:1px solid var(--border)}
.chat-panel.show{display:flex}
.chat-header{background:var(--pri);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px}
.chat-header button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5;word-wrap:break-word}
.chat-msg-bot{background:var(--ptint);color:var(--txt);align-self:flex-start;border-bottom-left-radius:2px}
.chat-msg-user{background:var(--pri);color:#fff;align-self:flex-end;border-bottom-right-radius:2px}
.chat-typing{align-self:flex-start;padding:8px 12px;background:var(--ptint);border-radius:10px;font-size:12px;color:var(--muted);font-style:italic}
.chat-input-bar{display:flex;gap:6px;padding:10px;border-top:1px solid var(--border);background:var(--card)}
.chat-input-bar input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--txt)}
.chat-input-bar button{background:var(--pri);color:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){.chat-fab{bottom:70px}.chat-panel{width:calc(100% - 20px);right:10px;bottom:130px;height:60vh}}

/* ── Floating Feedback Button ── */
.fb-fab{position:fixed;bottom:24px;left:24px;width:50px;height:50px;border-radius:50%;background:var(--dgrn);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:9000;transition:transform .2s;padding:0;display:flex;align-items:center;justify-content:center}
.fb-fab:hover{transform:scale(1.08)}
.fb-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:9001;display:none;justify-content:center;align-items:center}
.fb-modal-overlay.show{display:flex}
.fb-modal-box{background:#fff;border-radius:12px;padding:24px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto}
@media(max-width:768px){.fb-fab{bottom:70px}}

/* ── Version ── */
.version{text-align:center;font-size:10px;color:var(--muted);padding:20px;opacity:.5}

/* ── Responsive ── */
@media(max-width:768px){
 .stat-grid{grid-template-columns:repeat(2,1fr)}
 .tabs{padding:0 8px}
 .tab{padding:10px 14px;font-size:12px}
 .panel{padding:16px}
 .topbar{padding:10px 16px}
 .form-row{grid-template-columns:1fr}
 .tier-card{flex-direction:column;text-align:center}
 .monthly-grid{grid-template-columns:repeat(6,1fr)}
 .filter-bar{flex-direction:column}
 .filter-bar .count{margin-left:0}
 .pay-grid{grid-template-columns:1fr}

function findProd(n){ return products.find(function(p){return p.name===n}) || products[0]; }

// Normalize client name for matching: lowercase, trim, collapse internal whitespace
function normalizeClientName(s){
 return (s||'').toLowerCase().trim().replace(/\s+/g,' ');
}

// Find product by plan code (any product whose codes string contains the given plan code)
function findProdByPlanCode(planCode){
 if(!planCode) return null;
 var pc = planCode.toUpperCase().trim();
 return products.find(function(p){
  if(!p.codes) return false;
  // codes is a comma-separated string like "G22AR, G22ARN" or "W21GN, RWL21, TAR20E"
  return p.codes.toUpperCase().split(/[,\s]+/).indexOf(pc) !== -1;
 }) || null;
}

// Find candidate matches for a Varicent case in the existing pipeline.
// Returns { tier: 'A'|'B'|'C'|'D', candidate: caseObj|null, varianceAmt: number }
// Tier A: exact match (client + plan code in product OR product matches plan_code's product, premium to penny)
// Tier B: same client + plan code matches product (any premium)
// Tier C: same client name only, status is open (not paid)
// Tier D: no match
function findCaseMatchCandidates(vc){
 var vcName = normalizeClientName(vc.client);
 if(!vcName) return {tier:'D', candidate:null, varianceAmt:0};
 var vcAmt = Math.round((vc.paid_premium||0)*100);
 var vcPlan = (vc.plan_code||'').toUpperCase().trim();
 var planProd = findProdByPlanCode(vc.plan_code); // resolved product object for the plan code

 var sameName = cases.filter(function(c){
  return c && normalizeClientName(c.client) === vcName;
 });
 if(sameName.length === 0) return {tier:'D', candidate:null, varianceAmt:0};

 // Helper: does this case's product match the Varicent plan code?
 function caseProductMatchesPlan(c){
  if(!vcPlan) return false;
  var prod = c.product || '';
  if(prod.toUpperCase().indexOf(vcPlan) !== -1) return true;
  // Also check: does the case's product look up to a product whose codes include this plan
  var cp = findProd(c.product);
  if(cp && cp.codes && cp.codes.toUpperCase().split(/[,\s]+/).indexOf(vcPlan) !== -1) return true;
  // Or: did the user enter a product that maps to the same product object as the plan code?
  if(planProd && cp && planProd.name === cp.name) return true;
  return false;
 }

 // Helper: case is "open" if not in a terminal status (paid, paid-partial, declined)
 function isOpen(c){ return c.status !== 'paid' && c.status !== 'paid-partial' && c.status !== 'declined'; }

 // Tier A: exact match
 var exact = sameName.find(function(c){
  return caseProductMatchesPlan(c) && Math.round((c.amount||0)*100) === vcAmt && isOpen(c);
 });
 if(exact){
  return {tier:'A', candidate:exact, varianceAmt:0};
 }

 // Tier B: same client + plan code match (any premium), not yet paid
 var strong = sameName.find(function(c){
  return caseProductMatchesPlan(c) && isOpen(c);
 });
 if(strong){
  // Compute variance: actual commission - what calcCase would estimate at Tier amount
  var expected = calcCase(strong).agentShare || 0;
  var actual = vc.commission || 0;
  return {tier:'B', candidate:strong, varianceAmt: actual - expected};
 }

 // Tier C: same client name only, open status
 var openStatuses = ['pending','submitted','approved','issued'];
 var possible = sameName.find(function(c){
  return openStatuses.indexOf(c.status) !== -1;
 });
 if(possible){
  var expected2 = calcCase(possible).agentShare || 0;
  var actual2 = vc.commission || 0;
  return {tier:'C', candidate:possible, varianceAmt: actual2 - expected2};
 }

 return {tier:'D', candidate:null, varianceAmt:0};
}

function sumPeriodWithExtras(p, field){

 var total = p[field] || 0;

// ── SHA-256 Hash (for PIN) ──
async function sha256(str){
 var buf = new TextEncoder().encode(str);
 var hash = await crypto.subtle.digest('SHA-256', buf);
 return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// COMMISSION & TIER CALCULATIONS

function calcCase(c){
 var p = findProd(c.product);
 var origGross, agentShare, partnerGets, fullComm;

 // If case has a Varicent-imported commission, use it directly — don't recalculate
 if(c.actualCommission){
  agentShare = c.actualCommission;
  fullComm = agentShare;
  origGross = agentShare;
  partnerGets = 0; // Varicent already handled the split
  return {origGross:origGross, agentShare:agentShare, partnerGets:partnerGets, fullComm:fullComm};
 }

 // Manual entry — calculate from amount × rate, then split
 fullComm = p.flat ? c.amount : c.amount * (c.rate / 100);
 origGross = fullComm;

 // Determine split percentages based on case split type
 // 'life' uses lifeShare, 'pc' or legacy 'split' uses pcShare, 'full' or anything else = no split
 var yourPct = 100, partnerPct = 0;
 if(c.split === 'life'){
  yourPct = settings.lifeShare || 50;
  partnerPct = settings.lifePartnerShare || 50;
 } else if(c.split === 'pc' || c.split === 'split'){
  yourPct = settings.pcShare || 80;
  partnerPct = settings.pcPartnerShare || 20;
 }
 agentShare = fullComm * (yourPct/100);
 partnerGets = fullComm * (partnerPct/100);

 return {origGross:origGross, agentShare:agentShare, partnerGets:partnerGets, fullComm:fullComm};
}

function tierText(mma){ return mma >= 6667 ? 'T4' : mma >= 5000 ? 'T3' : 'T2'; }
function tierClass(mma){ return mma >= 6667 ? 't4' : mma >= 5000 ? 't3' : 't2'; }

function calc3MMA(){
 // Use the latest pay period's MMA value (authoritative Varicent number)
 var latest = null;
 var monthOrder = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 payPeriods.forEach(function(p){
  if(!p || !p.mma) return;
  var mi = monthOrder.indexOf(p.month||'');
  var pi = (p.label||'').indexOf('P2') !== -1 ? 2 : 1;
  var score = mi * 10 + pi;
  if(!latest || score > latest.score) latest = {mma: p.mma, score: score};
 });
 return latest ? latest.mma : 0;
}

function calc3MMAForecast(){
 var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

 // Get production credits, tiers, and period count per month
 var monthCredits = {};
 var monthTiers = {};
 var monthPeriodCount = {}; // how many pay periods (P1/P2) exist for each month
 payPeriods.forEach(function(p){
  if(!p) return;
  var mi = monthNames.indexOf(p.month||'');
  if(mi < 0) return;
  monthCredits[mi] = (monthCredits[mi]||0) + (p.newProdCredits||0) + (p.renewalProdCredits||0);
  if(p.mmaTier) monthTiers[mi] = p.mmaTier;
  monthPeriodCount[mi] = (monthPeriodCount[mi]||0) + 1;
 });

 // Find all months with data, ordered chronologically
 var monthsWithData = [];
 for(var i=12;i>=0;i--){
  var mi = (new Date().getMonth() - i + 12) % 12;
  if(monthCredits[mi] !== undefined && monthsWithData.indexOf(mi) === -1) monthsWithData.push(mi);
 }

 // Determine which months are "settled" (complete) vs "open" (incomplete)
 // A month is settled if it has both P1 and P2, or if it's not the most recent month with data
 var allMonths = monthsWithData.map(function(mi){
  var periodCount = monthPeriodCount[mi] || 0;
  var isLatest = (mi === monthsWithData[monthsWithData.length-1]);
  var isSettled = periodCount >= 2 || !isLatest;
  return {
   name: monthNames[mi],
   credits: monthCredits[mi] || 0,
   tier: monthTiers[mi] || '',
   idx: mi,
   periodCount: periodCount,
   settled: isSettled
  };
 });

 // Settled months = all complete months; take the last 3 for current tier
 var settledMonths = allMonths.filter(function(m){ return m.settled; });
 var settled3 = settledMonths.slice(-3);
 while(settled3.length < 3) settled3.unshift({name:'—',credits:0,tier:'',idx:-1,periodCount:0,settled:true});

 var settledTotal = settled3[0].credits + settled3[1].credits + settled3[2].credits;
 var settled3MMA = settledTotal / 3;
 var settledTier = tierText(settled3MMA);

 // Open month = most recent month that's incomplete (only P1, no P2 yet)
 var openMonths = allMonths.filter(function(m){ return !m.settled; });
 var openMonth = openMonths.length > 0 ? openMonths[openMonths.length-1] : null;

 // Forecast: when open month completes, it joins the window and the oldest settled month drops
 var dropping = settled3[0]; // oldest of the 3 settled months drops off
 var carry1 = settled3[1];
 var carry2 = settled3[2];
 var forecastKnown = carry1.credits + carry2.credits + (openMonth ? openMonth.credits : 0);
 var forecast3MMA = forecastKnown / 3;

 // What's needed in the open month to maintain tiers
 var needT4 = Math.max(0, (6667 * 3) - carry1.credits - carry2.credits - (openMonth ? openMonth.credits : 0));
 var needT3 = Math.max(0, (5000 * 3) - carry1.credits - carry2.credits - (openMonth ? openMonth.credits : 0));

 // Pipeline — group by status, estimate production credits from product catalog
 var pipelineByStatus = {pending:0, submitted:0, approved:0, issued:0};
 var pipelineTotal = 0;
 cases.forEach(function(c){
  if(c.status === 'paid' || c.status === 'paid-partial' || c.status === 'declined') return;
  // If case already has production credit from Varicent, use it
  var credits = 0;
  if(c.productionCredit && c.productionCredit > 0){
   credits = c.productionCredit;
  } else {
   // Estimate from product catalog: amount * prodCredit%
   var prod = findProd(c.product);
   var pcPct = prod && prod.prodCredit !== undefined ? prod.prodCredit : 100;
   credits = (c.amount || 0) * pcPct / 100;
  }
  pipelineTotal += credits;
  if(pipelineByStatus[c.status] !== undefined) pipelineByStatus[c.status] += credits;
 });

 // Projected 3MMA with pipeline
 var projected3MMA = (carry1.credits + carry2.credits + (openMonth ? openMonth.credits : 0) + pipelineTotal) / 3;

 var gapT4 = Math.max(0, needT4 - pipelineTotal);
 var gapT3 = Math.max(0, needT3 - pipelineTotal);

 return {
  settled3: settled3,
  settled3MMA: settled3MMA,
  settledTier: settledTier,
  openMonth: openMonth,
  dropping: dropping,
  carry1: carry1,
  carry2: carry2,
  forecast3MMA: forecast3MMA,
  needT4: needT4,
  needT3: needT3,
  pipelineTotal: pipelineTotal,
  pipelineByStatus: pipelineByStatus,
  projected3MMA: projected3MMA,
  gapT4: gapT4,
  gapT3: gapT3
 };
}

function renderDashboard(){
 var year = new Date().getFullYear();
 var yearCases = cases.filter(function(c){ return (c.year||year) === year; });
 var totalCases = yearCases.length;
 var totalProduction = 0;
 var totalPending = 0;

 yearCases.forEach(function(c){
  var calc = calcCase(c);
  totalProduction += calc.agentShare;
  // Pending = not yet settled (excludes paid, paid-partial, declined)
  if(c.status !== 'paid' && c.status !== 'paid-partial' && c.status !== 'declined') totalPending += calc.agentShare;
 });

 // YTD Paid = sum of varicent payouts from pay periods (authoritative Varicent number)
 var totalPaid = 0;
 payPeriods.forEach(function(p){ totalPaid += p.varicent || 0; });

 var mma = calc3MMA();
 var tier = tierText(mma);
 var tClass = tierClass(mma);
 var nextTierAmt = mma >= 6667 ? 0 : mma >= 5000 ? (6667 - mma) * 3 : (5000 - mma) * 3;
 var nextTierName = mma >= 6667 ? '' : mma >= 5000 ? 'T4' : 'T3';
 var tierPct = mma >= 6667 ? 100 : mma >= 5000 ? ((mma-5000)/1667*100) : (mma/5000*100);

 // Status counts
 var statusCounts = {};
 statusOrder.forEach(function(s){ statusCounts[s] = 0; });
 yearCases.forEach(function(c){ statusCounts[c.status] = (statusCounts[c.status]||0) + 1; });

 // Monthly production — use Varicent pay period totals (authoritative)
 var monthlyProd = {};
 var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 for(var m=0;m<12;m++) monthlyProd[m] = 0;
 payPeriods.forEach(function(p){
  if(!p) return;
  var mi = monthNames.indexOf(p.month||'');
  if(mi >= 0) monthlyProd[mi] += p.varicent || 0;
 });
 var maxMonth = Math.max.apply(null, Object.values(monthlyProd).concat([1]));

 // YTD from pay periods for take-home
 var ytdNet = 0, ytdGross = 0, ytdTaxes = 0, ytdDeductions = 0;
 payPeriods.forEach(function(p){
  ytdNet += sumPeriodWithExtras(p, 'net');
  ytdGross += sumPeriodWithExtras(p, 'gross');
  ytdTaxes += sumPeriodWithExtras(p, 'taxes');
  ytdDeductions += sumPeriodWithExtras(p, 'preTax') + sumPeriodWithExtras(p, 'postTax');
 });
 var takeHomeRate = totalPaid > 0 ? (ytdNet / totalPaid * 100).toFixed(0) : '—';

 var h = '';

 // ── YTD Summary (matching Pay History format) ──
 // Gross Pay hero
 h += '<div class="card" style="text-align:center;border-top:4px solid var(--pri);margin-bottom:12px">';
 h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">YTD Gross Pay</div>';
 h += '<div style="font-size:36px;font-weight:800;color:var(--pri)">'+fmt(ytdGross)+'</div>';
 // Tier badge inline
 var tierColor = tier === 'T4' ? 'var(--grn)' : tier === 'T3' ? 'var(--amb)' : 'var(--red)';
 h += '<div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:8px">';
 h += '<span style="font-size:20px;font-weight:800;color:'+tierColor+'">'+tier+'</span>';
 h += '<span style="font-size:12px;color:var(--muted)">Current Tier &middot; 3MMA: '+fmt(mma)+' &middot; '+totalCases+' cases &middot; '+statusCounts['paid']+' paid &middot; '+(totalCases-statusCounts['paid'])+' in pipeline</span>';
 h += '</div>';
 h += '</div>';

 // 4 stat boxes
 h += '<div class="stat-grid" style="margin-bottom:16px">';
 h += '<div class="stat-card green"><div class="stat-label">YTD Commission (Varicent)</div><div class="stat-value" style="color:var(--grn)">'+fmt(totalPaid)+'</div></div>';
 h += '<div class="stat-card red"><div class="stat-label">YTD Taxes</div><div class="stat-value" style="color:var(--red)">'+fmt(ytdTaxes)+'</div></div>';
 h += '<div class="stat-card amber"><div class="stat-label">YTD Deductions</div><div class="stat-value" style="color:var(--amb)">'+fmt(ytdDeductions)+'</div></div>';
 h += '<div class="stat-card green"><div class="stat-label">YTD Net Pay (Deposited)</div><div class="stat-value" style="color:var(--grn)">'+fmt(ytdNet)+'</div></div>';
 h += '</div>';

 // ── Stat cards ──
 // Latest month with production data
 var latestMonth = new Date().getMonth();
 for(var lm = new Date().getMonth(); lm >= 0; lm--){
  if(monthlyProd[lm] > 0){ latestMonth = lm; break; }
 }
 var curMonthProd = monthlyProd[latestMonth] || 0;
 var curMonthNet = 0;
 payPeriods.forEach(function(p){
  if(!p) return;
  var mi = monthNames.indexOf(p.month||'');
  if(mi === latestMonth) curMonthNet += p.net || 0;
 });

 h += '<div class="stat-grid">';

 // Pipeline Status Breakdown (moved below Gross Monthly Commission)
 h += '<div class="card">';

  h += '<div style="font-size:24px;font-weight:700">'+statusCounts[s]+'</div>';

 });

 $1('#p0').innerHTML = h;
}

function getFilteredCases(){
 var year = new Date().getFullYear();
 var filtered = cases.filter(function(c){
  if(filterStatus && c.status !== filterStatus) return false;
  if(filterCarrier){
   var p = findProd(c.product);
   if(p.carrier !== filterCarrier) return false;
  }
  if(filterCat){
   var p = findProd(c.product);
   if(p.cat !== filterCat) return false;
  }
  if(searchQuery){
   var q = searchQuery.toLowerCase();
   if((c.client||'').toLowerCase().indexOf(q)===-1 && (c.phone||'').indexOf(q)===-1) return false;
  }
  return true;
 });

 // Sort
 filtered.sort(function(a,b){
  var va, vb;
  if(sortCol === 'client'){ va = (a.client||'').toLowerCase(); vb = (b.client||'').toLowerCase(); }
  else if(sortCol === 'carrier'){ va = findProd(a.product).carrier; vb = findProd(b.product).carrier; }
  else if(sortCol === 'product'){ va = a.product; vb = b.product; }
  else if(sortCol === 'amount'){ va = a.amount||0; vb = b.amount||0; }
  else if(sortCol === 'commission'){ va = calcCase(a).agentShare; vb = calcCase(b).agentShare; }
  else if(sortCol === 'status'){ va = statusIdx(a.status); vb = statusIdx(b.status); }
  else if(sortCol === 'submitted'){ va = a.submitted||''; vb = b.submitted||''; }
  else if(sortCol === 'estPay'){ va = a.estPay||''; vb = b.estPay||''; }
  else { va = a.submitted||''; vb = b.submitted||''; }
  if(va < vb) return sortAsc ? -1 : 1;
  if(va > vb) return sortAsc ? 1 : -1;
  return 0;
 });

 return filtered;
}

function ncCalcPreview(){

 var amount = parseFloat(($1('#nc_amount')||{}).value) || 0;

 if(!el) return;
 if(!prodName || !amount){
  el.innerHTML = '<div style="color:var(--muted);font-size:11px">Select a product and enter an amount to see commission preview</div>';
  return;
 }
 var p = findProd(prodName);
 var fullComm = p.flat ? amount : amount * (rate/100);
 var yourPct = 100, partnerPct = 0, splitLabel = 'Full';
 if(split === 'life'){
  yourPct = settings.lifeShare || 50;
  partnerPct = settings.lifePartnerShare || 50;
  splitLabel = 'Life';
 } else if(split === 'pc' || split === 'split'){
  yourPct = settings.pcShare || 80;
  partnerPct = settings.pcPartnerShare || 20;
  splitLabel = 'PC';
 }
 var agentShare = fullComm * (yourPct/100);
 var partnerGets = fullComm * (partnerPct/100);
 el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center">'
  + (partnerGets > 0 ? '<div><div style="font-size:11px;color:var(--muted)">Total Commission</div><div style="font-size:16px;font-weight:600">'+fmt(fullComm)+'</div></div>' : '')
  + '<div><div style="font-size:11px;color:var(--muted)">Your Commission ('+splitLabel+' '+yourPct+'%)</div><div class="big">'+fmt(agentShare)+'</div></div>'
  + (partnerGets > 0 ? '<div style="text-align:right"><div style="font-size:11px;color:var(--muted)">Partner Gets ('+partnerPct+'%)</div><div style="font-size:16px;font-weight:600">'+fmt(partnerGets)+'</div></div>' : '')
  + '</div>';
}

function advanceStatus(caseId){
 var c = cases.find(function(x){return x.id===caseId});
 if(!c) return;
 var idx = statusIdx(c.status);
 if(idx < 4){
  var prevStatus = c.status;
  c.status = statusOrder[idx+1];
  if(c.status === 'paid') c.paidDate = toYMD(new Date());
  c.updated = new Date().toISOString();
  saveCases();
  // Log status change to/from paid (those affect financial totals)
  if(c.status === 'paid' || prevStatus === 'paid' || c.status === 'paid-partial' || prevStatus === 'paid-partial' || c.status === 'declined' || prevStatus === 'declined'){
   logAuditEntry({
    action: 'status_change',
    targetIds: [caseId],
    client: c.client,
    summary: c.client + ' status: ' + prevStatus + ' → ' + c.status,
    before: { status: prevStatus, paidDate: c.paidDate ? '' : c.paidDate },
    after: { status: c.status, paidDate: c.paidDate || '' }
   });
  }
  showToast(c.client + ' → ' + c.status.charAt(0).toUpperCase()+c.status.slice(1), 2000);
  renderAll();
 }
}

function deleteCase(caseId){
 var c = cases.find(function(x){return x.id===caseId});
 if(!c) return;
 if(!confirm('Delete this case?')) return;
 var snapshot = JSON.parse(JSON.stringify(c));
 cases = cases.filter(function(x){return x.id!==caseId});
 saveCases();
 logAuditEntry({

function renderPayPeriods(){

 h += '<div id="upload_status"></div>';
 h += '</div>';

 h += '</div>'; // end pay-grid
 h += '</div>'; // end payFormWrap
 h += '</div>'; // end card

 // Pay period history
 h += '<div style="margin-top:24px">';
 h += '<h3 style="margin-bottom:12px">Pay History</h3>';

 if(payPeriods.length === 0){
  h += '<div class="card" style="text-align:center;color:var(--muted);padding:40px">No pay periods recorded yet. Add your first pay period above.</div>';
 } else {
  // YTD summary — includes extraDeposits on each period
  var ytdGross = 0, ytdNet = 0, ytdVaricent = 0, ytdTaxes = 0, ytdDeductions = 0;
  payPeriods.forEach(function(p){
   ytdVaricent += p.varicent || 0;
   ytdGross += sumPeriodWithExtras(p, 'gross');
   ytdNet += sumPeriodWithExtras(p, 'net');
   ytdTaxes += sumPeriodWithExtras(p, 'taxes');

  h += '<div class="stat-card amber"><div class="stat-label">YTD Deductions</div><div class="stat-value" style="color:var(--amb)">'+fmt(ytdDeductions)+'</div></div>';
  h += '<div class="stat-card green"><div class="stat-label">YTD Net Pay (Deposited)</div><div class="stat-value" style="color:var(--grn)">'+fmt(ytdNet)+'</div></div>';
  h += '</div>';

  // Individual periods — compact cards, sorted newest first
  // Sort: handle Dec from prior year correctly (Dec < Jan in calendar order for current year)
  var monthOrder = ['Dec','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov'];
  var sorted = payPeriods.slice().sort(function(a,b){
   var ma = monthOrder.indexOf(a.month || '');
   var mb = monthOrder.indexOf(b.month || '');
   if(ma !== mb) return mb - ma;
   var pa = (a.label||'').indexOf('P2') !== -1 ? 2 : 1;
   var pb = (b.label||'').indexOf('P2') !== -1 ? 2 : 1;
   return pb - pa;
  });

  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">';
  sorted.forEach(function(p){
   var pTier = p.mmaTier ? p.mmaTier.replace('TIER','T') : '';
   var pTierColor = p.mmaTier==='TIER4'?'var(--grn)':p.mmaTier==='TIER3'?'var(--amb)':'var(--muted)';
   var pCredits = (p.newProdCredits||0) + (p.renewalProdCredits||0);
   var extras = p.extraDeposits || [];
   var extrasNet = 0; extras.forEach(function(ed){ extrasNet += ed.net || 0; });
   var totalNet = (p.net||0) + extrasNet;
   h += '<div style="background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);border-left:4px solid var(--pri)">';
   // Header row
   h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
   h += '<div style="font-weight:700;font-size:14px">'+p.label;

   h += '</div>';
   h += '<button onclick="addManualDeposit('+p.id+')" title="Add deposit manually" style="background:none;border:1px solid var(--border);color:var(--muted);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1">+</button>';
   h += '</div>';

   h += '<div style="display:flex;justify-content:space-between;align-items:baseline">';
   h += '<div><div style="font-size:18px;font-weight:700;color:var(--pri)">'+fmt(p.varicent)+'</div><div style="font-size:9px;color:var(--muted)">commission</div></div>';
   if(totalNet > 0){
    h += '<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--grn)">'+fmt(totalNet)+'</div><div style="font-size:9px;color:var(--muted)">net deposited'+(extras.length>0?' (incl. '+extras.length+' extra)':'')+'</div></div>';
   }

   // Details line
   h += '<div style="font-size:10px;color:var(--muted);margin-top:6px;border-top:1px solid var(--border);padding-top:4px">';
   h += 'Credits: '+fmt(pCredits);
   if(p.net > 0) h += ' | Gross: '+fmt(p.gross)+' | Tax: '+fmt(p.taxes);
   h += '</div>';
   // Extra deposits list
   if(extras.length > 0){
    h += '<div style="margin-top:6px;border-top:1px dashed var(--border);padding-top:6px">';
    extras.forEach(function(ed){
     h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:10px">';
     h += '<div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(ed.description||'').replace(/"/g,'&quot;')+'">+ '+(ed.description||'Deposit')+'</div>';
     h += '<div style="color:var(--grn);font-weight:600;margin-left:8px">'+fmt(ed.net)+'</div>';
     h += '<button onclick="deleteExtraDeposit('+p.id+','+ed.id+')" title="Remove" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;margin-left:4px">&times;</button>';
     h += '</div>';
    });
    h += '</div>';
   }
   h += '</div>';
  });
  h += '</div>';
 }
 h += '</div>';

 $1('#p2').innerHTML = h;
}

function togglePayForm(){
 payFormOpen = !payFormOpen;

function updatePayPreview(){
 var varicent = pv('pp_varicent');
 var gross = pv('pp_gross');
 var pretax = pv('pp_pretax');
 var taxes = pv('pp_taxes');
 var posttax = pv('pp_posttax');
 var net = pv('pp_net');
 var mma = pv('pp_mma');

 var origGross = varicent > 0 ? varicent / (settings.yourShare/100) : 0;
 var partnerGot = origGross - varicent;
 var modelNet = gross - pretax - taxes - posttax;
 var diff = Math.abs(net - modelNet);
 var matchLabel = diff < 1 ? '<span class="strong">Perfect match</span>' : diff < 10 ? '<span class="possible">Close (diff: '+fmt(diff)+')</span>' : (net > 0 ? '<span style="color:var(--red);font-weight:600">Check entries (diff: '+fmt(diff)+')</span>' : '\u2014');

 var tierHtml = mma > 0 ? ('<span class="badge '+(mma>=6667?'badge-grn':mma>=5000?'badge-amb':'badge-red')+'">'+tierText(mma)+'</span> \u2014 3MMA: '+fmt(mma)) : '\u2014';

 var h = '<h4>Live Calculation Preview</h4>';
 h += '<table style="max-width:500px;font-size:13px">';
 h += '<tr><td>Your commission (entered)</td><td style="text-align:right"><b>'+fmt(varicent)+'</b></td></tr>';
 h += '<tr><td>Original gross (reverse: /'+settings.yourShare+'%)</td><td style="text-align:right">'+fmt(origGross)+'</td></tr>';
 h += '<tr><td>Partner received</td><td style="text-align:right">'+fmt(partnerGot)+'</td></tr>';
 h += '<tr><td colspan="2" style="border-top:2px solid var(--border);padding:2px"></td></tr>';
 h += '<tr><td>Model net pay</td><td style="text-align:right">'+fmt(modelNet)+'</td></tr>';
 h += '<tr><td>Actual payslip net</td><td style="text-align:right">'+fmt(net)+'</td></tr>';
 h += '<tr><td>Match</td><td style="text-align:right">'+matchLabel+'</td></tr>';
 h += '<tr><td>Tier</td><td style="text-align:right">'+tierHtml+'</td></tr>';
 h += '</table>';

 $1('#payPreview').innerHTML = h;

 // Pipeline match suggestions
 var sugEl = $1('#matchSuggestions');
 if(!sugEl) return;
 if(varicent > 0){
  var matches = [];
  cases.forEach(function(c){
   if(c.status === 'paid' || c.status === 'paid-partial' || c.status === 'declined') return;
   var calc = calcCase(c);
   if(calc.agentShare <= 0) return;
   var pctDiff = Math.abs(calc.agentShare - varicent) / calc.agentShare;
   if(pctDiff <= 0.05){
    matches.push({c:c, calc:calc, pctDiff:pctDiff});
   }
  });
  if(matches.length){
   var mh = '<div class="match-box"><h4>Pipeline Match Suggestions</h4>';
   matches.forEach(function(m){
    var confidence = m.pctDiff < 0.005 ? '<span class="strong">Strong match</span>' : '<span class="possible">Possible match</span>';
    mh += '<div style="display:flex;align-items:center;gap:10px;margin:8px 0;padding:8px;background:#fff;border-radius:4px">';
    mh += '<div style="flex:1"><b>'+m.c.client+'</b> \u2014 '+m.c.product+'<br>Expected your share: '+fmt(m.calc.agentShare)+' (diff: '+(m.pctDiff*100).toFixed(2)+'%) '+confidence+'</div>';
    mh += '<button class="btn btn-sm btn-grn" onclick="confirmMatch('+m.c.id+')">Confirm Match</button>';
    mh += '</div>';
   });
   mh += '</div>';
   sugEl.innerHTML = mh;
  } else {
   sugEl.innerHTML = '';
  }
 } else {
  sugEl.innerHTML = '';
 }
}

function saveManualDeposit(periodId){
 var p = payPeriods.find(function(x){return x.id===periodId});
 if(!p) return;
 var net = parseFloat($1('#md_net').value) || 0;
 if(net <= 0){ showToast('Net amount is required', 2000); return; }
 if(!p.extraDeposits) p.extraDeposits = [];
 var edId = 1;
 p.extraDeposits.forEach(function(ed){ if(ed.id >= edId) edId = ed.id + 1; });
 p.extraDeposits.push({
  id: edId,
  date: $1('#md_date').value || toYMD(new Date()),
  description: ($1('#md_desc').value||'Manual Deposit').trim(),
  gross: parseFloat($1('#md_gross').value) || 0,
  taxes: parseFloat($1('#md_taxes').value) || 0,
  preTax: 0,
  postTax: 0,
  net: net,
  bonuses: 0,
  source: 'manual'
 });
 savePayPeriods();
 closeEditModal();
 showToast('Deposit added to ' + p.label, 2000);
 renderPayPeriods();
 renderDashboard();
 renderCashFlow();
}

function deleteExtraDeposit(periodId, depositId){
 var p = payPeriods.find(function(x){return x.id===periodId});
 if(!p || !p.extraDeposits) return;
 if(!confirm('Remove this deposit?')) return;
 p.extraDeposits = p.extraDeposits.filter(function(ed){return ed.id!==depositId});
 savePayPeriods();
 showToast('Deposit removed', 2000);
 renderPayPeriods();
 renderDashboard();
 renderCashFlow();
}

// ════════════════════════════════════════════
// TAB 3: CASH FLOW
// ════════════════════════════════════════════
function renderCashFlow(){
 var year = new Date().getFullYear();
 var now = new Date();
 var h = '<h2 style="margin-bottom:16px;color:var(--pri)">Forecasting</h2>';

 // Calculate projections based on pipeline
 var paid = 0, pending30 = 0, pending60 = 0, pending90 = 0, pendingTotal = 0;
 var today = toYMD(now);
 var d30 = new Date(now); d30.setDate(d30.getDate()+30); var day30 = toYMD(d30);
 var d60 = new Date(now); d60.setDate(d60.getDate()+60); var day60 = toYMD(d60);
 var d90 = new Date(now); d90.setDate(d90.getDate()+90); var day90 = toYMD(d90);

 cases.forEach(function(c){
  // Declined cases don't pay and aren't pending — skip entirely
  if(c.status === 'declined') return;
  var calc = calcCase(c);
  if(c.status === 'paid' || c.status === 'paid-partial'){

function restoreBackup(input){

 var reader = new FileReader();

   if(!data.cases){ showToast('Invalid backup file', 3000); return; }
   if(!confirm('This will replace your current data with '+data.cases.length+' cases from the backup. Continue?')) return;
   cases = data.cases;
   payPeriods = data.payPeriods || [];
   if(data.settings) settings = Object.assign({}, defaultSettings, data.settings);
   nextCaseId = 1;
   cases.forEach(function(c){ if(c.id >= nextCaseId) nextCaseId = c.id + 1; });
   nextPeId = 1;
   payPeriods.forEach(function(p){ if(p.id >= nextPeId) nextPeId = p.id + 1; });
   saveCases();
   savePayPeriods();
   saveSettings();
   showToast('Restored '+cases.length+' cases and '+payPeriods.length+' pay periods from backup', 3000);
   renderAll();
  } catch(err){
   showToast('Error reading backup: ' + err.message, 4000);
  }
 };
 reader.readAsText(file);
 input.value = '';
}

// DUPLICATE SCANNER
// ════════════════════════════════════════════
function findDuplicates(){
 // Group cases by normalized client name; return groups with 2+ cases that aren't already marked dupReviewed
 var groups = {};
 (cases || []).forEach(function(c){
  if(!c || !c.client) return;
  var key = normalizeClientName(c.client);
  if(!key) return;
  if(!groups[key]) groups[key] = [];
  groups[key].push(c);
 });
 var dupGroups = [];
 Object.keys(groups).forEach(function(k){
  if(groups[k].length < 2) return;
  // Skip groups where all members have been marked dupReviewed:true
  var allReviewed = groups[k].every(function(c){ return c.dupReviewed === true; });
  if(allReviewed) return;
  dupGroups.push({ key: k, name: groups[k][0].client, cases: groups[k] });
 });
 return dupGroups;
}

function showDuplicateScanner(){
 var groups = findDuplicates();
 var h = '';
 h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
 h += '<div style="font-size:18px;font-weight:700;color:var(--pri)">🔎 Duplicate Audit</div>';
 h += '<button class="btn btn-outline btn-sm" onclick="closeDupScanner()">&times; Close</button>';
 h += '</div>';

 if(groups.length === 0){
  h += '<div style="padding:30px;text-align:center;color:var(--muted)">✅ No duplicates found. Your Book of Business is clean.</div>';
 } else {

var _auditFilter = { range: '30', action: '' };

function showAuditLog(){
 var entries = (auditLog || []).slice().sort(function(a,b){ return (b.id||0) - (a.id||0); });

 // Apply filters

 var rangeDays = parseInt(_auditFilter.range, 10) || 0;

 var h = '';

 // Filters

 [['7','Last 7 days'],['30','Last 30 days'],['90','Last 90 days'],['0','All time']].forEach(function(o){
  h += '<option value="'+o[0]+'"'+(_auditFilter.range===o[0]?' selected':'')+'>'+o[1]+'</option>';
 });
 h += '</select>';
 h += '<select onchange="_auditFilter.action=this.value;showAuditLog()" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);color:var(--txt)">';
 [['','All actions'],['merge','Merges'],['delete','Deletions'],['status_change','Status changes'],['import_confirm','Imports']].forEach(function(o){
  h += '<option value="'+o[0]+'"'+(_auditFilter.action===o[0]?' selected':'')+'>'+o[1]+'</option>';
 });
 h += '</select>';
 h += '</div>';

 if(entries.length === 0){

   var canUndo = !e.undone && (e.action === 'merge' || e.action === 'delete') && (now - new Date(e.timestamp).getTime() < 7*24*60*60*1000); // 7 day window
   h += '<div style="border:1px solid var(--border);border-left:3px solid '+actColor+';background:'+actBg+';border-radius:4px;padding:10px 12px;margin-bottom:6px;font-size:12px">';
   h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
   h += '<div style="flex:1">';
   h += '<div style="font-size:10px;color:var(--muted)">'+dateStr+' &middot; <b style="color:'+actColor+'">'+(e.action||"").replace(/_/g," ").toUpperCase()+'</b>'+(e.undone ? ' &middot; <span style="color:var(--red)">UNDONE</span>' : '')+'</div>';
   h += '<div style="margin-top:2px">'+e.summary+'</div>';

   h += '</div>';
  });
 }

function undoAuditEntry(entryId){
 var entry = auditLog.find(function(e){ return e.id === entryId; });
 if(!entry || entry.undone){ showToast('Cannot undo this entry', 2000); return; }

 if(entry.action === 'merge'){
  if(!confirm('Undo merge for "'+(entry.client||'this entry')+'"? This will restore the deleted cases and revert the kept case to its pre-merge state.')) return;
  // Restore the kept case to its before-merge state
  if(entry.before && entry.before.keep){
   var keepIdx = cases.findIndex(function(c){ return c && c.id === entry.before.keep.id; });
   if(keepIdx !== -1) cases[keepIdx] = JSON.parse(JSON.stringify(entry.before.keep));
   else cases.push(JSON.parse(JSON.stringify(entry.before.keep))); // fallback if it was deleted somehow
  }
  // Re-create the deleted cases
  if(entry.before && entry.before.removed){
   entry.before.removed.forEach(function(removedCase){
    var exists = cases.find(function(c){ return c && c.id === removedCase.id; });
    if(!exists) cases.push(JSON.parse(JSON.stringify(removedCase)));
   });
  }
  entry.undone = true;
  saveCases();
  // Update the audit entry in Firebase
  try {
   fetch(FIREBASE_URL + '/' + currentAgent.id + '/auditLog/' + entry.id + '.json', {method:'PATCH', body: JSON.stringify({undone:true})}).catch(function(){});
  } catch(e){}
  // Log the undo action
  logAuditEntry({
   action: 'undo',
   targetIds: entry.targetIds || [],
   summary: 'Undid merge from audit entry #' + entry.id + ' — restored ' + (entry.before.removed||[]).length + ' deleted case(s)',
   before: null,
   after: { undidEntryId: entry.id }
  });
  showToast('Merge undone — cases restored', 3000);
  showAuditLog();
  return;
 }

 if(entry.action === 'delete'){
  if(!confirm('Undo delete for "'+(entry.client||'this case')+'"? This will recreate the case.')) return;
  if(entry.before && entry.before.case){
   var existing = cases.find(function(c){ return c && c.id === entry.before.case.id; });
   if(existing){ showToast('Case ID '+entry.before.case.id+' already exists', 2500); return; }
   cases.push(JSON.parse(JSON.stringify(entry.before.case)));
   entry.undone = true;
   saveCases();
   try {
    fetch(FIREBASE_URL + '/' + currentAgent.id + '/auditLog/' + entry.id + '.json', {method:'PATCH', body: JSON.stringify({undone:true})}).catch(function(){});
   } catch(e){}
   logAuditEntry({
    action: 'undo',
    targetIds: [entry.before.case.id],
    summary: 'Undid delete from audit entry #' + entry.id + ' — restored case ID ' + entry.before.case.id,
    before: null,
    after: { undidEntryId: entry.id }
   });
   showToast('Case restored', 3000);
   showAuditLog();
   return;
  }
 }

 showToast('Undo not supported for this action type', 2500);
}

function markDupReviewed(groupKey){
 var n = 0;
 cases.forEach(function(c){
  if(c && normalizeClientName(c.client) === groupKey){
   c.dupReviewed = true;
   n++;
  }
 });
 if(n > 0) saveCases();
 showToast('Marked '+n+' cases as separate (not duplicates)', 2500);
 showDuplicateScanner();
}

function mergeIntoCase(keepId, groupKey){
 var keep = cases.find(function(c){ return c && c.id === keepId; });
 if(!keep) return;
 if(!confirm('Merge other "'+keep.client+'" cases into ID '+keepId+'? This will delete the other cases.')) return;

 var others = cases.filter(function(c){
  return c && normalizeClientName(c.client) === groupKey && c.id !== keepId;
 });

 // Snapshot for audit log (full deep copy of all cases involved BEFORE merge)
 var auditBeforeKeep = JSON.parse(JSON.stringify(keep));
 var auditBeforeOthers = JSON.parse(JSON.stringify(others));

 // Pick the most "advanced" status: prefer paid > paid-partial > issued > approved > submitted > pending
 function statusRank(s){
  if(s === 'paid') return 100;
  if(s === 'paid-partial') return 95;
  if(s === 'declined') return 90; // terminal but no commission
  if(s === 'issued') return 80;
  if(s === 'approved') return 70;
  if(s === 'submitted') return 60;
  return 50;
 }
 var allCases = [keep].concat(others);
 var bestStatus = allCases.reduce(function(best, c){
  return statusRank(c.status) > statusRank(best.status) ? c : best;
 }, keep);

 // Pull paid data from the most-advanced case
 if(bestStatus.id !== keep.id || statusRank(bestStatus.status) > statusRank(keep.status)){
  // BEFORE overwriting, capture expected values from the kept case (the original estimate)
  var expectedAmtPre = keep.amount || 0;
  var expectedCommPre = (calcCase(keep).agentShare) || 0;

  if(bestStatus.actualCommission !== undefined) keep.actualCommission = bestStatus.actualCommission;
  if(bestStatus.productionCredit !== undefined) keep.productionCredit = bestStatus.productionCredit;
  if(bestStatus.paidIn) keep.paidIn = bestStatus.paidIn;
  if(bestStatus.paidDate) keep.paidDate = bestStatus.paidDate;
  if(bestStatus.rate && !keep.rate) keep.rate = bestStatus.rate;

  // Variance detection: if the merged paid case has a different premium than the kept case,
  // record expected values and offer to mark as paid-partial
  var paidAmt = (bestStatus.amount || 0);
  var actualComm = (bestStatus.actualCommission || 0);
  var amtDiffer = expectedAmtPre > 0 && paidAmt > 0 && Math.abs(expectedAmtPre - paidAmt) > 0.5;
  var commDiffer = expectedCommPre > 0 && actualComm > 0 && Math.abs(expectedCommPre - actualComm) > 0.5;

  if(amtDiffer || commDiffer){
   keep.expectedAmount = expectedAmtPre;
   keep.expectedCommission = expectedCommPre;
   keep.paidVariance = actualComm - expectedCommPre;
   // Default behavior: keep the kept case's original amount (so the variance is visible)
   // and mark as paid-partial. Ask user to confirm.
   var summary = 'Variance detected:\\n'
    + 'Original amount: $' + expectedAmtPre.toFixed(2) + '\\n'
    + 'Paid amount: $' + paidAmt.toFixed(2) + '\\n'
    + 'Expected commission: $' + expectedCommPre.toFixed(2) + '\\n'
    + 'Actual paid: $' + actualComm.toFixed(2) + '\\n'
    + 'Variance: $' + (actualComm - expectedCommPre).toFixed(2) + '\\n\\n'
    + 'Mark as Paid (Partial) and keep original amount as the expected estimate?';
   if(confirm(summary)){
    keep.status = 'paid-partial';
    // amount stays at expectedAmtPre (original estimate)
   } else {
    // User declined — fall back to standard merge behavior
    if(statusRank(bestStatus.status) > statusRank(keep.status)) keep.status = bestStatus.status;
    if(!keep.amount && bestStatus.amount) keep.amount = bestStatus.amount;
   }
  } else {
   // No meaningful variance — just mark with the best status
   if(statusRank(bestStatus.status) > statusRank(keep.status)) keep.status = bestStatus.status;
   if(!keep.amount && bestStatus.amount) keep.amount = bestStatus.amount;
  }
 }

 // Fill in any missing fields from others (splitName, etc.)
 others.forEach(function(o){
  if(!keep.splitName && o.splitName) keep.splitName = o.splitName;
  if(!keep.splitEmail && o.splitEmail) keep.splitEmail = o.splitEmail;
  if(!keep.phone && o.phone) keep.phone = o.phone;
  if(!keep.policyType && o.policyType) keep.policyType = o.policyType;
 });

 keep.notes = (keep.notes || '') + ' | Merged from IDs: ' + others.map(function(o){return o.id;}).join(', ');
 keep.updated = new Date().toISOString();

 // Remove the other cases
 var removeIds = others.map(function(o){return o.id;});
 cases = cases.filter(function(c){ return !c || removeIds.indexOf(c.id) === -1; });

 saveCases();

 // Audit log entry
 var summaryText = 'Merged ' + others.length + ' case' + (others.length>1?'s':'') + ' for "' + keep.client + '" into ID ' + keepId
  + ' (status: ' + keep.status + (keep.paidVariance ? ', variance: $' + keep.paidVariance.toFixed(2) : '') + ')';
 logAuditEntry({
  action: 'merge',
  targetIds: [keepId].concat(others.map(function(o){return o.id;})),
  keptId: keepId,
  client: keep.client,
  summary: summaryText,
  before: { keep: auditBeforeKeep, removed: auditBeforeOthers },
  after: { keep: JSON.parse(JSON.stringify(keep)) }
 });

 showToast('Merged '+others.length+' case'+(others.length>1?'s':'')+' into ID '+keepId, 3000);
 showDuplicateScanner();
}

  if(a.candidate && Math.abs(a.varianceAmt) > 0.5){

 });

function cancelImportPreview(){
 $1('#importPreviewModal').className = 'modal-overlay';
 _pendingPreviewActions = null;
 // Pay periods were already saved; just finalize with no case changes

}

function confirmImport(){
 var actions = _pendingPreviewActions || [];
 var newCount = 0, updatedCount = 0;
 var skippedCount = 0;
 var matchedDetails = []; // for audit log
 var ctx = window._importContext || {};
 var getCaseDate = ctx.getCaseDate || function(m,p){ return {submitted: toYMD(new Date()), year: new Date().getFullYear()}; };

 actions.forEach(function(a){
  var vc = a.varicentCase;
  var v = a.vMeta;
  if(a.chosenAction === 'skip'){ skippedCount++; return; }

  if(a.chosenAction === 'match' && a.candidate){
   var c = a.candidate;
   var beforeSnap = JSON.parse(JSON.stringify(c));
   // Compute expected commission BEFORE we overwrite case fields
   var expected = calcCase(c).agentShare || 0;
   c.expectedCommission = expected;
   c.expectedAmount = c.amount;
   c.paidVariance = (vc.commission || 0) - expected;
   c.actualCommission = vc.commission || 0;
   c.productionCredit = vc.production_credit || 0;
   if(vc.paid_premium) c.amount = vc.paid_premium;
   if(vc.mma_rate || vc.commission_rate) c.rate = vc.mma_rate || vc.commission_rate;
   if(vc.is_split && (!c.split || c.split === 'full')) c.split = 'pc';
   c.status = a.markPartial ? 'paid-partial' : 'paid';
   c.paidDate = toYMD(new Date());
   c.paidIn = v.period_label || '';
   c.notes = (c.notes || '') + ' | Matched from Varicent ' + (v._filename||'');
   c.updated = new Date().toISOString();
   matchedDetails.push({ caseId: c.id, client: c.client, before: beforeSnap });
   updatedCount++;
   return;
  }

  // Create new case
  var prodLabel = vc.product || 'Unknown Product';
  if(vc.plan_code) prodLabel += ' (' + vc.plan_code + ')';
  var dateInfo = getCaseDate(v.month, v.period_label);
  cases.push({
   id: nextCaseId++,
   client: (vc.client || '').trim(),
   phone: '',
   product: prodLabel,
   policyType: vc.policy_type || 'New',
   section: a.section,
   amount: vc.paid_premium || vc.production_credit || 0,
   rate: vc.mma_rate || vc.commission_rate || 0,
   actualCommission: vc.commission || 0,
   productionCredit: vc.production_credit || 0,
   split: vc.is_split ? 'pc' : 'full',
   splitName: '', splitEmail: '',
   status: 'paid',
   submitted: dateInfo.submitted,
   estPay: '',
   paidDate: toYMD(new Date()),
   paidIn: v.period_label || '',
   notes: (vc.policy_type || 'New') + ' | ' + a.section + ' | Paid Premium: $'+(vc.paid_premium||0).toFixed(2)+' | Prod Credit: $'+(vc.production_credit||0).toFixed(2),
   year: dateInfo.year,
   created: new Date().toISOString()
  });
  newCount++;
 });

 if(newCount > 0 || updatedCount > 0) saveCases();

 // Audit log entry — Varicent import summary
 if(actions.length > 0){
  var periodLabel = (actions[0] && actions[0].vMeta && actions[0].vMeta.period_label) || 'Unknown period';
  logAuditEntry({
   action: 'import_confirm',
   targetIds: matchedDetails.map(function(m){return m.caseId;}),

function finishImport(newCount, updatedCount){

 var summaryHtml = '<div style="padding:12px;background:'+summaryBg+';border-radius:6px;color:'+summaryColor+';font-size:12px;font-weight:600">'+summaryIcon+' ' + (msg.length > 0 ? msg.join(' \u2022 ') : 'No new data to import') + '</div>';
 if(ctx.errors && ctx.errors.length > 0){
  summaryHtml += '<div style="padding:8px;background:var(--rtint);border-radius:6px;color:var(--red);font-size:11px;margin-top:6px">Errors: ' + ctx.errors.join(', ') + '</div>';

}

function filterAdminFeedback(){

 var type = ($1('#afb_type').value||'');
 var items = feedbackItems.slice().sort(function(a,b){ return (b.timestamp||'').localeCompare(a.timestamp||''); });
 if(status) items = items.filter(function(f){ return f.status === status; });
 if(type) items = items.filter(function(f){ return f.type === type; });
 var h = '';
 items.forEach(function(f){
  var statusClass = 'fb-status-' + f.status;
  var typeBadge = f.type === 'bug' ? 'badge-red' : f.type === 'suggestion' ? 'badge-pri' : 'badge-amb';
  h += '<div class="fb-item fb-'+f.type+'" onclick="closeAdminFeedback();openFeedbackReview(\''+f.id+'\')" style="margin-bottom:8px">';

function renderFeedback(){

 try {
 var admin = isAdmin();

function submitFeedback(){
 var title = ($1('#fb_title').value||'').trim();
 var desc = ($1('#fb_desc').value||'').trim();
 if(!title){ showToast('Please enter a title', 2000); return; }

 var item = {
  id: 'fb_' + nextFbId++,
  type: $1('#fb_type').value,
  priority: $1('#fb_priority').value,
  area: $1('#fb_area').value,
  title: title,
  description: desc,
  screenshotNote: ($1('#fb_screenshot').value||'').trim(),
  agentId: currentAgent.id,
  agentName: currentAgent.name,
  status: 'new',
  timestamp: new Date().toISOString(),
  comments: [],
  impactChecklist: {},
  aiAnalysis: '',
  adminNotes: '',
  notifyAgent: false
 };

 feedbackItems.push(item);
 fbSaveFeedback(item);
 showToast('Feedback submitted: ' + title, 3000);
 renderFeedback();
}

function closeFbReview(){
 $1('#fbReviewModal').className = 'modal-overlay';
}

function toggleImpactCheck(id, key, checked){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 if(!item.impactChecklist) item.impactChecklist = {};
 item.impactChecklist[key] = checked;
 fbSaveFeedback(item);
}

function saveFbReview(id){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 var newStatus = $1('#fb_review_status').value;
 var oldStatus = item.status;
 item.status = newStatus;
 item.adminNotes = ($1('#fb_admin_notes').value||'').trim();
 // Notify agent if status changed to resolved or wontfix
 if(oldStatus !== newStatus && (newStatus === 'resolved' || newStatus === 'wontfix')){
  item.notifyAgent = true;
 }
 fbSaveFeedback(item);
 showToast('Feedback updated: ' + item.title, 2000);
 closeFbReview();
 renderFeedback();
}

function deleteFeedback(id){
 if(!confirm('Delete this feedback item permanently?')) return;
 feedbackItems = feedbackItems.filter(function(f){ return f.id !== id; });
 // Remove from Firebase
 fetch(fbFeedbackPath(id), {method:'DELETE'}).catch(function(){});
 showToast('Feedback deleted', 2000);
 closeFbReview();
 renderFeedback();
}

function addFbComment(id){
 var text = ($1('#fb_comment_text').value||'').trim();
 if(!text) return;
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 if(!item.comments) item.comments = [];
 item.comments.push({
  agentId: currentAgent.id,
  agentName: currentAgent.name,
  text: text,
  timestamp: new Date().toISOString()
 });
 fbSaveFeedback(item);
 openFeedbackReview(id); // re-render modal
}

async function runAiAnalysis(id){
 var item = feedbackItems.find(function(f){ return f.id === id; });
 if(!item) return;
 var apiKey = getApiKey();
 if(!apiKey){ showToast('API key required — add it in Settings', 3000); return; }

 var btn = $1('#fbAiBtn');
 var resultDiv = $1('#fbAiResult');
 if(btn) btn.innerHTML = '<span class="upload-processing"><span class="spinner"></span> Analyzing impact...</span>';
 if(btn) btn.disabled = true;

 var checkedAreas = [];
 IMPACT_AREAS.forEach(function(a){
  if(item.impactChecklist && item.impactChecklist[a.key]) checkedAreas.push(a.label);
 });

 var prompt = 'You are reviewing a ' + item.type + ' report for a compensation tracking app called DuetBooks used by AAA Life Insurance specialists.\n\n';
 prompt += 'SUBMISSION:\nTitle: ' + item.title + '\n';
 prompt += 'Description: ' + (item.description||'No description') + '\n';
 prompt += 'Affected Area: ' + (item.area||'Not specified') + '\n';
 prompt += 'Priority: ' + (item.priority||'medium') + '\n';
 if(checkedAreas.length > 0) prompt += 'Admin-flagged impact areas: ' + checkedAreas.join(', ') + '\n';
 prompt += '\nThe app has these interconnected systems:\n';
 prompt += '1. Commission calculator (26 products with rates, split agents, tiers T2/T3/T4 based on 3-month MMA)\n';
 prompt += '2. Pipeline (cases flow: pending > submitted > approved > issued > paid)\n';
 prompt += '3. Pay period tracking (Varicent/Workday statement matching, MMA calculation)\n';
 prompt += '4. Cash flow projections (30/60/90 day buckets, tier targets, tax summaries)\n';
 prompt += '5. Firebase REST API sync + localStorage dual persistence, per-agent data scoping\n';
 prompt += '6. Login/auth (SHA-256 PIN hashing, agent ID derived from name)\n';
 prompt += '7. Settings (commission split %, yearly goal, backup/restore JSON)\n';
 prompt += '8. Document AI upload (Varicent/Workday PDF parsing via Anthropic API)\n\n';
 prompt += 'Analyze this submission and provide:\n';
 prompt += '1. AFFECTED SYSTEMS: Which of the 8 systems above would be affected?\n';
 prompt += '2. RISK ASSESSMENT: What could break if implemented incorrectly?\n';
 prompt += '3. TESTING PLAN: What should be tested after the change?\n';
 prompt += '4. IMPLEMENTATION APPROACH: High-level steps to implement this safely\n';
 prompt += '5. RISK LEVEL: Low / Medium / High — with brief justification\n';
 prompt += '\nBe concise and specific. Format with clear numbered sections.';

 try {
  var resp = await fetch('https://api.anthropic.com/v1/messages', {
   method: 'POST',
   headers: {
    'Content-Type': 'application/json',
    'x-api-key': apiKey,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true'
   },
   body: JSON.stringify({
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1024,
    messages: [{role:'user', content: prompt}]
   })
  });
  var data = await resp.json();
  if(data.error){
   throw new Error(data.error.message || 'API error');
  }
  var text = data.content && data.content[0] ? data.content[0].text : 'No response';
  item.aiAnalysis = text;
  fbSaveFeedback(item);
  if(resultDiv) resultDiv.innerHTML = '<div class="fb-ai-result"><h4>Analysis Results</h4>' + text.replace(/\n/g,'<br>') + '</div>';
  if(btn){ btn.innerHTML = 'Re-run Analysis'; btn.disabled = false; }
 } catch(e){
  if(resultDiv) resultDiv.innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:8px">Error: ' + e.message + '</div>';
  if(btn){ btn.innerHTML = 'Retry Analysis'; btn.disabled = false; }
 }
}

var chatHistory = [];

   chatSessionId = currentAgent.id + '_' + Date.now();

 } else {

function buildChatSystemPrompt(){
 var tabNames = ['Dashboard','Book of Business','Pay Periods','Forecasting','Rate Table','Settings'];
 var curTab = tabNames[activeTab] || 'Unknown';
 var mma = calc3MMA();
 var tier = tierText(mma);

 var prompt = 'You are the DuetBooks Help Assistant — a friendly, concise support bot built into the DuetBooks compensation tracking app for AAA Life Insurance Specialists.\n\n';
 prompt += 'CURRENT AGENT: '+currentAgent.name+' ('+currentAgent.branch+')\n';
 prompt += 'CURRENT TAB: '+curTab+'\n';
 prompt += 'CURRENT TIER: '+tier+' (3MMA: $'+mma.toFixed(2)+')\n';
 prompt += 'CASES: '+cases.length+' total ('+cases.filter(function(c){return c.status==="paid"}).length+' paid, '+cases.filter(function(c){return c.status!=="paid"}).length+' in pipeline)\n';
 prompt += 'PAY PERIODS: '+payPeriods.length+' imported\n\n';

 prompt += 'APP OVERVIEW:\n';
 prompt += '- Dashboard: YTD gross pay, commission, taxes, deductions, net deposited, current tier\n';
 prompt += '- Book of Business: All cases (pending/submitted/approved/issued/paid), add new cases, track pipeline\n';
 prompt += '- Pay Periods: Upload Varicent commission statements and Workday payslips (PDF). AI reads them and imports data automatically.\n';
 prompt += '- Forecasting: Current pay tier (based on 3 settled months), open month status, what production credits are needed to maintain tier\n';
 prompt += '- Rate Table: Full commission rates for all products across T1-T4 tiers\n';
 prompt += '- Settings: API key, commission split %, backup/restore, PIN change\n\n';

 prompt += 'TIER STRUCTURE (3MMA based on Varicent Production Credit):\n';
 prompt += '- T1: 0 - $3,333\n- T2: $3,334 - $4,999\n- T3: $5,000 - $6,666\n- T4: $6,667+\n\n';

 prompt += 'PRODUCTION CREDIT RULES:\n';
 prompt += '- Life Insurance (Whole Life, Term, IUL): 100% of annualized/target premium\n';
 prompt += '- Annuities: 3% of deposit\n';
 prompt += '- CDs / Banking: 0% production credit (as of 3/1/2026)\n\n';

 prompt += 'COMMON ISSUES:\n';
 prompt += '- "Upload not working": Agent needs an Anthropic API key in Settings tab. Get one at console.anthropic.com. Each document costs ~$0.01-0.02.\n';
 prompt += '- "Cases not showing": Make sure the Varicent PDF was uploaded and processed. Check Pay Periods tab.\n';
 prompt += '- "Production credits seem wrong": CDs have 0% production credit. Annuities are 3%. Life is 100%.\n';
 prompt += '- "Period label wrong": P1 = pay period ends on/before 15th. P2 = ends after 15th. Based on pay period dates, NOT check date.\n';
 prompt += '- "Dark mode": Click the moon/sun icon in the top bar.\n';
 prompt += '- "Feedback/bugs": Click the 💡 button in the bottom-left corner.\n\n';

 prompt += 'RULES:\n';
 prompt += '- Be concise (2-3 sentences max unless they need detailed steps)\n';
 prompt += '- You CANNOT modify data, upload files, or change settings — guide the agent to do it themselves\n';
 prompt += '- If you don\'t know the answer, suggest they use the 💡 feedback button to report the issue\n';
 prompt += '- Never share other agents\' data\n';
 return prompt;
}

async function sendChat(){
 var input = $1('#chatInput');
 var msg = (input.value||'').trim();
 if(!msg) return;
 input.value = '';

 var apiKey = getApiKey();
 if(!apiKey){
  chatHistory.push({role:'user', content: msg});
  chatHistory.push({role:'assistant', content:'I need an Anthropic API key to work. Please ask your manager to set one up in the Settings tab, or go to console.anthropic.com to get your own key.'});
  renderChat();
  return;
 }

 chatHistory.push({role:'user', content: msg});
 renderChat();

 // Show typing indicator
 var msgEl = $1('#chatMessages');
 msgEl.innerHTML += '<div class="chat-typing">Thinking...</div>';
 msgEl.scrollTop = msgEl.scrollHeight;

 // Build messages for API (last 10 exchanges max)
 var apiMessages = [];
 var recent = chatHistory.slice(-20); // last 20 messages (10 exchanges)
 recent.forEach(function(m){
  apiMessages.push({role: m.role, content: m.content});
 });

 try {
  var resp = await fetch('https://api.anthropic.com/v1/messages', {
   method: 'POST',
   headers: {
    'Content-Type': 'application/json',
    'x-api-key': apiKey,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true'
   },
   body: JSON.stringify({
    model: 'claude-sonnet-4-20250514',
    max_tokens: 512,
    system: buildChatSystemPrompt(),
    messages: apiMessages
   })
  });
  var data = await resp.json();
  if(data.error){
   throw new Error(data.error.message || 'API error');
  }
  var reply = data.content && data.content[0] ? data.content[0].text : 'Sorry, I couldn\'t process that. Try again.';
  chatHistory.push({role:'assistant', content: reply});
 } catch(e){
  chatHistory.push({role:'assistant', content:'Error: '+e.message+'. Check your API key in Settings.'});
 }

 renderChat();
 saveChatLog();
}

// ── Chat Logging to Firebase ──
function saveChatLog(){
 if(!chatSessionId || chatHistory.length < 2) return;
 var logData = {
  agentId: currentAgent.id,
  agentName: currentAgent.name,
  tab: ['Dashboard','Book of Business','Pay Periods','Forecasting','Rate Table','Settings'][activeTab] || 'Unknown',
  timestamp: new Date().toISOString(),
  messageCount: chatHistory.length,
  messages: chatHistory
 };
 var logUrl = FIREBASE_URL.replace('/duetbooks','') + '/duetbooks/_chatlogs/' + chatSessionId + '.json';
 fetch(logUrl, {method:'PUT', body: JSON.stringify(logData)}).catch(function(){});
}

// ── Admin: Check for new chat logs on login ──
async function checkChatLogs(){
 if(!isAdmin()) return;
 try {
  var url = FIREBASE_URL.replace('/duetbooks','') + '/duetbooks/_chatlogs.json?shallow=true';
  var resp = await fetch(url);
  var data = await resp.json();
  if(!data) return;
  var logCount = Object.keys(data).length;
  var lastChecked = parseInt(localStorage.getItem('db_chatlogs_checked') || '0');
  var newLogs = 0;
  Object.keys(data).forEach(function(k){
   var ts = parseInt(k.split('_').pop());
   if(ts > lastChecked) newLogs++;
  });
  if(newLogs > 0){
   showToast(newLogs + ' new help chat session'+(newLogs>1?'s':'')+' from agents', 5000);
  }
  localStorage.setItem('db_chatlogs_checked', String(Date.now()));
 } catch(e){}
}

async function viewChatLogs(){
 var url = FIREBASE_URL.replace('/duetbooks','') + '/duetbooks/_chatlogs.json';
 try {
  var resp = await fetch(url);
  var data = await resp.json();
  if(!data){ showToast('No chat logs yet', 2000); return; }
  var logs = Object.values(data).sort(function(a,b){ return (b.timestamp||'').localeCompare(a.timestamp||''); });

  var h = '';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<div style="font-size:18px;font-weight:700;color:var(--pri)">Agent Chat Logs ('+logs.length+')</div>';
  h += '<button class="btn btn-outline btn-sm" onclick="$1(\'#fbReviewModal\').className=\'modal-overlay\'">&times; Close</button>';
  h += '</div>';

  logs.forEach(function(log){
   var date = new Date(log.timestamp).toLocaleString();
   var msgCount = log.messageCount || (log.messages||[]).length;
   h += '<div style="background:var(--ptint);border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer" onclick="this.querySelector(\'.chat-log-detail\').style.display=this.querySelector(\'.chat-log-detail\').style.display===\'none\'?\'block\':\'none\'">';
   h += '<div style="display:flex;justify-content:space-between"><b>'+log.agentName+'</b><span style="font-size:11px;color:var(--muted)">'+date+'</span></div>';
   h += '<div style="font-size:11px;color:var(--muted)">Tab: '+log.tab+' | '+msgCount+' messages</div>';
   h += '<div class="chat-log-detail" style="display:none;margin-top:8px;border-top:1px solid var(--border);padding-top:8px">';
   (log.messages||[]).forEach(function(m){
    var color = m.role === 'user' ? 'var(--pri)' : 'var(--muted)';
    var label = m.role === 'user' ? log.agentName : 'Bot';
    h += '<div style="font-size:11px;margin-bottom:4px"><b style="color:'+color+'">'+label+':</b> '+m.content.substring(0,200)+(m.content.length>200?'...':'')+'</div>';
   });
   h += '</div></div>';
  });

  $1('#fbReviewContent').innerHTML = h;
  $1('#fbReviewModal').className = 'modal-overlay show';
 } catch(e){
  showToast('Error loading chat logs: '+e.message, 3000);
 }
}

(async function init(){
 // Check for existing session
 var stored = sessionStorage.getItem('db_agent');
 if(stored){
  try {
   currentAgent = JSON.parse(stored);
   await loadAgentData();
   enterApp();
  } catch(e){
   console.error('Session restore error:', e);
   sessionStorage.removeItem('db_agent');
   currentAgent = null;
  }
 }

 // Pre-fill remembered agent name
 var remembered = JSON.parse(localStorage.getItem('db_remembered_agents') || '[]');
 if(remembered.length > 0){
  $1('#login_name').value = remembered[remembered.length-1].name;
 }
})();
